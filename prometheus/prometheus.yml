# BUG-010 PR1: Prometheus scrape config
# Scrapes Rails app /metrics endpoint + accessory self-metrics.
# Storage retention 90d (configured via --storage.tsdb.retention.time CLI flag).

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: production
    project: himrate

# AlertManager target (push gateway batch metrics from workflows reach Prometheus
# via separate scrape of pushgateway).
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - himrate-alertmanager:9093

# Rule files for Prometheus alerts (none initially — Alertmanager routing
# handles workflow-pushed alerts directly).
rule_files: []

scrape_configs:
  # PR3: Rails app metrics реализованы через push-based pattern (PrometheusMetrics
  # → himrate-prometheus-pushgateway:9091 → scraped Prometheus каждые 30s ниже).
  # /metrics endpoint в Rails app намеренно отсутствует — rejected
  # `prometheus_exporter` gem (2.2.x bugs с Rails engine eager_load_paths) за
  # счёт push gateway approach: services/workers push gauges с per-pair grouping
  # labels, Prometheus storage/dashboards/alerts unchanged.
  #
  # Hotfix #7 (DV finding): Kamal `kamal` network registers containers по
  # FULL container name (himrate-<accessory>). Short names (loki, grafana)
  # NOT registered as DNS aliases — would fail resolution. Targets must use
  # full container names.

  # Push gateway: workflows push batch metrics here, Prometheus scrapes for storage
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['himrate-prometheus-pushgateway:9091']

  # Self-monitoring
  - job_name: prometheus-self
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager metrics
  - job_name: alertmanager
    static_configs:
      - targets: ['himrate-alertmanager:9093']

  # Loki metrics
  - job_name: loki
    static_configs:
      - targets: ['himrate-loki:3100']

  # Grafana metrics
  - job_name: grafana
    static_configs:
      - targets: ['himrate-grafana:3000']
