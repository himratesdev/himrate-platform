# BUG-010 PR1: Grafana dashboard provisioning.
# Loads JSON files from /var/lib/grafana/dashboards on boot.

apiVersion: 1

providers:
  - name: himrate-dashboards
    orgId: 1
    folder: HimRate
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 60
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
