# BUG-010 PR1: Promtail config — ships Docker container logs to Loki.
# Read-only access to /var/lib/docker/containers (file-based discovery).
# Includes redaction patterns per ADR DEC-19 to prevent accidental secret leakage.
#
# Hotfix #3: removed docker_sd_configs (require Docker socket mount, Kamal's
# directories: mechanism uses mkdir -p which fails on /var/run/docker.sock —
# socket file already exists, не directory). Switched к file-based discovery via
# static_configs + __path__ glob pattern. Container metadata extracted via path regex.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  # Hotfix #7 (DV finding): Kamal `kamal` network registers containers по full
  # container name (himrate-loki). Short alias `loki` not registered.
  - url: http://himrate-loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      # Extract container_id из path (e.g., /var/lib/docker/containers/abc123.../abc123...-json.log)
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]{12,})/'
      - labels:
          container_id:

      # Parse Docker JSON log format
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
      - output:
          source: log

      # === Redaction patterns (ADR DEC-19) ===
      # Mask Bearer tokens
      - replace:
          expression: '(Bearer )([\w\-\.]{20,})'
          replace: '$1[REDACTED]'

      # Mask password params in URLs and bodies
      - replace:
          expression: '(password=)([^\s&]+)'
          replace: '$1[REDACTED]'

      # CR S-1 fix: redact both classic ghp_* и fine-grained github_pat_* PAT formats
      - replace:
          expression: '(ghp_[\w]{36,})'
          replace: '[REDACTED_GH_PAT]'
      - replace:
          expression: '(github_pat_[\w]{36,})'
          replace: '[REDACTED_GH_PAT]'

      # CR N-1: Telegram bot token regex \d{9,11} matches both legacy 9-digit
      # bot_ids и newer 10-11 digit formats. Wider than ADR DEC-19 \d{10} —
      # deliberate over-redaction acceptable (false positives rare для 9-digit + colon + 30+ char).
      - replace:
          expression: '(\d{9,11}:[A-Za-z0-9_\-]{30,})'
          replace: '[REDACTED_TG_TOKEN]'

      # Mask AWS access keys (format: AKIA + 16 chars)
      - replace:
          expression: '(AKIA[0-9A-Z]{16})'
          replace: '[REDACTED_AWS_KEY]'
