# BUG-007 (FR-001): Reusable Deployment Verification Action
# Verifies that Kamal deploy completed successfully on VPS.
# Used for both staging and production.
#
# 8 checks: containers, health, migrations, sidekiq, redis, flipper, cron, pg_partman

name: 'Verify Deployment'
description: 'Verify Kamal deployment health on target VPS'

inputs:
  destination:
    description: 'Kamal destination (staging or production)'
    required: true
  expected_sha:
    description: 'Expected commit SHA for all containers'
    required: true
  host:
    description: 'VPS host IP or hostname'
    required: true
  health_url:
    description: 'URL for health check (e.g. https://staging.himrate.com/health)'
    required: true
  ssh_private_key:
    description: 'SSH private key for VPS access'
    required: true
  redis_container:
    description: 'Redis container name (Kamal accessory naming: {service}-{name})'
    required: false
    default: 'himrate-redis'

runs:
  using: 'composite'
  steps:
    - name: Setup SSH
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh_private_key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        cat >> ~/.ssh/config <<EOF
        Host ${{ inputs.host }}
          StrictHostKeyChecking accept-new
          IdentityFile ~/.ssh/deploy_key
          ConnectTimeout 30
          ServerAliveInterval 15
        EOF
        chmod 600 ~/.ssh/config

    - name: Wait for containers to stabilize
      shell: bash
      run: sleep 30

    - name: 'Check 1/8: Containers on correct SHA'
      shell: bash
      run: |
        echo "Checking containers for SHA: ${{ inputs.expected_sha }}"
        CONTAINERS=$(ssh root@${{ inputs.host }} \
          "docker ps --filter label=service=himrate --filter label=destination=${{ inputs.destination }} --format '{{.Names}} {{.Image}} {{.Status}}'")
        echo "$CONTAINERS"

        if [ -z "$CONTAINERS" ]; then
          echo "::error::No himrate containers found for destination ${{ inputs.destination }}"
          exit 1
        fi

        SHORT_SHA=$(echo "${{ inputs.expected_sha }}" | head -c 12)
        WRONG=$(echo "$CONTAINERS" | grep -v "$SHORT_SHA" | grep -v "Exited" || true)
        if [ -n "$WRONG" ]; then
          echo "::error::Containers not on expected SHA ($SHORT_SHA):"
          echo "$WRONG"
          exit 1
        fi
        echo "All running containers on SHA $SHORT_SHA"

    - name: 'Check 2/8: Health endpoint (container-internal, bypasses proxy)'
      shell: bash
      run: |
        WEB_CONTAINER=$(ssh root@${{ inputs.host }} \
          "docker ps -qf label=service=himrate -f label=destination=${{ inputs.destination }} -f label=role=web")
        HEALTH=$(ssh root@${{ inputs.host }} \
          "docker exec $WEB_CONTAINER ruby -e \"require 'net/http'; puts Net::HTTP.get(URI('http://localhost:3000/health'))\"")
        echo "Health check (container internal): $HEALTH"
        if echo "$HEALTH" | grep -q '"status":"ok"'; then
          echo "Health OK"
        else
          echo "::error::Health check failed: $HEALTH"
          exit 1
        fi

    - name: 'Check 3/8: Migrations'
      shell: bash
      run: |
        WEB_CONTAINER=$(ssh root@${{ inputs.host }} \
          "docker ps -qf label=service=himrate -f label=destination=${{ inputs.destination }} -f label=role=web")
        if [ -z "$WEB_CONTAINER" ]; then
          echo "::error::Web container not found"
          exit 1
        fi
        NEEDS_MIGRATION=$(ssh root@${{ inputs.host }} \
          "docker exec $WEB_CONTAINER bin/rails runner 'puts ActiveRecord::MigrationContext.new(\"db/migrate\").needs_migration?'")
        echo "Needs migration: $NEEDS_MIGRATION"
        if [ "$NEEDS_MIGRATION" = "true" ]; then
          echo "::error::Pending migrations detected"
          exit 1
        fi

    - name: 'Check 4/8: Sidekiq'
      shell: bash
      run: |
        JOB_CONTAINER=$(ssh root@${{ inputs.host }} \
          "docker ps -qf label=service=himrate -f label=destination=${{ inputs.destination }} -f label=role=job")
        if [ -z "$JOB_CONTAINER" ]; then
          echo "::error::Job container not found"
          exit 1
        fi
        SIDEKIQ=$(ssh root@${{ inputs.host }} "docker top $JOB_CONTAINER" | grep -c sidekiq || echo "0")
        echo "Sidekiq processes: $SIDEKIQ"
        if [ "$SIDEKIQ" = "0" ]; then
          echo "::error::Sidekiq not running in job container"
          exit 1
        fi

    - name: 'Check 5/8: Redis'
      shell: bash
      run: |
        REDIS_VERSION=$(ssh root@${{ inputs.host }} \
          "docker exec ${{ inputs.redis_container }} redis-cli INFO server 2>/dev/null | grep redis_version | cut -d: -f2 | tr -d '\r'" || echo "unavailable")
        echo "Redis version: $REDIS_VERSION"
        if [ "$REDIS_VERSION" = "unavailable" ]; then
          echo "::error::Redis not accessible"
          exit 1
        fi

        BLOOM=$(ssh root@${{ inputs.host }} \
          "docker exec ${{ inputs.redis_container }} redis-cli MODULE LIST 2>/dev/null | grep -c bf" || echo "0")
        echo "RedisBloom loaded: $BLOOM"

        PING=$(ssh root@${{ inputs.host }} "docker exec ${{ inputs.redis_container }} redis-cli PING" || echo "FAIL")
        echo "Redis PING: $PING"
        if [ "$PING" != "PONG" ]; then
          echo "::error::Redis PING failed"
          exit 1
        fi

    - name: 'Check 6/8: Flipper'
      shell: bash
      run: |
        WEB_CONTAINER=$(ssh root@${{ inputs.host }} \
          "docker ps -qf label=service=himrate -f label=destination=${{ inputs.destination }} -f label=role=web")
        FLAGS=$(ssh root@${{ inputs.host }} \
          "docker exec $WEB_CONTAINER bin/rails runner 'Flipper.features.each { |f| puts \"#{f.name}: #{f.enabled?}\" }' 2>/dev/null" | grep -v "Flipper audit" || echo "unavailable")
        echo "Flipper flags:"
        echo "$FLAGS"
        if [ "$FLAGS" = "unavailable" ]; then
          echo "::warning::Could not read Flipper flags"
        fi

    - name: 'Check 7/8: Sidekiq Cron'
      shell: bash
      run: |
        WEB_CONTAINER=$(ssh root@${{ inputs.host }} \
          "docker ps -qf label=service=himrate -f label=destination=${{ inputs.destination }} -f label=role=web")
        CRON=$(ssh root@${{ inputs.host }} \
          "docker exec $WEB_CONTAINER bin/rails runner 'Sidekiq::Cron::Job.all.each { |j| puts \"#{j.name}: #{j.status}\" }' 2>/dev/null" | grep -v "Flipper audit" || echo "unavailable")
        echo "Cron jobs:"
        echo "$CRON"
        if [ "$CRON" = "unavailable" ]; then
          echo "::warning::Could not read Sidekiq Cron jobs"
        fi

    # TASK-039 PR #90: fail-fast verification что pg_partman configured. Migration
    # #5 должна оставить 1 row в partman.part_config для public.trends_daily_aggregates.
    # Если row missing — значит migration #5 skipped (schema_migrations drift) или
    # create_parent failed silently. Broken partitioning = runtime INSERTs в default
    # partition вместо monthly → retention/backfill механика не работает.
    # Verification catches drift immediately instead of discovering в production runtime.
    - name: 'Check 8/8: pg_partman configured (TASK-039)'
      shell: bash
      run: |
        DB_CONTAINER=$(ssh root@${{ inputs.host }} \
          "docker ps -qf name=himrate-db")
        if [ -z "$DB_CONTAINER" ]; then
          echo "::error::himrate-db container not found"
          exit 1
        fi

        DB_NAME="himrate_${{ inputs.destination }}"
        COUNT=$(ssh root@${{ inputs.host }} \
          "docker exec $DB_CONTAINER psql -U himrate -d $DB_NAME -tAc \
           \"SELECT COUNT(*) FROM partman.part_config WHERE parent_table = 'public.trends_daily_aggregates'\" 2>/dev/null" \
          || echo "ERROR")

        echo "partman.part_config rows для trends_daily_aggregates: $COUNT"

        if [ "$COUNT" = "ERROR" ]; then
          echo "::error::Cannot query partman.part_config. Extension not installed OR DB connection failed."
          exit 1
        fi

        if [ "$COUNT" -lt 1 ]; then
          echo "::error::pg_partman NOT configured для trends_daily_aggregates."
          echo "::error::Migration #5 (20260419100005_partition_trends_daily_aggregates) не выполнила create_parent."
          echo "::error::Likely cause: schema_migrations drift — row exists but migration fact-skipped."
          echo "::error::Recovery: DELETE FROM schema_migrations WHERE version = '20260419100005' + redeploy."
          exit 1
        fi

        PARTITIONS=$(ssh root@${{ inputs.host }} \
          "docker exec $DB_CONTAINER psql -U himrate -d $DB_NAME -tAc \
           \"SELECT COUNT(*) FROM pg_tables WHERE tablename LIKE 'trends_daily_aggregates_p2%'\" 2>/dev/null")
        echo "Monthly partitions created: $PARTITIONS (expected ≥ 8 — 3 historical + current + 4 premake)"

        if [ "$PARTITIONS" -lt 8 ]; then
          echo "::warning::Fewer monthly partitions than expected — pg_partman create_parent могла частично отработать."
        fi
