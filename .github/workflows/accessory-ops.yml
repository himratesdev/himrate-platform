name: accessory-ops

# BUG-010 PR2: manual accessory operations workflow.
# Triggered via UI / `gh workflow run` / GitHub API (auto-remediation by AccessoryDriftDetectorWorker).
# Production destination requires reviewer approval (GitHub Environment protection).
# Health-check post-restart + auto-rollback on failure (FR-015..022).

on:
  workflow_dispatch:
    inputs:
      destination:
        description: 'Deployment destination (production requires reviewer approval)'
        required: true
        type: choice
        options:
          - staging
          - production
      accessory:
        description: 'Accessory name (must match config/deploy.yml)'
        required: true
        type: choice
        options:
          - db
          - redis
          - grafana
          - prometheus
          - prometheus-pushgateway
          - loki
          - promtail
          - alertmanager
          - clickhouse
      action:
        description: 'Kamal action'
        required: true
        type: choice
        options:
          - reboot
          - boot
          - stop
          - restart
      triggered_by:
        description: 'Trigger source'
        required: false
        type: choice
        options:
          - manual
          - auto_remediation
        default: manual
      auto_remediation_event_id:
        description: 'AccessoryDriftEvent UUID (only for auto_remediation triggers)'
        required: false
        type: string

# FR-008: Concurrency group cancel-in-progress per (destination, accessory) pair.
# Prevents race conditions in kamal commands. Different pairs run в parallel.
concurrency:
  group: accessory-ops-${{ inputs.destination }}-${{ inputs.accessory }}
  cancel-in-progress: true

jobs:
  execute:
    name: Execute ${{ inputs.accessory }} ${{ inputs.action }} on ${{ inputs.destination }}
    runs-on: ubuntu-latest
    # FR-009: 72h timeout (production approval window).
    timeout-minutes: 4320
    # Production protection per BR-001 — reviewer approval gate.
    environment: ${{ inputs.destination == 'production' && 'production' || 'staging' }}
    # PG W-1: packages: read достаточно — workflow только pulls, не push'ит images.
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      # PG W-1: free-string inputs (auto_remediation_event_id) routed via env: mapping
      # вместо inline ${{ inputs.* }}. Defense-in-depth против command injection.
      # type: choice inputs (destination/accessory/action/triggered_by) enum-constrained
      # GitHub-side, но routing through env: keeps pattern consistent + future-proof.
      - name: Audit log header
        env:
          ACTOR: ${{ github.actor }}
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          ACTION: ${{ inputs.action }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
          EVENT_ID: ${{ inputs.auto_remediation_event_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "::notice::Accessory ops triggered: actor=$ACTOR \
            destination=$DESTINATION accessory=$ACCESSORY \
            action=$ACTION triggered_by=$TRIGGERED_BY \
            event_id=$EVENT_ID run_id=$RUN_ID"

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: gem install kamal

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # BUG-021: SSH config applies to any host (staging + production may resolve to
          # the same VPS today or to different hosts post-Launch). The actual ssh target
          # is parameterized per-step via $SSH_HOST resolved in the next step.
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      # BUG-021: resolve the SSH target host per ${{ inputs.destination }} once, expose
      # as a step output, and consume via env: SSH_HOST in every subsequent ssh step.
      # Today staging + production share a single VPS (config/deploy.yml comment:
      # "Staging + Production on single VPS (194.135.85.159)"); when production moves to
      # its own host post-Launch, set the PRODUCTION_SSH_HOST repo secret and this step
      # picks it up automatically — no further workflow changes needed.
      - name: Resolve target SSH host
        id: ssh_host
        env:
          DESTINATION: ${{ inputs.destination }}
          PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          set -euo pipefail
          case "${DESTINATION}" in
            staging)
              HOST="${STAGING_SSH_HOST:-194.135.85.159}"
              ;;
            production)
              HOST="${PRODUCTION_SSH_HOST:-194.135.85.159}"
              ;;
            *)
              echo "::error::Unknown destination: ${DESTINATION}"
              exit 1
              ;;
          esac
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          # Also expose as SSH_HOST in $GITHUB_ENV so subsequent steps consume it as a
          # regular env var without per-step env mapping — keeps the ssh call sites
          # uniform across the 6 ssh-using steps below.
          echo "SSH_HOST=${HOST}" >> "$GITHUB_ENV"
          echo "::notice::Resolved ${DESTINATION} SSH host: ${HOST}"

      # BUG-020: Kamal names app containers `<service>-<role>-<destination>-<sha>`
      # (e.g. himrate-web-staging-5ec75ae...), NOT a static `himrate-web`. Resolve the
      # actual web container name on the target host once, expose as step output, and
      # use it in every `docker exec ... bin/rails accessory_ops:*` step below.
      - name: Resolve web container name
        id: web
        env:
          DESTINATION: ${{ inputs.destination }}
        run: |
          set -euo pipefail
          # `head -1` on the LOCAL side of the pipe (not inside the ssh command string):
          # keeps `pipefail` propagating a non-zero `docker ps` / ssh exit so a failed
          # Docker query on the host fails this step loudly instead of silently yielding
          # an empty NAME (which would otherwise be misreported as "no container found").
          NAME=$(ssh "root@${SSH_HOST}" \
            "docker ps --filter label=service=himrate --filter label=role=web --filter label=destination=${DESTINATION} --format '{{.Names}}'" | head -1)
          if [ -z "$NAME" ]; then
            echo "::error::No running himrate web container found on host for destination='${DESTINATION}' (expected labels service=himrate,role=web,destination=${DESTINATION})"
            exit 1
          fi
          echo "Resolved web container: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # FR-002: validate-secrets fail-fast пред kamal invocation. Mirrors ci.yml deploy jobs.
      - name: Validate required secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # BUG-251.18: CLICKHOUSE_PASSWORD must be in the minimal subset. The `clickhouse`
          # accessory's default user is password-protected via this secret; omitting it means
          # `kamal accessory boot/reboot clickhouse` rewrites the user with an EMPTY password
          # (the Docker entrypoint sets CLICKHOUSE_PASSWORD="" on the new container), which
          # silently breaks app→CH auth (the /ping liveness probe is unauthenticated, so the
          # workflow's post-action health-verify still passes — the bug is invisible there).
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          TELEGRAM_OPS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          TELEGRAM_CRITICAL_CHAT_ID: ${{ secrets.TELEGRAM_CRITICAL_CHAT_ID }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          TELEGRAM_INFO_CHAT_ID: ${{ secrets.TELEGRAM_INFO_CHAT_ID }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_OIDC_CLIENT_ID: ${{ secrets.GRAFANA_OIDC_CLIENT_ID }}
          GRAFANA_OIDC_CLIENT_SECRET: ${{ secrets.GRAFANA_OIDC_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          MISSING=()
          for var in KAMAL_REGISTRY_PASSWORD POSTGRES_PASSWORD CLICKHOUSE_PASSWORD \
                     TELEGRAM_OPS_BOT_TOKEN TELEGRAM_CRITICAL_CHAT_ID \
                     TELEGRAM_OPS_CHAT_ID TELEGRAM_INFO_CHAT_ID \
                     GRAFANA_ADMIN_USER GRAFANA_ADMIN_PASSWORD \
                     GRAFANA_OIDC_CLIENT_ID GRAFANA_OIDC_CLIENT_SECRET; do
            [ -z "${!var:-}" ] && MISSING+=("$var")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required repo secrets:"
            printf '::error::  • %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "✓ All required secrets present"

      # ADR DEC-2: minimal subset для accessory operations (vs full ci.yml app deploy list).
      - name: Write Kamal secrets
        env:
          DESTINATION: ${{ inputs.destination }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          TELEGRAM_OPS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          TELEGRAM_CRITICAL_CHAT_ID: ${{ secrets.TELEGRAM_CRITICAL_CHAT_ID }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          TELEGRAM_INFO_CHAT_ID: ${{ secrets.TELEGRAM_INFO_CHAT_ID }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_OIDC_CLIENT_ID: ${{ secrets.GRAFANA_OIDC_CLIENT_ID }}
          GRAFANA_OIDC_CLIENT_SECRET: ${{ secrets.GRAFANA_OIDC_CLIENT_SECRET }}
        run: |
          cat > ".kamal/secrets.${DESTINATION}" <<SECRETS
          KAMAL_REGISTRY_PASSWORD=${KAMAL_REGISTRY_PASSWORD}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
          TELEGRAM_OPS_BOT_TOKEN=${TELEGRAM_OPS_BOT_TOKEN}
          TELEGRAM_CRITICAL_CHAT_ID=${TELEGRAM_CRITICAL_CHAT_ID}
          TELEGRAM_OPS_CHAT_ID=${TELEGRAM_OPS_CHAT_ID}
          TELEGRAM_INFO_CHAT_ID=${TELEGRAM_INFO_CHAT_ID}
          GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          GRAFANA_OIDC_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
          GRAFANA_OIDC_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
          SECRETS

      # PR3 FR-126: pre-action downtime tracking. INSERT row через rake (web container) —
      # workflow captures event_id для последующего :end call. accessory action может
      # cause downtime (especially reboot/restart/stop), записываем сразу.
      - name: Record downtime start
        id: downtime_start
        if: contains(fromJson('["reboot","restart","stop"]'), inputs.action)
        env:
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          # PG W-1: route the resolved container name through env: (consistent with the
          # workflow's command-injection-hardening pattern), not inline ${{ steps.* }}.
          WEB_CONTAINER: ${{ steps.web.outputs.name }}
        run: |
          set -euo pipefail
          # Source: workflow_dispatch = "manual" or "auto_remediation". Both = drift|restart
          # mapping per BR-007: human-triggered manual ops record как "restart"; drift detector
          # auto-remediation already записал свой downtime в TriggerService path.
          SOURCE="restart"
          EVENT_ID=$(ssh "root@${SSH_HOST}" \
            "docker exec ${WEB_CONTAINER} bin/rails 'accessory_ops:downtime:start[${DESTINATION},${ACCESSORY},${SOURCE}]'" \
            | tail -1)
          echo "event_id=${EVENT_ID}" >> "$GITHUB_OUTPUT"
          echo "::notice::downtime_started event_id=${EVENT_ID}"

      # FR-003: kamal accessory invocation. Trap EXIT cleanup secrets file (BR-007).
      - name: Execute kamal accessory ${{ inputs.action }} ${{ inputs.accessory }}
        id: kamal_op
        env:
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          ACTION: ${{ inputs.action }}
        run: |
          trap 'rm -f ".kamal/secrets.${DESTINATION}"' EXIT
          start_ts=$(date +%s)
          kamal accessory "$ACTION" "$ACCESSORY" -d "$DESTINATION"
          end_ts=$(date +%s)
          echo "duration_seconds=$((end_ts - start_ts))" >> "$GITHUB_OUTPUT"

      # PR3 FR-015..017: post-action health verification. Polls HealthCheckService через
      # rake (web container SSH) до 5min default. Fail fast но не aborts workflow — последующие
      # шаги (notify, downtime:end) обрабатывают branching.
      - name: Verify accessory health
        id: health_verify
        if: success() && contains(fromJson('["reboot","restart","boot"]'), inputs.action)
        continue-on-error: true
        env:
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          WEB_CONTAINER: ${{ steps.web.outputs.name }}
        run: |
          set -euo pipefail
          ssh "root@${SSH_HOST}" \
            "docker exec ${WEB_CONTAINER} bin/rails 'accessory_ops:health_verify[${DESTINATION},${ACCESSORY},300]'"

      # PR3 FR-122..124: на healthy verdict — refresh AccessoryState (read runtime image
      # via DriftCheckService + persist via StateService). На fail step — пропускаем (alert
      # ниже).
      - name: Refresh accessory state
        if: steps.health_verify.outcome == 'success'
        env:
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          WEB_CONTAINER: ${{ steps.web.outputs.name }}
        run: |
          ssh "root@${SSH_HOST}" \
            "docker exec ${WEB_CONTAINER} bin/rails 'accessory_ops:state:refresh[${DESTINATION},${ACCESSORY},healthy]'"

      # PR3 FR hooks: close downtime event с ended_at — duration_seconds auto-computed
      # AccessoryDowntimeEvent.before_save. Both healthy + unhealthy flows close downtime
      # (kamal action завершилась, neither recovers downtime tracking).
      - name: Record downtime end
        if: always() && steps.downtime_start.outcome == 'success'
        env:
          EVENT_ID: ${{ steps.downtime_start.outputs.event_id }}
          WEB_CONTAINER: ${{ steps.web.outputs.name }}
        run: |
          if [ -n "${EVENT_ID:-}" ]; then
            ssh "root@${SSH_HOST}" \
              "docker exec ${WEB_CONTAINER} bin/rails 'accessory_ops:downtime:end[${EVENT_ID}]'"
          fi

      # PR3 FR-006/070 (CR B-1 fix): AlertmanagerNotifier push через JSON payload на STDIN.
      # Bulletproof против commas/spaces/quotes/em-dashes в summary/description.
      # Workflow строит JSON через jq -n + pipes к docker exec -i (stdin keep-open).
      - name: Send notification
        if: always()
        env:
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          ACTION: ${{ inputs.action }}
          HEALTH_OUTCOME: ${{ steps.health_verify.outcome }}
          KAMAL_OUTCOME: ${{ steps.kamal_op.outcome }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEB_CONTAINER: ${{ steps.web.outputs.name }}
        run: |
          set -euo pipefail
          if [ "$KAMAL_OUTCOME" != "success" ]; then
            EVENT_TYPE="action_failed"
            SEVERITY="critical"
            SUMMARY="${ACTION} ${ACCESSORY} on ${DESTINATION} FAILED — kamal step error"
          elif [ "$HEALTH_OUTCOME" = "failure" ]; then
            EVENT_TYPE="health_failed_after_action"
            SEVERITY="critical"
            SUMMARY="${ACTION} ${ACCESSORY} on ${DESTINATION} unhealthy после action — manual rollback may be required"
          elif [ "$HEALTH_OUTCOME" = "success" ]; then
            EVENT_TYPE="action_success"
            SEVERITY="info"
            SUMMARY="${ACTION} ${ACCESSORY} on ${DESTINATION} succeeded и проверено health"
          else
            EVENT_TYPE="action_completed"
            SEVERITY="info"
            SUMMARY="${ACTION} ${ACCESSORY} on ${DESTINATION} completed (no health verify)"
          fi
          DESCRIPTION="actor=${ACTOR} triggered_by=${TRIGGERED_BY} run=${RUN_URL}"
          PAYLOAD=$(jq -n \
            --arg event_type "$EVENT_TYPE" \
            --arg severity "$SEVERITY" \
            --arg destination "$DESTINATION" \
            --arg accessory "$ACCESSORY" \
            --arg summary "$SUMMARY" \
            --arg description "$DESCRIPTION" \
            '{event_type:$event_type, severity:$severity, destination:$destination, accessory:$accessory, summary:$summary, description:$description}')
          printf '%s' "$PAYLOAD" | ssh "root@${SSH_HOST}" \
            "docker exec -i ${WEB_CONTAINER} bin/rails accessory_ops:notify"

      # FR-005: audit annotation на success.
      - name: Emit audit notice (success)
        if: success()
        env:
          ACTOR: ${{ github.actor }}
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          ACTION: ${{ inputs.action }}
          DURATION: ${{ steps.kamal_op.outputs.duration_seconds }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
        run: |
          echo "::notice::Accessory ops result: actor=$ACTOR \
            destination=$DESTINATION accessory=$ACCESSORY \
            action=$ACTION result=success \
            duration=${DURATION}s \
            triggered_by=$TRIGGERED_BY"

      # FR-005: audit annotation на failure.
      - name: Emit audit notice (failure)
        if: failure()
        env:
          ACTOR: ${{ github.actor }}
          DESTINATION: ${{ inputs.destination }}
          ACCESSORY: ${{ inputs.accessory }}
          ACTION: ${{ inputs.action }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
        run: |
          echo "::error::Accessory ops result: actor=$ACTOR \
            destination=$DESTINATION accessory=$ACCESSORY \
            action=$ACTION result=failure \
            triggered_by=$TRIGGERED_BY"
