name: ti-v2-br017-sim
# T1-074 GATE-0 BR-017 SIM — read-only pre-flip ship-gate validation. NO DB writes, NO flip.
# Injects the CALIBRATED ρ* (Context#with cell) + llr_temporal_r7 bump (Registry K#with) into the
# deployed engine and measures, side-by-side vs illustrative:
#   HONEST anchors (partner∧TI≥88 live) → accusatory-FP (red/yellow) [BR-017 wants <1%] + amber/green mix
#   BOTTED (gta6news/zubarefff/betayn2k silent-view + vertan66 chat-bot + ccv_step/viewbot anomaly)
#     → recall: does calibrated engine flag them (AMBER for silent-view / RED for confirmed chat-bot)?
# This is the evidence PO needs to decide the ti_v2_engine flip. ρ* here = off-peak STEP 1b (refine
# with peak-dense before the real seed). llr_temporal_r7 default 6.2 (R7-confirmed → B_hard → named).
on:
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options: [hostkey]
        default: hostkey
      llr_r7:
        required: false
        type: string
        default: "6.2"
      llr_r4:
        required: false
        type: string
        default: "2.9" # aggressive mode: 6.2 → yellow-tier (R4-6) reaches B_hard too (PO 2026-07-20)

jobs:
  sim:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Build br017-sim script
        run: |
          cat > /tmp/br017.rb <<'RUBY_EOF'
          $stdout.sync = true
          require "set"
          LLR_R7 = (ENV["LLR_R7"] || "6.2").to_f
          LLR_R4 = (ENV["LLR_R4"] || "2.9").to_f

          # ρ* off-peak STEP 1b (build_v2 basis). cat|vbucket|chatmode → [star, lo, hi]. Category + GLOBAL fallback.
          CALIB = {
            "gaming|0-1k|open"           => [ 0.348, 0.144, 0.869 ],
            "gaming|0-1k|followers-only" => [ 0.478, 0.326, 1.212 ],
            "just_chatting|0-1k|open"    => [ 0.834, 0.140, 4.000 ]
          }.freeze
          CAT = { "gaming" => [ 0.359, 0.156, 0.869 ], "just_chatting" => [ 0.451, 0.140, 4.000 ], "esports" => [ 0.914, 0.241, 5.000 ] }.freeze
          GLOBAL = [ 0.451, 0.156, 0.914 ].freeze

          def vbucket(v)
            return "0" if v.nil? || v <= 0
            return "0-1k" if v < 1000
            return "1k-5k" if v < 5000
            return "5k-20k" if v < 20000
            "20k+"
          end

          def chat_mode(cfg)
            return "open" unless cfg
            return "sub-only" if cfg.subs_only_enabled
            fol = cfg.followers_only_duration_min
            return "followers-only" if fol && fol >= 0
            return "slow" if cfg.slow_mode_seconds.to_i.positive?
            return "emote-only" if cfg.emote_only_enabled
            "open"
          end

          def calib_baseline(cat, vb, cm)
            a = CALIB["#{cat}|#{vb}|#{cm}"] || CAT[cat] || GLOBAL
            TrustIndex::V2::CellResolver::Baseline.new(rho_star: a[0], rho_lo: a[1], rho_hi: a[2])
          end

          K_ILL = Calibration::Registry.load
          K_CAL = K_ILL.with(llr_temporal_r7: LLR_R7, llr_temporal_r4: LLR_R4)

          def run_one(s)
            chatters = (Clickhouse::ChatQueries.stream_chatters(s) rescue [])
            return nil if chatters.empty?
            flagged = CrossChannelTemporalFlag.bulk_lookup(chatters)
            spamf = flagged.reject { |_, d| d[:bot_type] == "utility" }.size.to_f / chatters.size
            ctx = TrustIndex::ContextBuilder.build(s).merge(
              stream_chatters: chatters,
              temporal_cross_channel_flags: { total_chatters: chatters.size, flagged: flagged }
            )
            v2c = TrustIndex::ContextBuilder.build_v2(s, ctx)
            cat = ctx[:category] || "default"
            base = calib_baseline(cat, vbucket(v2c.v), chat_mode(s.channel.channel_protection_config))
            v2cal = v2c.with(cell: base)
            r_ill = TrustIndex::V2::Engine.compute(context: v2c, k: K_ILL)
            r_cal = TrustIndex::V2::Engine.compute(context: v2cal, k: K_CAL)
            { v: v2c.v, chat: chatters.size, flagged: flagged.size, spam_frac: spamf,
              cat: cat, cell: "#{cat}|#{vbucket(v2c.v)}", rho_obs: r_cal.rho_obs,
              ill: r_ill, cal: r_cal }
          rescue => e
            { error: "#{e.class}: #{e.message[0..160]}" }
          end

          def band_str(r)
            "#{r.band.color}/row#{r.band.row}#{r.band.sub} auth=#{r.authenticity&.round(0)} nfrac=#{r.n_frac&.round(3)} plashka=#{r.confirmed_anomaly ? 'Y' : '-'}"
          end

          def accusatory?(r)
            %w[red yellow].include?(r.band.color)
          end

          # ===== HONEST anchors (partner ∧ ≥10 completed ∧ TI≥88, live) =====
          live = Stream.where(ended_at: nil).where("started_at > ?", 18.hours.ago).order(started_at: :desc).pluck(:id, :channel_id)
          honest = []
          seen = Set.new
          live.each do |sid, cid|
            break if honest.size >= 60
            next if seen.include?(cid)
            ch = Channel.find_by(id: cid)
            next unless ch && ch.broadcaster_type == "partner"
            next if Stream.where(channel_id: cid).where.not(ended_at: nil).count < 10
            ti = TrustIndexHistory.where(channel_id: cid).order(calculated_at: :desc).limit(1).pick(:trust_index_score)
            next if ti.nil? || ti.to_f < 88
            # Anchor hygiene (almazer5): viewbot/ccv-step anomaly on the CURRENT stream (non-raid)
            # → NOT honest. Current-stream only — 14d channel-wide excluded ALL partners (n=0).
            anom = Anomaly.where(anomaly_type: %w[viewbot_spike ccv_step_function], stream_id: sid)
                          .where("timestamp > ?", 24.hours.ago).exists?
            next if anom && !RaidAttribution.where(stream_id: sid).exists?
            seen << cid
            honest << [ sid, ch.login ]
          end

          puts "===== HONEST anchors (n=#{honest.size}) — illustrative → CALIBRATED ====="
          h_acc_ill = 0; h_acc_cal = 0; h_amber = 0; h_green = 0; h_ok = 0; h_excl = 0
          honest.each do |sid, login|
            m = run_one(Stream.find_by(id: sid))
            next unless m
            if m[:error]
              next
            end
            # Anchor hygiene pt.2: >5% spam-temporal roster → poisoned, exclude from honest stats
            if m[:spam_frac] && m[:spam_frac] > 0.05
              h_excl += 1
              puts format("  %-20s EXCLUDED (spam_frac=%.3f) — poisoned anchor", login[0, 20], m[:spam_frac])
              next
            end
            h_ok += 1
            h_acc_ill += 1 if accusatory?(m[:ill])
            if accusatory?(m[:cal]) then h_acc_cal += 1 end
            h_amber += 1 if m[:cal].band.color == "amber"
            h_green += 1 if m[:cal].band.color == "green"
            puts format("  %-20s V=%-5d chat=%-3d %s | CAL %s", login[0, 20], m[:v].to_i, m[:chat], "ill=#{m[:ill].band.color}", band_str(m[:cal])) if accusatory?(m[:cal]) || h_ok <= 12
          end
          hfp_cal = h_ok.zero? ? 0.0 : (100.0 * h_acc_cal / h_ok).round(1)
          puts "\n  HONEST: measured=#{h_ok} (excluded poisoned=#{h_excl}) | accusatory(red/yellow): ill=#{h_acc_ill} CAL=#{h_acc_cal} (#{hfp_cal}%) | amber=#{h_amber} green=#{h_green}"
          puts "  BR-017 honest accusatory-FP target <1% → #{hfp_cal < 1.0 ? 'PASS' : 'REVIEW'}\n"

          # ===== BOTTED / suspicious =====
          named = %w[gta6news zubarefff betayn2k vertan66]
          an_sids = Anomaly.where(anomaly_type: %w[viewbot_spike ccv_step_function]).where("timestamp > ?", 6.days.ago)
                           .order(timestamp: :desc).limit(80).pluck(:stream_id).uniq
          bot_streams = []
          named.each do |lg|
            ch = Channel.find_by(login: lg)
            next unless ch
            s = Stream.where(channel_id: ch.id).order(started_at: :desc).first
            bot_streams << [ s.id, "#{lg}*" ] if s
          end
          an_sids.first(25).each do |sid|
            s = Stream.find_by(id: sid)
            next unless s && !RaidAttribution.where(stream_id: sid).exists?
            bot_streams << [ sid, s.channel.login.to_s[0, 18] ]
          end

          puts "===== BOTTED / anomaly channels (n=#{bot_streams.size}) — illustrative → CALIBRATED ====="
          b_flag_cal = 0; b_acc_cal = 0; b_ok = 0
          bot_streams.each do |sid, login|
            m = run_one(Stream.find_by(id: sid))
            next unless m
            next if m[:error]
            b_ok += 1
            flagged_cal = m[:cal].band.color != "green"
            b_flag_cal += 1 if flagged_cal
            b_acc_cal += 1 if accusatory?(m[:cal])
            puts format("  %-20s V=%-6d chat=%-4d ρ=%.4f | ill=%-6s CAL %s", login[0, 20], m[:v].to_i, m[:chat], m[:rho_obs] || 0, m[:ill].band.color, band_str(m[:cal]))
          end
          puts "\n  BOTTED: measured=#{b_ok} | flagged(non-green) CAL=#{b_flag_cal} | accusatory(red/yellow) CAL=#{b_acc_cal}"

          puts "\n===== BR-017 SIM VERDICT (llr_r7=#{LLR_R7}, llr_r4=#{LLR_R4}, ρ*=STEP1b) ====="
          puts "  honest accusatory-FP: #{hfp_cal}% (want <1%)"
          puts "  botted flagged: #{b_ok.zero? ? 0 : (100.0 * b_flag_cal / b_ok).round(1)}% | accusatory: #{b_ok.zero? ? 0 : (100.0 * b_acc_cal / b_ok).round(1)}%"
          puts "  → refine ρ* with peak-dense STEP 1b before real seed; this validates harness + direction."
          RUBY_EOF
          echo "Built ($(wc -l < /tmp/br017.rb) lines)"

      - name: Run br017-sim on ${{ inputs.target }}
        run: |
          TARGET="${{ inputs.target }}"
          scp /tmp/br017.rb ${TARGET}:/tmp/br017.rb
          CONTAINER=$(ssh ${TARGET} "docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1")
          echo "container: ${CONTAINER}"
          ssh ${TARGET} "docker cp /tmp/br017.rb ${CONTAINER}:/tmp/br017.rb && docker exec -e LLR_R7='${{ inputs.llr_r7 }}' -e LLR_R4='${{ inputs.llr_r4 }}' ${CONTAINER} sh -c 'bin/rails runner /tmp/br017.rb 2>&1; echo RAILS_EXIT=\$?'" 2>&1 | grep -vE 'Flipper audit|connecting to Redis|stackprof|Please add|KnownBotService: init' || true
