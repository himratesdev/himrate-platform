name: hostkey-probe

# Ad-hoc system snapshot of HOSTKEY VPS via CI runner (escapes my Claude env SSH rate-limit).
# Trigger via `gh workflow run hostkey-probe.yml` — runs PG counts + Sidekiq queue health + VPS load.

on:
  workflow_dispatch:
    inputs:
      apply_bft_caps:
        description: 'Apply hard CPU limits to the bft-* + xray containers (live docker update, reversible) so the side-service can never starve the host'
        required: false
        type: boolean
        default: false
      add_swap:
        description: 'Provision 8GB swapfile + vm.swappiness=10 (idempotent, persistent via fstab+sysctl.d) — the OOM cushion the host lacked (swap=0 amplified the storm)'
        required: false
        type: boolean
        default: false
      truncate_ch_syslogs:
        description: 'TRUNCATE ClickHouse system-log tables (text_log/processors_profile_log/query_log/trace_log/…) — frees the ~139 GiB that filled the disk on 2026-07-18. Safe: CH internal diagnostics, NOT product data (chat_messages/MVs untouched).'
        required: false
        type: boolean
        default: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: TRUNCATE ClickHouse system-log tables (gated — frees ~139 GiB, BUG-DISK-FULL 2026-07-18)
        if: ${{ inputs.truncate_ch_syslogs }}
        run: |
          echo "=== BEFORE ==="; ssh hostkey 'df -h / | tail -1'
          echo "=== TRUNCATE CH system-log tables (internal diagnostics — chat_messages/MVs untouched) ==="
          ssh hostkey 'docker exec himrate-clickhouse clickhouse-client --multiquery --query "
            TRUNCATE TABLE IF EXISTS system.text_log;
            TRUNCATE TABLE IF EXISTS system.processors_profile_log;
            TRUNCATE TABLE IF EXISTS system.query_log;
            TRUNCATE TABLE IF EXISTS system.trace_log;
            TRUNCATE TABLE IF EXISTS system.metric_log;
            TRUNCATE TABLE IF EXISTS system.asynchronous_metric_log;
            TRUNCATE TABLE IF EXISTS system.part_log;
            TRUNCATE TABLE IF EXISTS system.query_views_log;
          " 2>&1' || true
          echo "=== AFTER ==="; ssh hostkey 'df -h / | tail -1'

      - name: VPS load + memory + disk
        run: |
          echo "=== VPS health ==="
          ssh hostkey "uptime; free -m | head -3; df -h / | tail -1"
          echo ""

      - name: Container roster
        run: |
          echo "=== Containers (target: 11 healthy) ==="
          ssh hostkey 'docker ps --format "table {{.Names}}\t{{.Status}}" 2>&1' | head -30

      - name: Per-container CPU/MEM (himrate-* vs bft-* attribution)
        run: |
          echo "=== docker stats --no-stream (sorted by CPU) ==="
          ssh hostkey "docker stats --no-stream --format '{{.CPUPerc}}\t{{.MemPerc}}\t{{.MemUsage}}\t{{.Name}}' 2>&1 | sort -rh | head -40"

      - name: Disk I/O + top processes (the known bottleneck)
        run: |
          echo "=== iostat (disk %util / await = the bottleneck) ==="
          ssh hostkey "command -v iostat >/dev/null && iostat -x 1 2 | awk 'NR>3' | tail -20 || echo 'iostat not installed (apt-get install sysstat)'"
          echo ""
          echo "=== top 12 processes by CPU ==="
          ssh hostkey "top -bn1 | head -19 | tail -13"
          echo ""
          echo "=== meminfo (creep watch) ==="
          ssh hostkey "grep -iE 'MemTotal|MemAvailable|Dirty|Writeback|Committed_AS' /proc/meminfo"

      - name: FORENSICS — pre-reboot kernel log (OOM/panic smoking gun)
        run: |
          echo "=== boots logged ==="
          ssh hostkey "journalctl --list-boots 2>/dev/null | tail -6 || echo 'no persistent journal'"
          echo ""
          echo "=== PRE-REBOOT kernel events (boot -1): OOM / panic / hung-task ==="
          ssh hostkey "journalctl -k -b -1 --no-pager 2>/dev/null | grep -iE 'out of memory|oom-kill|killed process|invoked oom|panic|hung_task|blocked for more than|general protection|watchdog' | tail -40 || echo '(no boot -1 journal — not persistent)'"
          echo ""
          echo "=== PRE-REBOOT last 40 log lines before freeze (boot -1 tail) ==="
          ssh hostkey "journalctl -b -1 --no-pager 2>/dev/null | tail -40 || echo '(no boot -1)'"
          echo ""
          echo "=== CURRENT boot OOM/kill since reboot ==="
          ssh hostkey "dmesg -T 2>/dev/null | grep -iE 'oom|killed process|panic|hung' | tail -15 || echo 'none'"

      - name: FORENSICS — swap, vmstat, disk I/O delta (manual, no sysstat)
        run: |
          echo "=== swap config ==="
          ssh hostkey "swapon --show 2>/dev/null || echo 'NO SWAP configured'; echo '--- vm.swappiness ---'; cat /proc/sys/vm/swappiness; echo '--- overcommit ---'; cat /proc/sys/vm/overcommit_memory /proc/sys/vm/overcommit_ratio"
          echo ""
          echo "=== vmstat (r=runnable b=blocked si/so=swap wa=iowait) ==="
          ssh hostkey "command -v vmstat >/dev/null && vmstat 1 3 || echo 'vmstat absent'"
          echo ""
          echo "=== diskstats delta over 2s (manual %util proxy) ==="
          ssh hostkey "grep -E ' (sda|vda|dm-0|nvme0n1) ' /proc/diskstats; sleep 2; echo '--- +2s ---'; grep -E ' (sda|vda|dm-0|nvme0n1) ' /proc/diskstats"

      - name: FORENSICS — bft-* cluster limits + images
        run: |
          echo "=== bft-* + xray resource limits (HostConfig) ==="
          for c in bft-collector bft-placer bft-betboom-placer bft-orchestrator bft-dota-live bft-dota-live-steam bft-smurf-monitor xray-ru; do
            ssh hostkey "docker inspect $c --format '$c: mem_limit={{.HostConfig.Memory}} memswap={{.HostConfig.MemorySwap}} cpus={{.HostConfig.NanoCpus}} cpu_shares={{.HostConfig.CpuShares}} restart={{.HostConfig.RestartPolicy.Name}} image={{.Config.Image}}' 2>/dev/null || echo '$c: not found'"
          done

      - name: APPLY hard CPU caps to bft-* + xray (gated — live docker update, reversible)
        if: ${{ inputs.apply_bft_caps }}
        run: |
          echo "=== applying CPU caps (was cpus=0 unlimited → bounded so the side-service can never starve the host) ==="
          ssh hostkey "docker update --cpus=2.0 bft-collector && echo '  bft-collector -> 2.0 cpu'"
          ssh hostkey "docker update --cpus=1.0 bft-placer && echo '  bft-placer -> 1.0 cpu'"
          ssh hostkey "docker update --cpus=1.0 bft-betboom-placer && echo '  bft-betboom-placer -> 1.0 cpu'"
          ssh hostkey "docker update --cpus=0.5 xray-ru && echo '  xray-ru -> 0.5 cpu'"
          echo ""
          echo "=== raise Chrome-container memory floor (700MB too small for Playwright Chrome → stops the OOM-kill storm) ==="
          ssh hostkey "docker update --memory=1536m --memory-swap=3072m bft-placer && echo '  bft-placer mem 700MB -> 1.5GB'"
          ssh hostkey "docker update --memory=1536m --memory-swap=3072m bft-betboom-placer && echo '  bft-betboom-placer mem 700MB -> 1.5GB'"
          echo ""
          echo "=== verify NanoCpus + mem after (0 = unlimited; want bounded) ==="
          for c in bft-collector bft-placer bft-betboom-placer xray-ru bft-orchestrator bft-dota-live bft-dota-live-steam bft-smurf-monitor; do
            ssh hostkey "docker inspect $c --format '  $c: NanoCpus={{.HostConfig.NanoCpus}} mem_limit={{.HostConfig.Memory}}' 2>/dev/null || echo '  $c: not found'"
          done

      - name: PROVISION 8GB swap + swappiness (gated — idempotent, persistent)
        if: ${{ inputs.add_swap }}
        run: |
          echo "=== provisioning swap (host had swap=0 — the OOM cushion that was missing) ==="
          ssh hostkey '
            set -e
            if swapon --show=NAME --noheadings 2>/dev/null | grep -q "/swapfile"; then
              echo "  /swapfile already active — skipping creation"
            else
              if [ ! -f /swapfile ]; then
                echo "  allocating /swapfile (8G)..."
                fallocate -l 8G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=8192 status=none
              fi
              chmod 600 /swapfile
              mkswap /swapfile >/dev/null 2>&1 || true
              # swapon can reject fallocate files with holes → fall back to dd-rewrite then retry
              if ! swapon /swapfile 2>/dev/null; then
                echo "  swapon rejected fallocate file (holes) — rewriting with dd..."
                swapoff /swapfile 2>/dev/null || true
                rm -f /swapfile
                dd if=/dev/zero of=/swapfile bs=1M count=8192 status=none
                chmod 600 /swapfile
                mkswap /swapfile >/dev/null
                swapon /swapfile
              fi
            fi
            grep -q "^/swapfile " /etc/fstab || echo "/swapfile none swap sw 0 0" >> /etc/fstab
            echo "vm.swappiness=10" > /etc/sysctl.d/99-himrate-swap.conf
            sysctl -w vm.swappiness=10 >/dev/null
            echo "=== verify ==="
            swapon --show
            echo "--- free -m ---"
            free -m | head -2
            echo "--- swappiness ---"
            cat /proc/sys/vm/swappiness
            echo "--- fstab entry ---"
            grep swapfile /etc/fstab || echo "(fstab entry missing!)"
          '

      - name: PG recovery diagnostic (crash-loop root cause — read-only)
        if: always()
        run: |
          echo "=== himrate-db status / restart count / last exit / OOM flag ==="
          ssh hostkey 'docker inspect himrate-db --format "State={{.State.Status}} Restarts={{.RestartCount}} ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} Error={{.State.Error}} StartedAt={{.State.StartedAt}}"' || true
          echo ""
          echo "=== docker logs himrate-db --tail 90 (PG startup / recovery / PANIC reason) ==="
          ssh hostkey 'docker logs himrate-db --tail 90 2>&1' || true
          echo ""
          echo "=== disk free (WAL replay / write needs space) ==="
          ssh hostkey 'df -h / /var/lib/docker 2>/dev/null | tail -4' || true
          echo ""
          echo "=== DISK-FULL culprit — top /var/lib/docker consumers ==="
          ssh hostkey 'du -sh /var/lib/docker/* 2>/dev/null | sort -rh | head -8' || true
          echo "=== docker system df ==="
          ssh hostkey 'docker system df 2>/dev/null' || true
          echo "=== biggest container json-file logs (crash-loop spam) ==="
          ssh hostkey 'du -sh /var/lib/docker/containers/*/*-json.log 2>/dev/null | sort -rh | head -8' || true
          echo "=== top disk hogs on / ==="
          ssh hostkey 'du -sh /var/* /opt 2>/dev/null | sort -rh | head -10' || true

      - name: Storage breakdown (CH table sizes + bind mounts + /root)
        if: always()
        run: |
          echo "=== ClickHouse table sizes (system.parts — instant, no du) ==="
          ssh hostkey 'docker exec himrate-clickhouse clickhouse-client --query "SELECT table, formatReadableSize(sum(bytes_on_disk)) AS disk, sum(rows) AS rows, min(min_date) AS oldest, max(max_date) AS newest FROM system.parts WHERE active GROUP BY table ORDER BY sum(bytes_on_disk) DESC LIMIT 15" 2>&1' || true
          echo "=== CH total on-disk ==="
          ssh hostkey 'docker exec himrate-clickhouse clickhouse-client --query "SELECT formatReadableSize(sum(bytes_on_disk)) FROM system.parts WHERE active" 2>&1' || true
          echo "=== bind-mount sources (clickhouse + db) ==="
          ssh hostkey 'docker inspect himrate-clickhouse himrate-db --format "{{.Name}}:{{range .Mounts}} {{.Source}}->{{.Destination}}({{.Type}});{{end}}" 2>&1' || true
          echo "=== /root top-level dirs (bounded) ==="
          ssh hostkey 'ls -la /root 2>/dev/null; echo "--- du /root/* ---"; timeout 90 du -shx /root/* 2>/dev/null | sort -rh | head -12' || true

      - name: PG counts
        run: |
          echo "=== DB row counts ==="
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "
            SELECT '\''channels'\'' AS t, count(*) AS n FROM channels
            UNION ALL SELECT '\''streams_total'\'', count(*) FROM streams
            UNION ALL SELECT '\''streams_live'\'', count(*) FROM streams WHERE ended_at IS NULL
            UNION ALL SELECT '\''ccv_snapshots'\'', count(*) FROM ccv_snapshots
            UNION ALL SELECT '\''chatters_snapshots'\'', count(*) FROM chatters_snapshots
            UNION ALL SELECT '\''bot_scores'\'', count(*) FROM per_user_bot_scores
            UNION ALL SELECT '\''psr'\'', count(*) FROM post_stream_reports
            UNION ALL SELECT '\''sfv'\'', count(*) FROM stream_feature_vectors
            ORDER BY t;
          "'

      - name: Overlap edge freshness (cross_channel_presences — single-pass query live-verify)
        run: |
          echo "=== cross_channel_presences freshness (worker runs every 5min; staleness <10min = healthy) ==="
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "
            SELECT count(*) AS total_edges,
                   count(*) FILTER (WHERE source = '\''live'\'') AS live_edges,
                   max(last_seen_at) AS newest_edge,
                   round(extract(epoch FROM (now() - max(last_seen_at)))/60.0, 1) AS staleness_min
            FROM cross_channel_presences;
          "'

      - name: User + overlap-cohort stats (action-map universe + 2+ channel/day cohort)
        run: |
          echo "=== distinct chatters = users whose action-map we track ==="
          echo "--- last 24h (daily active tracked users) ---"
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT uniqExact(username) FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 24 HOUR\""
          echo "--- last 7 days ---"
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT uniqExact(username) FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 7 DAY\""
          echo "--- ALL-TIME distinct chatters (total tracked universe) ---"
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT uniqExact(username) FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != ''\""
          echo ""
          echo "=== cohort: users writing in 2+ DISTINCT channels in 24h (overlap) — direct from CH ==="
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT count() FROM (SELECT username FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 24 HOUR GROUP BY username HAVING uniqExact(channel_login) >= 2)\""
          echo "--- distribution: how many in exactly 2, 3-5, 6-10, 11-30, 30+ channels (24h) ---"
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT multiIf(c=1,'1',c=2,'2',c<=5,'3-5',c<=10,'6-10',c<=30,'11-30','30+') AS band, count() AS users FROM (SELECT username, uniqExact(channel_login) AS c FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 24 HOUR GROUP BY username) GROUP BY band ORDER BY band\""
          echo ""
          echo "=== overlap cohort as stored in PG (cross_channel_presences, rolling 24h) ==="
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "SELECT count(DISTINCT username) AS overlap_users, count(*) AS edges FROM cross_channel_presences;"'

      - name: Temporal co-occurrence by window (2+/3+ channels within 30s/1m/5m/15m)
        run: |
          echo "=== are we PERSISTING this? cross_channel_temporal_flags (production signal = 5s / >=3ch) ==="
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "SELECT count(*) AS flagged_users, max(refreshed_at) AS last_refresh, round(extract(epoch FROM (now()-max(refreshed_at)))/60.0,1) AS staleness_min FROM cross_channel_temporal_flags;"'
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "SELECT bot_flag_tier, bot_type, count(*) FROM cross_channel_temporal_flags GROUP BY 1,2 ORDER BY 3 DESC LIMIT 12;"'
          echo ""
          echo "=== RECURRENCE: did it ONCE vs 2+ TIMES vs 3+ TIMES within window (R = # of separate events, 24h, two-phase) ==="
          for W in 30 60 300 900; do
            HALF=$((W/2))
            printf "window %4ss: " "$W"
            ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT concat('2+ch: once=', toString(countIf(R2>=1)), ' recur2+=', toString(countIf(R2>=2)), ' recur3+=', toString(countIf(R2>=3)), '   |   3+ch: once=', toString(countIf(R3>=1)), ' recur2+=', toString(countIf(R3>=2)), ' recur3+=', toString(countIf(R3>=3))) FROM (SELECT username, max(r2) AS R2, max(r3) AS R3 FROM (SELECT username, phase, countIf(ch>=2) AS r2, countIf(ch>=3) AS r3 FROM (SELECT username, phase, toStartOfInterval(subtractSeconds(timestamp, phase), INTERVAL ${W} SECOND) AS bucket, uniqExact(channel_login) AS ch FROM himrate_staging.chat_messages ARRAY JOIN [0, ${HALF}] AS phase WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 24 HOUR GROUP BY username, phase, bucket) GROUP BY username, phase) GROUP BY username) SETTINGS max_bytes_before_external_group_by=4000000000, max_memory_usage=12000000000\""
          done
          echo ""
          echo "=== PER-MESSAGE breakdown for RECURRENT bots (3+ channels within 60s, done 2+ times) ==="
          echo "    of THEIR messages: how many are coordinated cross-channel bursts vs normal single-channel:"
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT concat('recurrent_bots=', toString(count()), '  their_total_msgs=', toString(sum(total_msgs)), '  coordinated(3+ch/min)=', toString(sum(c3)), ' (', toString(round(100.0*sum(c3)/sum(total_msgs),1)), '%)', '  in-2+ch/min=', toString(sum(c2)), ' (', toString(round(100.0*sum(c2)/sum(total_msgs),1)), '%)') FROM (SELECT username, sum(msgs) AS total_msgs, sumIf(msgs, ch>=2) AS c2, sumIf(msgs, ch>=3) AS c3, countIf(ch>=3) AS R3 FROM (SELECT username, toStartOfInterval(timestamp, INTERVAL 60 SECOND) AS bucket, uniqExact(channel_login) AS ch, count() AS msgs FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 24 HOUR GROUP BY username, bucket) GROUP BY username HAVING R3>=2) SETTINGS max_bytes_before_external_group_by=4000000000, max_memory_usage=12000000000\""
          echo "--- platform baseline: what share of ALL chat messages (24h) are coordinated 3+ch/min bursts ---"
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT concat('total_msgs_24h=', toString(sum(msgs)), '  coordinated_3+ch/min=', toString(sumIf(msgs, ch>=3)), ' (', toString(round(100.0*sumIf(msgs, ch>=3)/sum(msgs),3)), '%)') FROM (SELECT toStartOfInterval(timestamp, INTERVAL 60 SECOND) AS bucket, username, uniqExact(channel_login) AS ch, count() AS msgs FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username != '' AND timestamp > now() - INTERVAL 24 HOUR GROUP BY username, bucket) SETTINGS max_bytes_before_external_group_by=4000000000, max_memory_usage=12000000000\""

      - name: TIH count via Rails (correct table name)
        run: |
          echo "=== TIH (TrustIndexHistory) ==="
          SHA=$(ssh hostkey 'docker ps --filter "name=himrate-web-staging" --format "{{.Names}}" | head -1 | sed "s/.*-//"')
          ssh hostkey "docker exec himrate-web-staging-\$(docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1 | awk -F- '{print \$NF}') bin/rails runner '
            puts \"TIH rows: #{TrustIndexHistory.count}\"
            puts \"TIH last hour: #{TrustIndexHistory.where(\"calculated_at > ?\", 1.hour.ago).count}\"
            puts \"Most populated channels:\"
            Channel.joins(:trust_index_histories).group(:login).order(\"count(trust_index_histories.id) DESC\").limit(10).count.each do |login, n|
              puts \"  #{login.ljust(25)} #{n}\"
            end
            puts
            puts \"Live streams now:\"
            Stream.where(ended_at: nil).joins(:channel).order(:started_at).limit(10).pluck(:login, :started_at).each do |login, started|
              dur = ((Time.current - started)/60).round
              puts \"  #{login.ljust(25)} live #{dur}m\"
            end
          ' 2>&1 | grep -v 'Flipper audit\\|Sidekiq 7\\|connecting to Redis\\|stackprof'"

      - name: Sidekiq queues
        run: |
          echo "=== Sidekiq queue depths ==="
          ssh hostkey "docker exec himrate-web-staging-\$(docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1 | awk -F- '{print \$NF}') bin/rails runner '
            require \"sidekiq/api\"
            Sidekiq::Queue.all.sort_by(&:name).each { |q| puts \"  :#{q.name.ljust(25)} #{q.size} jobs (latency #{q.latency.round(1)}s)\" }
            puts \"  --- retry: #{Sidekiq::RetrySet.new.size} | dead: #{Sidekiq::DeadSet.new.size} | scheduled: #{Sidekiq::ScheduledSet.new.size}\"
          ' 2>&1 | grep -v 'Flipper audit\\|Sidekiq 7\\|connecting to Redis\\|stackprof'"
