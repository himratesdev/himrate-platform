name: hostkey-probe

# Ad-hoc system snapshot of HOSTKEY VPS via CI runner (escapes my Claude env SSH rate-limit).
# Trigger via `gh workflow run hostkey-probe.yml` — runs PG counts + Sidekiq queue health + VPS load.

on:
  workflow_dispatch:
    inputs:
      apply_bft_caps:
        description: 'Apply hard CPU limits to the bft-* + xray containers (live docker update, reversible) so the side-service can never starve the host'
        required: false
        type: boolean
        default: false
      add_swap:
        description: 'Provision 8GB swapfile + vm.swappiness=10 (idempotent, persistent via fstab+sysctl.d) — the OOM cushion the host lacked (swap=0 amplified the storm)'
        required: false
        type: boolean
        default: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: VPS load + memory + disk
        run: |
          echo "=== VPS health ==="
          ssh hostkey "uptime; free -m | head -3; df -h / | tail -1"
          echo ""

      - name: Container roster
        run: |
          echo "=== Containers (target: 11 healthy) ==="
          ssh hostkey 'docker ps --format "table {{.Names}}\t{{.Status}}" 2>&1' | head -30

      - name: Per-container CPU/MEM (himrate-* vs bft-* attribution)
        run: |
          echo "=== docker stats --no-stream (sorted by CPU) ==="
          ssh hostkey "docker stats --no-stream --format '{{.CPUPerc}}\t{{.MemPerc}}\t{{.MemUsage}}\t{{.Name}}' 2>&1 | sort -rh | head -40"

      - name: Disk I/O + top processes (the known bottleneck)
        run: |
          echo "=== iostat (disk %util / await = the bottleneck) ==="
          ssh hostkey "command -v iostat >/dev/null && iostat -x 1 2 | awk 'NR>3' | tail -20 || echo 'iostat not installed (apt-get install sysstat)'"
          echo ""
          echo "=== top 12 processes by CPU ==="
          ssh hostkey "top -bn1 | head -19 | tail -13"
          echo ""
          echo "=== meminfo (creep watch) ==="
          ssh hostkey "grep -iE 'MemTotal|MemAvailable|Dirty|Writeback|Committed_AS' /proc/meminfo"

      - name: FORENSICS — pre-reboot kernel log (OOM/panic smoking gun)
        run: |
          echo "=== boots logged ==="
          ssh hostkey "journalctl --list-boots 2>/dev/null | tail -6 || echo 'no persistent journal'"
          echo ""
          echo "=== PRE-REBOOT kernel events (boot -1): OOM / panic / hung-task ==="
          ssh hostkey "journalctl -k -b -1 --no-pager 2>/dev/null | grep -iE 'out of memory|oom-kill|killed process|invoked oom|panic|hung_task|blocked for more than|general protection|watchdog' | tail -40 || echo '(no boot -1 journal — not persistent)'"
          echo ""
          echo "=== PRE-REBOOT last 40 log lines before freeze (boot -1 tail) ==="
          ssh hostkey "journalctl -b -1 --no-pager 2>/dev/null | tail -40 || echo '(no boot -1)'"
          echo ""
          echo "=== CURRENT boot OOM/kill since reboot ==="
          ssh hostkey "dmesg -T 2>/dev/null | grep -iE 'oom|killed process|panic|hung' | tail -15 || echo 'none'"

      - name: FORENSICS — swap, vmstat, disk I/O delta (manual, no sysstat)
        run: |
          echo "=== swap config ==="
          ssh hostkey "swapon --show 2>/dev/null || echo 'NO SWAP configured'; echo '--- vm.swappiness ---'; cat /proc/sys/vm/swappiness; echo '--- overcommit ---'; cat /proc/sys/vm/overcommit_memory /proc/sys/vm/overcommit_ratio"
          echo ""
          echo "=== vmstat (r=runnable b=blocked si/so=swap wa=iowait) ==="
          ssh hostkey "command -v vmstat >/dev/null && vmstat 1 3 || echo 'vmstat absent'"
          echo ""
          echo "=== diskstats delta over 2s (manual %util proxy) ==="
          ssh hostkey "grep -E ' (sda|vda|dm-0|nvme0n1) ' /proc/diskstats; sleep 2; echo '--- +2s ---'; grep -E ' (sda|vda|dm-0|nvme0n1) ' /proc/diskstats"

      - name: FORENSICS — bft-* cluster limits + images
        run: |
          echo "=== bft-* + xray resource limits (HostConfig) ==="
          for c in bft-collector bft-placer bft-betboom-placer bft-orchestrator bft-dota-live bft-dota-live-steam bft-smurf-monitor xray-ru; do
            ssh hostkey "docker inspect $c --format '$c: mem_limit={{.HostConfig.Memory}} memswap={{.HostConfig.MemorySwap}} cpus={{.HostConfig.NanoCpus}} cpu_shares={{.HostConfig.CpuShares}} restart={{.HostConfig.RestartPolicy.Name}} image={{.Config.Image}}' 2>/dev/null || echo '$c: not found'"
          done

      - name: APPLY hard CPU caps to bft-* + xray (gated — live docker update, reversible)
        if: ${{ inputs.apply_bft_caps }}
        run: |
          echo "=== applying CPU caps (was cpus=0 unlimited → bounded so the side-service can never starve the host) ==="
          ssh hostkey "docker update --cpus=2.0 bft-collector && echo '  bft-collector -> 2.0 cpu'"
          ssh hostkey "docker update --cpus=1.0 bft-placer && echo '  bft-placer -> 1.0 cpu'"
          ssh hostkey "docker update --cpus=1.0 bft-betboom-placer && echo '  bft-betboom-placer -> 1.0 cpu'"
          ssh hostkey "docker update --cpus=0.5 xray-ru && echo '  xray-ru -> 0.5 cpu'"
          echo ""
          echo "=== raise Chrome-container memory floor (700MB too small for Playwright Chrome → stops the OOM-kill storm) ==="
          ssh hostkey "docker update --memory=1536m --memory-swap=3072m bft-placer && echo '  bft-placer mem 700MB -> 1.5GB'"
          ssh hostkey "docker update --memory=1536m --memory-swap=3072m bft-betboom-placer && echo '  bft-betboom-placer mem 700MB -> 1.5GB'"
          echo ""
          echo "=== verify NanoCpus + mem after (0 = unlimited; want bounded) ==="
          for c in bft-collector bft-placer bft-betboom-placer xray-ru bft-orchestrator bft-dota-live bft-dota-live-steam bft-smurf-monitor; do
            ssh hostkey "docker inspect $c --format '  $c: NanoCpus={{.HostConfig.NanoCpus}} mem_limit={{.HostConfig.Memory}}' 2>/dev/null || echo '  $c: not found'"
          done

      - name: PROVISION 8GB swap + swappiness (gated — idempotent, persistent)
        if: ${{ inputs.add_swap }}
        run: |
          echo "=== provisioning swap (host had swap=0 — the OOM cushion that was missing) ==="
          ssh hostkey '
            set -e
            if swapon --show=NAME --noheadings 2>/dev/null | grep -q "/swapfile"; then
              echo "  /swapfile already active — skipping creation"
            else
              if [ ! -f /swapfile ]; then
                echo "  allocating /swapfile (8G)..."
                fallocate -l 8G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=8192 status=none
              fi
              chmod 600 /swapfile
              mkswap /swapfile >/dev/null 2>&1 || true
              # swapon can reject fallocate files with holes → fall back to dd-rewrite then retry
              if ! swapon /swapfile 2>/dev/null; then
                echo "  swapon rejected fallocate file (holes) — rewriting with dd..."
                swapoff /swapfile 2>/dev/null || true
                rm -f /swapfile
                dd if=/dev/zero of=/swapfile bs=1M count=8192 status=none
                chmod 600 /swapfile
                mkswap /swapfile >/dev/null
                swapon /swapfile
              fi
            fi
            grep -q "^/swapfile " /etc/fstab || echo "/swapfile none swap sw 0 0" >> /etc/fstab
            echo "vm.swappiness=10" > /etc/sysctl.d/99-himrate-swap.conf
            sysctl -w vm.swappiness=10 >/dev/null
            echo "=== verify ==="
            swapon --show
            echo "--- free -m ---"
            free -m | head -2
            echo "--- swappiness ---"
            cat /proc/sys/vm/swappiness
            echo "--- fstab entry ---"
            grep swapfile /etc/fstab || echo "(fstab entry missing!)"
          '

      - name: PG counts
        run: |
          echo "=== DB row counts ==="
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "
            SELECT '\''channels'\'' AS t, count(*) AS n FROM channels
            UNION ALL SELECT '\''streams_total'\'', count(*) FROM streams
            UNION ALL SELECT '\''streams_live'\'', count(*) FROM streams WHERE ended_at IS NULL
            UNION ALL SELECT '\''ccv_snapshots'\'', count(*) FROM ccv_snapshots
            UNION ALL SELECT '\''chatters_snapshots'\'', count(*) FROM chatters_snapshots
            UNION ALL SELECT '\''bot_scores'\'', count(*) FROM per_user_bot_scores
            UNION ALL SELECT '\''psr'\'', count(*) FROM post_stream_reports
            UNION ALL SELECT '\''sfv'\'', count(*) FROM stream_feature_vectors
            ORDER BY t;
          "'

      - name: TIH count via Rails (correct table name)
        run: |
          echo "=== TIH (TrustIndexHistory) ==="
          SHA=$(ssh hostkey 'docker ps --filter "name=himrate-web-staging" --format "{{.Names}}" | head -1 | sed "s/.*-//"')
          ssh hostkey "docker exec himrate-web-staging-\$(docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1 | awk -F- '{print \$NF}') bin/rails runner '
            puts \"TIH rows: #{TrustIndexHistory.count}\"
            puts \"TIH last hour: #{TrustIndexHistory.where(\"calculated_at > ?\", 1.hour.ago).count}\"
            puts \"Most populated channels:\"
            Channel.joins(:trust_index_histories).group(:login).order(\"count(trust_index_histories.id) DESC\").limit(10).count.each do |login, n|
              puts \"  #{login.ljust(25)} #{n}\"
            end
            puts
            puts \"Live streams now:\"
            Stream.where(ended_at: nil).joins(:channel).order(:started_at).limit(10).pluck(:login, :started_at).each do |login, started|
              dur = ((Time.current - started)/60).round
              puts \"  #{login.ljust(25)} live #{dur}m\"
            end
          ' 2>&1 | grep -v 'Flipper audit\\|Sidekiq 7\\|connecting to Redis\\|stackprof'"

      - name: Sidekiq queues
        run: |
          echo "=== Sidekiq queue depths ==="
          ssh hostkey "docker exec himrate-web-staging-\$(docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1 | awk -F- '{print \$NF}') bin/rails runner '
            require \"sidekiq/api\"
            Sidekiq::Queue.all.sort_by(&:name).each { |q| puts \"  :#{q.name.ljust(25)} #{q.size} jobs (latency #{q.latency.round(1)}s)\" }
            puts \"  --- retry: #{Sidekiq::RetrySet.new.size} | dead: #{Sidekiq::DeadSet.new.size} | scheduled: #{Sidekiq::ScheduledSet.new.size}\"
          ' 2>&1 | grep -v 'Flipper audit\\|Sidekiq 7\\|connecting to Redis\\|stackprof'"

      - name: TEMP — validate host-safety-baseline logic (non-failing dry-run)
        run: |
          echo "=== dry-run of host-safety-baseline invariant script against live host ==="
          ssh hostkey 'bash -s' <<'REMOTE'
          set -u
          FAIL=0
          echo "### HOST SAFETY BASELINE — $(date -u +%FT%TZ) ###"
          echo ""
          SWAP_KB=$(awk '/SwapTotal/{print $2}' /proc/meminfo)
          if [ "${SWAP_KB:-0}" -eq 0 ]; then
            echo "FAIL  swap=0 — no OOM cushion"
            FAIL=1
          else
            echo "ok    swap = $((SWAP_KB/1024)) MB"
          fi
          OOM_CT=$(journalctl -k --since "20 min ago" --no-pager 2>/dev/null | grep -c "Killed process" || true)
          if [ "${OOM_CT:-0}" -gt 0 ]; then
            echo "FAIL  ${OOM_CT} OOM-kill(s) in the last 20 min"
            FAIL=1
          else
            echo "ok    no OOM-kills in the last 20 min"
          fi
          MEMAVAIL_KB=$(awk '/MemAvailable/{print $2}' /proc/meminfo)
          if [ "${MEMAVAIL_KB:-0}" -lt 1572864 ]; then
            echo "FAIL  MemAvailable $((MEMAVAIL_KB/1024)) MB < 1536 MB"
            FAIL=1
          else
            echo "ok    MemAvailable = $((MEMAVAIL_KB/1024)) MB"
          fi
          UNTRUSTED=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -E '^(bft-|xray)' || true)
          if [ -z "$UNTRUSTED" ]; then
            echo "ok    no bft-/xray co-tenant containers running"
          else
            for c in $UNTRUSTED; do
              NANO=$(docker inspect "$c" --format '{{.HostConfig.NanoCpus}}' 2>/dev/null || echo 0)
              MEM=$(docker inspect "$c" --format '{{.HostConfig.Memory}}' 2>/dev/null || echo 0)
              if [ "${NANO:-0}" -eq 0 ]; then
                echo "FAIL  $c has cpus=0 (UNLIMITED CPU)"
                FAIL=1
              fi
              if [ "${MEM:-0}" -eq 0 ]; then
                echo "FAIL  $c has NO memory limit"
                FAIL=1
              fi
            done
            for c in bft-collector bft-placer bft-betboom-placer; do
              echo "$UNTRUSTED" | grep -qx "$c" || continue
              MEM=$(docker inspect "$c" --format '{{.HostConfig.Memory}}' 2>/dev/null || echo 0)
              if [ "${MEM:-0}" -ne 0 ] && [ "${MEM:-0}" -lt 1610612736 ]; then
                echo "FAIL  $c mem $((MEM/1024/1024)) MB < 1536 MB Chrome floor"
                FAIL=1
              fi
            done
            [ "$FAIL" -eq 0 ] && echo "ok    all bft-/xray containers cpus>0 + mem within floor"
            echo "      (untrusted containers seen: $(echo $UNTRUSTED | tr '\n' ' '))"
          fi
          COMMIT_KB=$(awk '/Committed_AS/{print $2}' /proc/meminfo)
          MEMTOTAL_KB=$(awk '/MemTotal/{print $2}' /proc/meminfo)
          echo ""
          echo "ctx   Committed_AS = $(( COMMIT_KB * 100 / MEMTOTAL_KB ))% of MemTotal | $(uptime)"
          echo ""
          echo "### MONITOR-WOULD-EXIT = $FAIL  (1 = would alert RED, 0 = green) ###"
          exit 0
          REMOTE
