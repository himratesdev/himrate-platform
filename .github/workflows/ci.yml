name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  # === Lint (rubocop) — on every PR ===
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop

  # === Security scan — on every PR ===
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec brakeman --no-pager
      - run: bundle exec bundler-audit

  # === Tests (rspec) — on every PR ===
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: himrate_test
          POSTGRES_PASSWORD: himrate_test
          POSTGRES_DB: himrate_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U himrate_test" --health-interval=3s --health-timeout=3s --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=3s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Setup DB
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://himrate_test:himrate_test@localhost:5432/himrate_test
          REDIS_URL: redis://localhost:6379/0
        # TASK-039 MF-3: db:create db:migrate (explicit) вместо db:prepare —
        # schema_format = :sql, а structure.sql не committed в репо.
        # db:migrate runs от scratch, structure.sql auto-generated после.
        run: bundle exec rails db:create db:migrate
      - name: Run RSpec
        env:
          RAILS_ENV: test
          TWITCH_CLIENT_ID: test_client_id
          TWITCH_CLIENT_SECRET: test_client_secret
          TWITCH_REDIRECT_URI: http://localhost:3000/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID: test_google_client_id
          GOOGLE_CLIENT_SECRET: test_google_client_secret
          GOOGLE_REDIRECT_URI: http://localhost:3000/api/v1/auth/google/callback
          DATABASE_URL: postgres://himrate_test:himrate_test@localhost:5432/himrate_test
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec rspec

  # === Deploy to Staging — on merge to main ===
  deploy-staging:
    needs: [lint, security, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
      - run: gem install kamal
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host 194.135.85.159
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config
      # Kamal reads secrets через `.kamal/secrets-common` + `.kamal/secrets.<destination>`
      # files — они evaluated как shell scripts, pulling values из env vars.
      # Мы передаём все secrets через env block ниже (not writing .kamal/secrets.staging).
      # Benefits: unified с local deploy pattern (один источник для всех env vars
      # → см. docs/runbooks/kamal_local_deploy.md), secrets не trailing в filesystem
      # после run, нет risk commit .kamal/secrets.* accidentally.
      - name: Deploy to staging
        env:
          # KAMAL_REGISTRY_PASSWORD: automatic workflow credential с `packages: write`
          # scope (declared в permissions block выше). Ephemeral, auto-rotated per run.
          # Production deploy uses dedicated PAT (см. deploy-production job).
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL: redis://himrate-redis:6379/1
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI: https://staging.himrate.com/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: https://staging.himrate.com/api/v1/auth/google/callback
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD: ${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER: ${{ secrets.FLIPPER_UI_USER }}
          ALLOWED_EXTENSION_ID: ${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
          EVENTSUB_WEBHOOK_URL: https://staging.himrate.com
        run: kamal setup -d staging

  # === Verify Staging Deploy — after deploy-staging ===
  verify-staging:
    needs: [deploy-staging]
    if: always() && needs.deploy-staging.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify staging deployment
        uses: ./.github/actions/verify-deployment
        with:
          destination: staging
          expected_sha: ${{ github.sha }}
          host: ${{ vars.STAGING_HOST }}
          health_url: https://staging.himrate.com/health
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

  # === Deploy to Production — on tag v*.*.* ===
  deploy-production:
    needs: [lint, security, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      # Registry auth через dedicated PAT (secrets.KAMAL_REGISTRY_PASSWORD), НЕ
      # через workflow GITHUB_TOKEN → packages scope здесь не нужен. Staging
      # job contrast: staging использует GITHUB_TOKEN для pull → ему packages: write.
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
      - run: gem install kamal
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host 194.135.85.159
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config
      # Mirror deploy-staging env block structure для unified mental model.
      # Production-specific deltas:
      #   • URLs: api.himrate.com (subdomain для backend, himrate.com = landing)
      #   • DATABASE_URL: inline constructed from POSTGRES_PASSWORD (single source
      #     of truth — не создаём отдельный PRODUCTION_DATABASE_URL secret)
      #   • REDIS_URL: DB index /0 (staging /1 — logical separation on same Redis)
      #   • KAMAL_REGISTRY_PASSWORD: dedicated PAT (repo secret), не ephemeral
      #     GITHUB_TOKEN — production deploy requires explicit, audit-visible
      #     credential с controlled rotation
      #   • EVENTSUB_WEBHOOK_URL: api.himrate.com (EventSub subscriptions будут
      #     создаваться manually на первом release как часть launch runbook)
      - name: Deploy to production
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # ⚠️ POSTGRES_PASSWORD ДОЛЖЕН быть URL-safe (hex charset). Generate через
          # `openssl rand -hex 32`, НЕ `-base64 32` (base64 содержит +/= которые
          # ломают URI parsing). Same constraint applies для STAGING_DATABASE_URL secret.
          DATABASE_URL: postgres://himrate:${{ secrets.POSTGRES_PASSWORD }}@himrate-db:5432/himrate_production
          REDIS_URL: redis://himrate-redis:6379/0
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI: https://api.himrate.com/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: https://api.himrate.com/api/v1/auth/google/callback
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD: ${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER: ${{ secrets.FLIPPER_UI_USER }}
          ALLOWED_EXTENSION_ID: ${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
          EVENTSUB_WEBHOOK_URL: https://api.himrate.com
        # kamal setup (vs kamal deploy): idempotent full boot — app + proxy +
        # accessories. Безопасен на subsequent runs (Kamal skips healthy components).
        # Немного тяжелее kamal deploy (~30s дополнительно на accessory health checks),
        # но gives консистентный entry point: один command для first v*.* и для
        # subsequent releases. Future optimization: split first-time setup в manual
        # workflow, auto releases use kamal deploy (lighter).
        run: kamal setup -d production
