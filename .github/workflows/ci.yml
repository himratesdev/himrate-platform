name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*.*.*']
  # Manual fallback: GitHub occasionally fails to dispatch the push-triggered run for a squash
  # merge (observed 2026-07-19 — #355 landed on main with no CI/CD run). workflow_dispatch lets us
  # force a deploy of main HEAD without an empty commit / direct push.
  workflow_dispatch:

jobs:
  # === Lint (rubocop) — on every PR ===
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rubocop
      # TASK-085 FR-024 (ADR-085 D-2): legal-safe wording CI gate.
      # Fails build if 'bot_wave' string literal found in app/spec/db/seeds/lib.
      # Per CLAUDE.md ERV labels v3 strict — see lib/tasks/audit.rake.
      - run: bundle exec rake audit:verify_no_bot_wave

  # === Security scan — on every PR ===
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec brakeman --no-pager
      - run: bundle exec bundler-audit

  # === Tests (rspec) — on every PR ===
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: himrate_test
          POSTGRES_PASSWORD: himrate_test
          POSTGRES_DB: himrate_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready -U himrate_test" --health-interval=3s --health-timeout=3s --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=3s --health-timeout=3s --health-retries=10
      # TASK-251.14: real ClickHouse for the Clickhouse::Client integration specs (project rule:
      # mocked unit + real integration). Same image tag as the staging/prod accessory; default user
      # password-protected (mirrors deploy) so the client auth path is exercised for real.
      clickhouse:
        image: clickhouse/clickhouse-server:24.8.14.39
        env:
          CLICKHOUSE_DB: himrate_test
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: himrate_test
        ports:
          - 8123:8123
        options: --health-cmd="clickhouse-client --user default --password himrate_test --query 'SELECT 1'" --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Setup DB
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://himrate_test:himrate_test@localhost:5432/himrate_test
          REDIS_URL: redis://localhost:6379/0
        # TASK-039 MF-3: db:create db:migrate (explicit) вместо db:prepare —
        # schema_format = :sql, а structure.sql не committed в репо.
        # db:migrate runs от scratch, structure.sql auto-generated после.
        run: bundle exec rails db:create db:migrate
      # TASK-251.14: provision the ClickHouse schema (db/clickhouse/*.sql) before RSpec, the CH
      # analogue of "Setup DB". Idempotent; the integration specs assert chat_messages is queryable.
      - name: Setup ClickHouse schema
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://himrate_test:himrate_test@localhost:5432/himrate_test
          REDIS_URL: redis://localhost:6379/0
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "8123"
          CLICKHOUSE_DATABASE: himrate_test
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: himrate_test
        run: bundle exec rake clickhouse:setup
      # TASK-060: build the landing Tailwind bundle before specs. The compiled
      # app/assets/builds/tailwind.css is gitignored, so propshaft cannot resolve
      # stylesheet_link_tag "tailwind" in view-rendering request specs without it.
      # Also validates the Tailwind config + content globs compile on every PR.
      - name: Build Tailwind CSS
        env:
          RAILS_ENV: test
        run: bundle exec rails tailwindcss:build
      - name: Run RSpec
        env:
          RAILS_ENV: test
          TWITCH_CLIENT_ID: test_client_id
          TWITCH_CLIENT_SECRET: test_client_secret
          TWITCH_REDIRECT_URI: http://localhost:3000/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID: test_google_client_id
          GOOGLE_CLIENT_SECRET: test_google_client_secret
          GOOGLE_REDIRECT_URI: http://localhost:3000/api/v1/auth/google/callback
          DATABASE_URL: postgres://himrate_test:himrate_test@localhost:5432/himrate_test
          REDIS_URL: redis://localhost:6379/0
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "8123"
          CLICKHOUSE_DATABASE: himrate_test
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: himrate_test
        run: bundle exec rspec

  # === Deploy to Staging — on merge to main ===
  deploy-staging:
    needs: [lint, security, test]
    # Also deploy on manual workflow_dispatch — GitHub sometimes drops the push-triggered run for a
    # squash merge (2026-07-19: #355/#356 landed on main with no CI/CD run), leaving main HEAD
    # undeployed. `gh workflow run ci.yml --ref main` then force-deploys main HEAD without a hack.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    # BUG-251.17b: 15m was too tight once deploy_timeout went to 120s (BUG-251.17; now 240s — deploy-fix). Under live VPS
    # load each role's boot can take several minutes, and kamal rolls every role (web/irc/job/
    # whisper_worker) serially after the image build → total exceeded 15m and GitHub cancelled
    # mid-roll (left whisper_worker on the old SHA). 30m covered build + a slow 4-role serial roll
    # under contention.
    #
    # 2026-06-03 follow-up: PR #274 added the 8th app role (monitoring_worker). Worst-case wall-time
    # = build (~5m) + 8 roles × deploy_timeout 240s = ~5m + 32m = ~37m. The PR #274 first deploy
    # cancelled at 30m with whisper/stream/signal_compute/signals/monitoring_worker still on the
    # old SHA. Bumped to 45m: 8 roles × 240s = 32m for the roll itself + 13m headroom for build /
    # push / lock / boot waits. Wall-clock budget only; root cause = VPS capacity (separate
    # hardware track, Phase 7 R).
    timeout-minutes: 45
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
      - run: gem install kamal
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config
      # Validate required secrets fail-fast ДО kamal invocation.
      # Предотвращает silent empty-value deploy: если какой-то secret не set
      # в repo, kamal получит пустое значение → app crash в runtime или broken
      # feature. Здесь явный список — при добавлении нового secret нужно
      # одновременно update env.secret в deploy.yml И этот check.
      - name: Validate required secrets
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD: ${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER: ${{ secrets.FLIPPER_UI_USER }}
          PO_DEBUG_PASSWORD: ${{ secrets.PO_DEBUG_PASSWORD }}
          ALLOWED_EXTENSION_ID: ${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
          # BUG-010 PR1: Observability stack accessories secrets
          TELEGRAM_OPS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          TELEGRAM_CRITICAL_CHAT_ID: ${{ secrets.TELEGRAM_CRITICAL_CHAT_ID }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          TELEGRAM_INFO_CHAT_ID: ${{ secrets.TELEGRAM_INFO_CHAT_ID }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_OIDC_CLIENT_ID: ${{ secrets.GRAFANA_OIDC_CLIENT_ID }}
          GRAFANA_OIDC_CLIENT_SECRET: ${{ secrets.GRAFANA_OIDC_CLIENT_SECRET }}
          # BUG-010 PR2 (ADR DEC-3): fine-grained PAT for auto-remediation workflow dispatch
          AUTO_TRIGGER_GH_PAT: ${{ secrets.AUTO_TRIGGER_GH_PAT }}
        run: |
          set -euo pipefail
          MISSING=()
          for var in RAILS_MASTER_KEY POSTGRES_PASSWORD CLICKHOUSE_PASSWORD STAGING_DATABASE_URL \
                     JWT_SECRET SECRET_KEY_BASE \
                     TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET \
                     GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET YOUTUBE_API_KEY \
                     ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY \
                     ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY \
                     ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT \
                     FLIPPER_UI_PASSWORD FLIPPER_UI_USER \
                     ALLOWED_EXTENSION_ID TWITCH_WEBHOOK_SECRET \
                     TELEGRAM_OPS_BOT_TOKEN TELEGRAM_CRITICAL_CHAT_ID \
                     TELEGRAM_OPS_CHAT_ID TELEGRAM_INFO_CHAT_ID \
                     GRAFANA_ADMIN_USER GRAFANA_ADMIN_PASSWORD \
                     GRAFANA_OIDC_CLIENT_ID GRAFANA_OIDC_CLIENT_SECRET \
                     AUTO_TRIGGER_GH_PAT; do
            [ -z "${!var:-}" ] && MISSING+=("$var")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required repo secrets:"
            printf '::error::  • %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "✓ All 27 required secrets present"
      # File-write approach для Kamal secrets. Эмпирически проверено что
      # Kamal 2.11 корректно работает только с `.kamal/secrets.<destination>`
      # файлом (env-block alone — broken docker login на ghcr, incident
      # 2026-04-19 PR #87/88 merge deploys). File sourced first, env vars
      # set properly, затем kamal runs docker commands.
      - name: Write Kamal secrets
        run: |
          cat > .kamal/secrets.staging <<SECRETS
          KAMAL_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL=redis://himrate-redis:6379/1
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI=https://staging.himrate.com/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_REDIRECT_URI=https://staging.himrate.com/api/v1/auth/google/callback
          OAUTH_ALLOWED_REDIRECT_URIS=https://gnnhhopjghkjdbjafhefmbckakbjkabp.chromiumapp.org/
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD=${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER=${{ secrets.FLIPPER_UI_USER }}
          PO_DEBUG_PASSWORD=${{ secrets.PO_DEBUG_PASSWORD }}
          ALLOWED_EXTENSION_ID=${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET=${{ secrets.TWITCH_WEBHOOK_SECRET }}
          EVENTSUB_WEBHOOK_URL=https://staging.himrate.com
          # BUG-010 PR1: Observability stack accessories secrets
          TELEGRAM_OPS_BOT_TOKEN=${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          TELEGRAM_CRITICAL_CHAT_ID=${{ secrets.TELEGRAM_CRITICAL_CHAT_ID }}
          TELEGRAM_OPS_CHAT_ID=${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          TELEGRAM_INFO_CHAT_ID=${{ secrets.TELEGRAM_INFO_CHAT_ID }}
          GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_OIDC_CLIENT_ID=${{ secrets.GRAFANA_OIDC_CLIENT_ID }}
          GRAFANA_OIDC_CLIENT_SECRET=${{ secrets.GRAFANA_OIDC_CLIENT_SECRET }}
          AUTO_TRIGGER_GH_PAT=${{ secrets.AUTO_TRIGGER_GH_PAT }}
          SECRETS
      # Routine staging deploy = `kamal deploy` (app роли web/job/whisper_worker/irc only), НЕ `kamal setup`.
      # Was setup (idempotent full-boot). Switched (deploy-fix): на загруженном 3-core VPS
      # (combat load ~9-11 + ClickHouse accessory #194/#196) setup full-boot перепроверяет/грузит
      # ВСЕ accessory configs каждый деплой → раздувал deploy-окно → новый web не успевал пройти
      # healthcheck под нагрузкой → deploy aborted (PR #195 deploy + re-run оба: "target failed to
      # become healthy within 2m0s"). `kamal deploy` переразворачивает только app-роли (accessories
      # уже забутены предыдущими setup-прогонами; clickhouse #194/#196 verified Up на staging).
      # Следствие setup→deploy: NET-NEW accessory теперь требует explicit `kamal accessory boot <name>`
      # (setup делал это авто, deploy — нет); изменение config СУЩЕСТВУЮЩЕГО accessory → `kamal accessory
      # reboot <name>` (требовалось и раньше — setup/deploy не пересоздают запущенный accessory).
      # Runbook: docs/runbooks/accessory_ops.md (+ правило accessory-config-change в проектном workflow).
      #
      # Defense-in-depth: trap EXIT гарантирует cleanup .kamal/secrets.staging
      # после step exit (success OR failure). Runner ephemeral всё равно, но
      # снижает окно exposure если CI logs или cache checkpoints capture files.
      - name: Deploy to staging
        run: |
          trap 'rm -f .kamal/secrets.staging' EXIT
          kamal deploy -d staging

  # === Verify Staging Deploy — after deploy-staging ===
  verify-staging:
    needs: [deploy-staging]
    if: always() && needs.deploy-staging.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify staging deployment
        uses: ./.github/actions/verify-deployment
        with:
          destination: staging
          expected_sha: ${{ github.sha }}
          host: ${{ vars.STAGING_HOST }}
          health_url: https://staging.himrate.com/health
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

  # === Deploy to Production — on tag v*.*.* ===
  deploy-production:
    needs: [lint, security, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # BUG-251.17b: same 30m budget as deploy-staging. Production deploys to the same VPS, inherits
    # the same root-level deploy_timeout (240s — raised 120→240 by the staging deploy-fix; root-level
    # key applies to BOTH destinations, so production gets the longer boot headroom too — intentional,
    # prod is heavier WEB_CONCURRENCY=2), and rolls the same 4 roles serially — same (or worse)
    # exposure to the 15m cancel. (Production deploy command itself stays `kamal setup` — first-provision.)
    timeout-minutes: 30
    environment: production
    permissions:
      # Registry auth через dedicated PAT (secrets.KAMAL_REGISTRY_PASSWORD), НЕ
      # через workflow GITHUB_TOKEN → packages scope здесь не нужен. Staging
      # job contrast: staging использует GITHUB_TOKEN для pull → ему packages: write.
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
      - run: gem install kamal
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config
      # Fail-fast validation ДО kamal invocation (symmetric со staging).
      - name: Validate required secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD: ${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER: ${{ secrets.FLIPPER_UI_USER }}
          PO_DEBUG_PASSWORD: ${{ secrets.PO_DEBUG_PASSWORD }}
          ALLOWED_EXTENSION_ID: ${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
          # BUG-010 PR1: Observability stack accessories secrets
          TELEGRAM_OPS_BOT_TOKEN: ${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          TELEGRAM_CRITICAL_CHAT_ID: ${{ secrets.TELEGRAM_CRITICAL_CHAT_ID }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          TELEGRAM_INFO_CHAT_ID: ${{ secrets.TELEGRAM_INFO_CHAT_ID }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_OIDC_CLIENT_ID: ${{ secrets.GRAFANA_OIDC_CLIENT_ID }}
          GRAFANA_OIDC_CLIENT_SECRET: ${{ secrets.GRAFANA_OIDC_CLIENT_SECRET }}
          AUTO_TRIGGER_GH_PAT: ${{ secrets.AUTO_TRIGGER_GH_PAT }}
        run: |
          set -euo pipefail
          MISSING=()
          for var in KAMAL_REGISTRY_PASSWORD RAILS_MASTER_KEY POSTGRES_PASSWORD CLICKHOUSE_PASSWORD \
                     JWT_SECRET SECRET_KEY_BASE \
                     TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET \
                     GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET YOUTUBE_API_KEY \
                     ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY \
                     ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY \
                     ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT \
                     FLIPPER_UI_PASSWORD FLIPPER_UI_USER \
                     ALLOWED_EXTENSION_ID TWITCH_WEBHOOK_SECRET \
                     TELEGRAM_OPS_BOT_TOKEN TELEGRAM_CRITICAL_CHAT_ID \
                     TELEGRAM_OPS_CHAT_ID TELEGRAM_INFO_CHAT_ID \
                     GRAFANA_ADMIN_USER GRAFANA_ADMIN_PASSWORD \
                     GRAFANA_OIDC_CLIENT_ID GRAFANA_OIDC_CLIENT_SECRET \
                     AUTO_TRIGGER_GH_PAT; do
            [ -z "${!var:-}" ] && MISSING+=("$var")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required repo secrets для production deploy:"
            printf '::error::  • %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "✓ All 27 required secrets present"
      # W-1 fix: URL-encode POSTGRES_PASSWORD перед DATABASE_URL construction.
      # Python urllib.parse.quote обрабатывает ЛЮБОЙ password (base64 with +/=,
      # special chars, пробелы) — no format constraint на operator. Writes
      # constructed URL в GITHUB_ENV → доступен в последующих steps.
      - name: Construct DATABASE_URL (URL-encoded password)
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          ENCODED=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_PASSWORD"], safe=""))')
          echo "::add-mask::$ENCODED"
          echo "DATABASE_URL=postgres://himrate:${ENCODED}@himrate-db:5432/himrate_production" >> "$GITHUB_ENV"
      # Mirror deploy-staging file-write pattern. Production-specific deltas:
      #   • URLs: api.himrate.com (subdomain для backend, himrate.com = landing)
      #   • DATABASE_URL: URL-encoded от POSTGRES_PASSWORD (constructed above)
      #   • REDIS_URL: DB index /0 (staging /1 — logical separation same Redis)
      #   • KAMAL_REGISTRY_PASSWORD: dedicated PAT (repo secret) вместо ephemeral
      #     GITHUB_TOKEN — production requires audit-visible credential с
      #     controlled rotation (см. docs/runbooks/kamal_local_deploy.md)
      #   • EVENTSUB_WEBHOOK_URL: api.himrate.com (EventSub subscriptions setup
      #     manually на первом release per launch runbook)
      - name: Write Kamal secrets
        run: |
          cat > .kamal/secrets.production <<SECRETS
          KAMAL_REGISTRY_PASSWORD=${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=redis://himrate-redis:6379/0
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI=https://api.himrate.com/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_REDIRECT_URI=https://api.himrate.com/api/v1/auth/google/callback
          # BUG-027: production extension redirect_uri = the CWS-published item's
          # chromiumapp.org URL (ext-id assigned by Chrome Web Store, unknown until
          # CWS submission — T3-009 / CO-007). Set it here then, mirroring staging.
          # Explicit (empty for now) so deploy.yml env.secret + secrets-common have no
          # dangling reference and the deferral is documented vs an accidental omission.
          OAUTH_ALLOWED_REDIRECT_URIS=
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD=${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER=${{ secrets.FLIPPER_UI_USER }}
          PO_DEBUG_PASSWORD=${{ secrets.PO_DEBUG_PASSWORD }}
          ALLOWED_EXTENSION_ID=${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET=${{ secrets.TWITCH_WEBHOOK_SECRET }}
          EVENTSUB_WEBHOOK_URL=https://api.himrate.com
          # BUG-010 PR1: Observability stack accessories secrets
          TELEGRAM_OPS_BOT_TOKEN=${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          TELEGRAM_CRITICAL_CHAT_ID=${{ secrets.TELEGRAM_CRITICAL_CHAT_ID }}
          TELEGRAM_OPS_CHAT_ID=${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          TELEGRAM_INFO_CHAT_ID=${{ secrets.TELEGRAM_INFO_CHAT_ID }}
          GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_OIDC_CLIENT_ID=${{ secrets.GRAFANA_OIDC_CLIENT_ID }}
          GRAFANA_OIDC_CLIENT_SECRET=${{ secrets.GRAFANA_OIDC_CLIENT_SECRET }}
          AUTO_TRIGGER_GH_PAT=${{ secrets.AUTO_TRIGGER_GH_PAT }}
          SECRETS
      # kamal setup: idempotent full-boot (see staging decision comment выше).
      # Future optimization (when prod becomes real traffic): split first-time
      # manual workflow_dispatch setup, tag releases use kamal deploy (lighter).
      # Trap EXIT cleanup для defense-in-depth (see staging).
      - name: Deploy to production
        run: |
          trap 'rm -f .kamal/secrets.production' EXIT
          kamal setup -d production
