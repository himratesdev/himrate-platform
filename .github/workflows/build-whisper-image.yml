name: Build Whisper Image

# TASK-110 v1.2: builds + pushes whisper.cpp HTTP server accessory image к ghcr.io.
# Mirrors build-db-image.yml pattern (accessory custom images built в CI, не локально).
#
# Trigger sequence для TASK-110 merge:
#   • Pre-merge: PO/CI runs `gh workflow run build-whisper-image.yml --ref <feature-branch>`
#     (workflow_dispatch) → builds + pushes ghcr.io/himratesdev/himrate-whisper:<tag> →
#     image exists ПЕРЕД merge → post-merge `kamal accessory boot whisper` succeeds.
#   • Post-merge: push к main с изменением whisper/Dockerfile OR deploy.yml tag → auto-rebuild.
#
# Tag = SINGLE SOURCE OF TRUTH из config/deploy.yml accessories.whisper.image (zero drift).

on:
  push:
    branches: [main]
    paths:
      - 'whisper/Dockerfile'
      - 'config/deploy.yml' # tag bump triggers rebuild (single source)
      - '.github/workflows/build-whisper-image.yml'
  workflow_dispatch: # manual trigger для pre-merge build + rebuilds

permissions:
  contents: read
  packages: write
  security-events: write # trivy SARIF upload в GitHub Security tab

jobs:
  build-whisper-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # whisper.cpp compile + 466MB model download
    steps:
      - uses: actions/checkout@v4.2.2

      # Extract image tag из config/deploy.yml — SINGLE SOURCE OF TRUTH.
      # deploy.yml accessories.whisper.image — authoritative version reference.
      - name: Read image reference from deploy.yml via pinned yq
        id: read_image
        uses: mikefarah/yq@v4.53.2
        with:
          cmd: yq '.accessories.whisper.image' config/deploy.yml

      - name: Extract tag portion and validate
        id: image_tag
        run: |
          set -euo pipefail

          IMAGE="${{ steps.read_image.outputs.result }}"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ]; then
            echo "::error::accessories.whisper.image не найден в config/deploy.yml"
            exit 1
          fi

          TAG="${IMAGE##*:}"
          if [ -z "$TAG" ] || [ "$TAG" = "$IMAGE" ]; then
            echo "::error::Image reference без tag: $IMAGE"
            echo "::error::Expected format: ghcr.io/himratesdev/himrate-whisper:<TAG>"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✓ Image: $IMAGE"
          echo "✓ Tag:   $TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      # BUG-110-A: build → load locally → SMOKE TEST → push. Smoke gates the push so
      # a runtime-broken image (missing .so libs → exit 127) НИКОГДА не попадает на ghcr.
      - name: Build whisper.cpp HTTP server image (load locally, no push yet)
        id: build
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./whisper
          file: ./whisper/Dockerfile
          load: true
          push: false
          tags: ghcr.io/himratesdev/himrate-whisper:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # BUG-110-A regression guard: verify ALL whisper-server dynamic deps resolve
      # (libwhisper.so.1 + libggml*.so + libggml-cpu.so). Без них → ld-linux exit 127.
      # ldd "not found" check = precise test для этого bug class (не зависит от --help
      # exit-code поведения). Fail здесь → push НЕ выполняется → broken image не на registry.
      - name: Smoke test — whisper-server runtime libs resolve (BUG-110-A guard)
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/himratesdev/himrate-whisper:${{ steps.image_tag.outputs.tag }}"
          echo "Smoke-testing $IMAGE — ldd dynamic linker resolution"
          LDD_OUT="$(docker run --rm --entrypoint sh "$IMAGE" -c 'ldd /usr/local/bin/whisper-server')"
          echo "$LDD_OUT"
          if echo "$LDD_OUT" | grep -q 'not found'; then
            echo "::error::whisper-server has unresolved shared libraries (BUG-110-A regression)"
            exit 1
          fi
          echo "✓ All whisper-server shared libraries resolve"

      - name: Push whisper image to ghcr (after smoke pass)
        run: docker push "ghcr.io/himratesdev/himrate-whisper:${{ steps.image_tag.outputs.tag }}"

      # CVE scan через trivy. Non-blocking (exit-code 0) — upstream Debian base
      # может содержать CVEs вне нашего контроля. SARIF upload в GitHub Security tab.
      - name: Scan image for CVEs (report-only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/himratesdev/himrate-whisper:${{ steps.image_tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0 # non-blocking — upstream CVEs не блокируют deploy

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4.36.3
        with:
          sarif_file: trivy-results.sarif
          category: whisper-image
