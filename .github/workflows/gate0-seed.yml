name: gate0-seed
# T1-074 GATE-0 Phase-A seed — writes the calibrated per-cell ρ* baselines + llr_temporal_r7 into
# staging (CalibrationCellBaseline / CalibrationConstant). PO-sanctioned flip mechanism: this is a
# DATA update (DEC-3: calibration decoupled from code — no redeploy). Idempotent (find_or_initialize;
# re-dispatch after each miner densification to expand coverage). The engine flip itself is separate:
# flipper-toggle ti_v2_engine enable.
#
# CELLS = shadow-mined, CROSS-RUN POOLED (runs 29746489151/29753053748/29780540466/29783579044/
# 29784014697 → 82 distinct hygiene-clean anchors, deduped by channel keeping the freshest per-stream
# MEDIAN of live SCW ρ_obs — the engine's own runtime distribution). Pooling is REQUIRED: docker
# json-log rotation caps each harvest at ~25-30 min regardless of --since hours, so single runs
# plateau at ~30-50 anchors. Raw pool: _tasks/T1-074/rho-raw/pool.txt (verivio-clode).
# Phase-A conservative: n≥7 cells only; uncovered cells stay dormant-green (default ρ*=0.03).
# Mirror: _tasks/T1-074/gate0-seed.rb (verivio-clode).
on:
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options: [hostkey]
        default: hostkey

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Build seed script
        run: |
          cat > /tmp/gate0.rb <<'RUBY_EOF'
          $stdout.sync = true
          # [category, v_bucket, chat_mode, language, rho_star, rho_lo, rho_hi, sample_size]
          # language = literal DB value ("RU" uppercase — CellResolver compares verbatim; the
          # first seed wrote lowercase "ru" → resolver MISS → engine fell back to DEFAULT 0.03).
          CELLS = [
            [ "gaming",        "0-1k",  "open",           "RU", 0.803, 0.271, 1.629, 13 ],
            [ "gaming",        "0-1k",  "followers-only", "RU", 0.695, 0.206, 1.357, 14 ],
            [ "gaming",        "1k-5k", "followers-only", "RU", 0.331, 0.304, 0.357, 7 ],
            [ "esports",       "0-1k",  "followers-only", "RU", 0.369, 0.152, 0.657, 9 ],
            [ "just_chatting", "0-1k",  "followers-only", "RU", 0.246, 0.116, 0.447, 7 ],
            [ "just_chatting", "1k-5k", "followers-only", "RU", 0.213, 0.198, 0.271, 7 ]
          ].freeze

          # cleanup the mis-cased first-seed rows (language "ru") — dead rows the resolver never hits
          purged = CalibrationCellBaseline.where(language: "ru").delete_all
          puts "purged mis-cased rows: #{purged}"

          puts "== GATE-0 Phase-A seed: #{CELLS.size} cells =="
          CELLS.each do |cat, vb, cm, lang, star, lo, hi, n|
            b = CalibrationCellBaseline.find_or_initialize_by(category: cat, v_bucket: vb, chat_mode: cm, language: lang)
            b.assign_attributes(rho_star: star, rho_lo: lo, rho_hi: hi, sample_size: n, calibrated: true)
            b.save!
            puts "  #{cat}|#{vb}|#{cm}|#{lang} -> rho*=#{star} lo=#{lo} hi=#{hi} n=#{n} (calibrated)"
          end

          puts "== threshold: llr_temporal_r7 -> 6.2 (R7-confirmed temporal -> named B_hard; PO aggressive-RED decision 2026-07-20) =="
          c = CalibrationConstant.find_or_initialize_by(key: "llr_temporal_r7")
          c.assign_attributes(value: 6.2, calibrated: true, source: "gate0_holdout")
          c.save!
          puts "  llr_temporal_r7 = #{c.value}"

          puts "\ncells calibrated: #{CalibrationCellBaseline.where(calibrated: true).count} / #{CalibrationCellBaseline.count}"
          puts "NEXT: flipper-toggle ti_v2_engine enable -> STRICT live-verify (honest anchor green, gta6news-class amber)."
          RUBY_EOF
          echo "Built ($(wc -l < /tmp/gate0.rb) lines)"

      - name: Run seed on ${{ inputs.target }}
        run: |
          TARGET="${{ inputs.target }}"
          scp /tmp/gate0.rb ${TARGET}:/tmp/gate0.rb
          CONTAINER=$(ssh ${TARGET} "docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1")
          echo "container: ${CONTAINER}"
          ssh ${TARGET} "docker cp /tmp/gate0.rb ${CONTAINER}:/tmp/gate0.rb && docker exec ${CONTAINER} sh -c 'bin/rails runner /tmp/gate0.rb 2>&1; echo RAILS_EXIT=\$?'" 2>&1 | grep -vE 'Flipper audit|connecting to Redis|stackprof|Please add|KnownBotService: init' || true
