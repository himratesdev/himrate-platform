name: sync-signal-weights

# Sync signal_configurations table from Time4VPS (Phase 4 J calibrated weights)
# to HOSTKEY (currently has default base weights).
#
# Read-only on Time4VPS. Write on HOSTKEY (upsert by id+signal_key combo).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (read both, diff, no write)'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          Host time4vps
            HostName 194.135.85.159
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Dump signal_configurations from Time4VPS (real schema)
        run: |
          ssh time4vps "docker exec himrate-db psql -U himrate -d himrate_staging -tAc \"
            SELECT row_to_json(t) FROM (
              SELECT id, signal_type, category, param_name, param_value
              FROM signal_configurations
              ORDER BY signal_type, category, param_name
            ) t
          \"" > /tmp/time4vps_signals.json
          echo "Lines dumped: $(wc -l < /tmp/time4vps_signals.json)"
          echo ""
          echo "=== First 5 rows ==="
          head -5 /tmp/time4vps_signals.json

      - name: Compare with HOSTKEY current
        run: |
          ssh hostkey "docker exec himrate-db psql -U himrate -d himrate_staging -tAc \"
            SELECT row_to_json(t) FROM (
              SELECT id, signal_type, category, param_name, param_value
              FROM signal_configurations
              ORDER BY signal_type, category, param_name
            ) t
          \"" > /tmp/hostkey_signals.json
          echo "HOSTKEY lines: $(wc -l < /tmp/hostkey_signals.json)"
          echo ""
          echo "=== DIFF ==="
          if diff -q /tmp/time4vps_signals.json /tmp/hostkey_signals.json > /dev/null; then
            echo "IDENTICAL"
          else
            echo "DIFFERENT — sync needed"
            echo ""
            echo "=== Per-(signal_type, param_name) diff ==="
            python3 <<'PY'
          import json
          with open('/tmp/time4vps_signals.json') as f:
              t4 = [json.loads(l) for l in f if l.strip()]
          with open('/tmp/hostkey_signals.json') as f:
              hk = [json.loads(l) for l in f if l.strip()]
          print(f"Time4VPS rows: {len(t4)}")
          print(f"HOSTKEY rows:  {len(hk)}")
          t4_idx = {(r['signal_type'], r['category'], r['param_name']): r['param_value'] for r in t4}
          hk_idx = {(r['signal_type'], r['category'], r['param_name']): r['param_value'] for r in hk}
          all_keys = set(t4_idx) | set(hk_idx)
          changes = 0
          for k in sorted(all_keys):
              t4v = t4_idx.get(k)
              hkv = hk_idx.get(k)
              if t4v != hkv:
                  changes += 1
                  print(f"  {k[0]:30} cat={k[1]:10} {k[2]:25} t4={t4v}  hk={hkv}")
          print(f"\nTotal differences: {changes}")
          PY
          fi

      - name: Apply Time4VPS weights to HOSTKEY (skip if dry_run)
        if: inputs.dry_run == 'false'
        run: |
          echo "Applying weights to HOSTKEY..."
          cat > /tmp/sync_signals.rb <<'RUBY_EOF'
          $stdout.sync = true
          require 'json'
          rows = File.readlines('/tmp/time4vps_signals.json').map { |l| JSON.parse(l) rescue nil }.compact
          puts "Rows to upsert: #{rows.size}"
          applied = 0
          created = 0
          updated = 0
          rows.each do |r|
            key = { signal_type: r['signal_type'], category: r['category'], param_name: r['param_name'] }
            existing = SignalConfiguration.find_by(key)
            if existing
              if existing.param_value.to_s != r['param_value'].to_s
                existing.update!(param_value: r['param_value'])
                updated += 1
              end
            else
              SignalConfiguration.create!(key.merge(param_value: r['param_value']))
              created += 1
            end
            applied += 1
          rescue => e
            puts "FAIL #{r['signal_type']}/#{r['category']}/#{r['param_name']}: #{e.class}: #{e.message}"
          end
          puts "Applied: #{applied}/#{rows.size}  (created=#{created}, updated=#{updated})"
          puts "HOSTKEY rows now: #{SignalConfiguration.count}"
          RUBY_EOF

          # Copy data + script to HOSTKEY then exec
          scp /tmp/time4vps_signals.json hostkey:/tmp/time4vps_signals.json
          scp /tmp/sync_signals.rb hostkey:/tmp/sync_signals.rb
          CONTAINER=$(ssh hostkey "docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1")
          ssh hostkey "docker cp /tmp/time4vps_signals.json ${CONTAINER}:/tmp/time4vps_signals.json && docker cp /tmp/sync_signals.rb ${CONTAINER}:/tmp/sync_signals.rb && docker exec ${CONTAINER} sh -c 'bin/rails runner /tmp/sync_signals.rb 2>&1' | grep -vE 'Flipper audit|Sidekiq 7|connecting to Redis|stackprof'"

      - name: Final verify HOSTKEY weights match
        if: inputs.dry_run == 'false'
        run: |
          ssh hostkey "docker exec himrate-db psql -U himrate -d himrate_staging -c \"
            SELECT signal_type, category, param_name, param_value
            FROM signal_configurations
            WHERE param_name = 'weight'
            ORDER BY signal_type, category
          \""
