name: ch-truncate

# Reclaim disk by TRUNCATE'ing ClickHouse's unbounded system-log tables (BUG-DISK-FULL). These are
# CH-internal observability tables (text_log/processors_profile_log/query_log/trace_log/...), never
# queried by the app — safe to truncate. #340's constrained.xml caps FUTURE growth but only on CH
# restart, and does not touch the EXISTING ~139 GiB. This frees it so PG can write again (staging up).
# After this: run accessory-ops reboot clickhouse to apply the #340 cap (needs PG up first).

on:
  workflow_dispatch:

jobs:
  truncate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Disk BEFORE + CH table sizes
        run: |
          echo "=== df BEFORE ==="; ssh hostkey "df -h /" || true
          echo "=== top CH tables by disk ==="
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query \"SELECT database, table, formatReadableSize(sum(bytes_on_disk)) sz FROM system.parts WHERE active GROUP BY database, table ORDER BY sum(bytes_on_disk) DESC LIMIT 12\" 2>&1" || true

      - name: Free host room first (docker json-logs + journald) — NON-DATA, unblocks CH TRUNCATE
        run: |
          # Disk is at 0 bytes free → CH can't reserve even 1 MiB to run TRUNCATE (Code 243
          # NOT_ENOUGH_SPACE). Reclaim a few GB from container stderr logs + journald (pure logs,
          # zero DB/app data) so CH has room to self-truncate. A day of PG/CH crash-loop produced
          # large *-json.log files.
          echo "=== container json-log sizes (top) ==="
          ssh hostkey "du -sh /var/lib/docker/containers/*/*-json.log 2>/dev/null | sort -rh | head -8" || true
          echo "=== truncate all container json-logs (stderr only, safe) ==="
          ssh hostkey "find /var/lib/docker/containers -name '*-json.log' -exec truncate -s 0 {} + 2>&1" || true
          echo "=== journald vacuum to 200M ==="
          ssh hostkey "journalctl --vacuum-size=200M 2>&1 | tail -2" || true
          echo "=== df after log cleanup ==="; ssh hostkey "df -h /" || true

      - name: TRUNCATE CH system-log tables (force_drop bypasses max_table_size_to_drop 50G guard)
        run: |
          for t in text_log processors_profile_log query_log query_thread_log trace_log metric_log \
                   asynchronous_metric_log part_log opentelemetry_span_log session_log error_log \
                   backup_log blob_storage_log crash_log zookeeper_log latency_log; do
            echo "--- TRUNCATE system.$t (with force_drop_table flag) ---"
            # CH refuses TRUNCATE/DROP on tables > max_table_size_to_drop (50G default). The
            # force_drop_table flag file bypasses it for ONE op, then CH auto-removes it → re-create per table.
            ssh hostkey "docker exec himrate-clickhouse bash -c 'mkdir -p /var/lib/clickhouse/flags && touch /var/lib/clickhouse/flags/force_drop_table && chmod 666 /var/lib/clickhouse/flags/force_drop_table' 2>&1" || true
            ssh hostkey "docker exec himrate-clickhouse clickhouse-client --query 'TRUNCATE TABLE IF EXISTS system.$t' 2>&1" || true
          done

      - name: Restart ClickHouse (force physical part cleanup + apply #340 constrained.xml cap)
        run: |
          echo "=== restart himrate-clickhouse (forces reclaim of truncated parts + applies cap) ==="
          ssh hostkey "docker restart himrate-clickhouse" || true
          sleep 30
          ssh hostkey "docker ps --filter name=himrate-clickhouse --format '{{.Names}} {{.Status}}'" || true

      - name: Disk AFTER
        run: |
          echo "=== df AFTER (post CH restart) ==="; ssh hostkey "df -h /" || true

      - name: Restart himrate-db + verify PG
        run: |
          echo "=== restart himrate-db ==="; ssh hostkey "docker restart himrate-db" || true
          sleep 20
          echo "=== himrate-db status ==="; ssh hostkey "docker ps --filter name=himrate-db --format '{{.Names}} {{.Status}}'" || true
          echo "=== pg_isready ==="; ssh hostkey "docker exec himrate-db pg_isready 2>&1" || true
