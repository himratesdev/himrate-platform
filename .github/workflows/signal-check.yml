name: signal-check

# Deep-dive per-channel verification — все 11 TI сигналов + 25 ML features + bot detection + lifecycle.
# Запускается через `gh workflow run signal-check.yml -f login=<twitch_login>`.

on:
  workflow_dispatch:
    inputs:
      login:
        description: 'Twitch login (channel to deep-dive)'
        required: true
        type: string
      target:
        description: 'Which VPS to probe (read-only Rails probe via SSH)'
        required: true
        type: choice
        options:
          - hostkey
          - time4vps
        default: hostkey

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          Host time4vps
            HostName 194.135.85.159
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Build deep-dive script
        run: |
          LOGIN="${{ inputs.login }}"
          cat > /tmp/deep-dive.rb <<RUBY_EOF
          login = "${LOGIN}"
          RUBY_EOF
          cat >> /tmp/deep-dive.rb <<'RUBY_EOF'
          $stdout.sync = true

          # Helper — safe iterate with each section in begin/rescue
          def section(title)
            puts "\n## #{title}"
            yield
          rescue => e
            puts "  ERROR: #{e.class}: #{e.message[0..200]}"
          end

          c = Channel.find_by(login: login)
          unless c
            puts "Channel not found: #{login}"
            exit
          end

          # === SCHEMA introspection — use model.table_name for accuracy ===
          section("Schema introspection") do
            models = [Channel, Stream, CcvSnapshot, ChattersSnapshot, TrustIndexHistory,
                      PerUserBotScore, PostStreamReport, StreamFeatureVector,
                      StreamerReputation, FollowerSnapshot]
            models.each do |m|
              t = m.table_name
              cols = ActiveRecord::Base.connection.columns(t).map(&:name).join(", ")
              puts "  #{m.name} (#{t}): #{cols}"
            rescue => e
              puts "  #{m.name}: ERROR #{e.message[0..80]}"
            end
          end

          # === CHANNEL meta ===
          section("Channel: #{c.login}") do
            puts "  twitch_id: #{c.twitch_id}"
            puts "  broadcaster_type: #{c.broadcaster_type}"
            puts "  display_name: #{c.display_name}"
            %w[follower_count language created_at].each do |attr|
              puts "  #{attr}: #{c.public_send(attr) rescue 'n/a'}" if c.respond_to?(attr)
            end
          end

          # === LATEST STREAM ===
          s = Stream.where(channel_id: c.id).order(started_at: :desc).first
          unless s
            puts "No streams"
            exit
          end

          section("Latest stream #{s.id}") do
            puts "  started_at: #{s.started_at.iso8601}"
            is_live = s.ended_at.nil?
            puts "  state: #{is_live ? "LIVE #{((Time.current - s.started_at)/60).round}m" : "ended #{s.ended_at.iso8601}"}"
            %w[category_name twitch_category_id category_id source].each do |attr|
              val = s.public_send(attr) rescue nil
              puts "  #{attr}: #{val || 'n/a'}" if s.respond_to?(attr)
            end
          end

          # === CCV polling — what's the actual viewer count? (sort by timestamp, not created_at) ===
          section("CcvSnapshot — RAW VIEWER COUNT over time") do
            ccv = CcvSnapshot.where(stream_id: s.id).order(:timestamp).limit(1000)
            puts "  total snapshots: #{ccv.count}"
            if ccv.any?
              vals = ccv.pluck(:ccv_count)
              puts "  peak CCV: #{vals.max}"
              puts "  min CCV: #{vals.min}"
              puts "  mean CCV: #{(vals.sum.to_f / vals.size).round(1)}"
              puts "  median CCV: #{vals.sort[vals.size/2]}"
              puts "  latest CCV: #{vals.last} @ #{ccv.last.timestamp.iso8601}"
              puts "  real_viewers_estimate (latest): #{ccv.last.real_viewers_estimate} (confidence #{ccv.last.confidence})"
              puts "  range: #{vals.min}..#{vals.max} (delta=#{vals.max - vals.min})"
            end
          end

          # === CHATTERS over time — REAL raw metrics for signals ===
          section("ChattersSnapshot — RAW METRICS FOR SIGNALS") do
            cs = ChattersSnapshot.where(stream_id: s.id).order(:timestamp).limit(1000)
            puts "  total snapshots: #{cs.count}"
            last = cs.last
            if last
              puts "  Latest snapshot @ #{last.timestamp.iso8601}"
              %w[unique_chatters_count total_messages_count auth_ratio chatters_present_total broadcasters_count moderators_count vips_count staff_count viewers_count_present].each do |c|
                val = last.public_send(c) rescue nil
                puts "    #{c.ljust(28)} #{val}"
              end
              vl = last.viewer_logins
              puts "    viewer_logins: #{vl.is_a?(Array) ? "[#{vl.size} entries] sample=#{vl.first(3).inspect}" : vl.inspect[0..80]}"
              # Aggregates over stream
              puts
              puts "  Stream aggregates:"
              chatters_arr = cs.pluck(:unique_chatters_count).compact
              messages_arr = cs.pluck(:total_messages_count).compact
              auth_ratios = cs.pluck(:auth_ratio).compact
              puts "    unique_chatters peak: #{chatters_arr.max} mean: #{(chatters_arr.sum.to_f/chatters_arr.size).round(1) rescue 'n/a'}"
              puts "    total_messages peak: #{messages_arr.max} mean: #{(messages_arr.sum.to_f/messages_arr.size).round(1) rescue 'n/a'}"
              puts "    auth_ratio mean: #{(auth_ratios.sum.to_f/auth_ratios.size).round(3) rescue 'n/a'}"
            end
          end

          # === COMPUTED raw metrics correlating signals to data ===
          section("DERIVED metrics — what does each TI signal MEASURE?") do
            latest_ccv = CcvSnapshot.where(stream_id: s.id).order(:timestamp).last
            latest_chat = ChattersSnapshot.where(stream_id: s.id).order(:timestamp).last
            scores = PerUserBotScore.where(stream_id: s.id)

            puts "  ## Signal #1 auth_ratio:"
            puts "    Real auth_ratio (from latest chatter snapshot): #{latest_chat&.auth_ratio}"
            puts "    Interpretation: % of present viewers authenticated (logged in)"
            puts "    Signal value 0.0 = no anomaly (high auth ratio = healthy)"
            puts
            puts "  ## Signal #2 chatter_ccv_ratio:"
            cccr = latest_chat && latest_ccv && latest_ccv.ccv_count > 0 ? (latest_chat.unique_chatters_count.to_f / latest_ccv.ccv_count).round(4) : nil
            puts "    Real ratio: #{cccr} (chatters #{latest_chat&.unique_chatters_count} / CCV #{latest_ccv&.ccv_count})"
            puts "    Signal: lower ratio (more lurkers) = more suspicious. 0.0 = baseline OK"
            puts
            puts "  ## Signal #3 ccv_step_function:"
            puts "    Current CCV: #{latest_ccv&.ccv_count}"
            puts "    Game: #{s.respond_to?(:game_name) ? s.game_name : 'n/a'}"
            puts "    Signal value 0.0807 = mild category-relative anomaly"
            puts
            puts "  ## Signal #4 ccv_tier_clustering:"
            puts "    Total CCV samples: #{latest_ccv ? CcvSnapshot.where(stream_id: s.id).count : 0}"
            puts "    Signal 0.0 = CCV tiers stable, no clustering anomaly"
            puts
            puts "  ## Signal #5 chat_behavior:"
            puts "    Total msgs (latest): #{latest_chat&.total_messages_count}"
            puts "    Unique chatters: #{latest_chat&.unique_chatters_count}"
            puts "    Signal value 0.0423 = slight chat pattern flag (confidence 0.5)"
            puts
            puts "  ## Signal #6 channel_protection_score:"
            puts "    Signal 0.0 = no/minimal channel restrictions (followers-only/subs-only/etc OFF)"
            puts
            puts "  ## Signal #7 cross_channel_presence:"
            puts "    Signal 0.0 = viewers not heavily multi-channel-bot-like"
            puts
            puts "  ## Signal #8 known_bot_match:"
            probable = scores.where(classification: "probable_bot").count
            confirmed = scores.where(classification: "confirmed_bot").count
            puts "    Probable bots: #{probable} / #{scores.count} (#{(probable*100.0/scores.count).round(1)}%)"
            puts "    Confirmed bots: #{confirmed} / #{scores.count} (#{(confirmed*100.0/scores.count).round(1)}%)"
            puts "    Signal 0.0 = below threshold (typical = <5% known bots ok)"
            puts
            puts "  ## Signal #9 raid_attribution:"
            puts "    Signal 0.0 = no raid-related anomalies (no incoming raids attributed)"
            puts
            puts "  ## Signal #10 ccv_chat_correlation:"
            puts "    Signal 0.0 = CCV+chat msg rate correlated normally"
            puts
            puts "  ## Signal #11 account_profile_scoring:"
            puts "    Signal 0.0 = scored chatter profiles (age/follows) normal"
          end

          # === TIH — Trust Index pipeline output ===
          section("TrustIndexHistory — TI pipeline") do
            tih = TrustIndexHistory.where(stream_id: s.id).order(:calculated_at)
            puts "  total TIH rows for this stream: #{tih.count}"
            last = tih.last
            if last
              puts "  Latest @ #{last.calculated_at.iso8601}"
              %w[trust_index_score erv_count erv_percentage cold_start_tier].each do |attr|
                val = last.public_send(attr) rescue 'n/a'
                puts "  #{attr}: #{val}" if last.respond_to?(attr)
              end
              puts
              puts "  ==== 11 SIGNALS BREAKDOWN (FULL DETAIL) ===="
              sb = last.signal_breakdown
              if sb.is_a?(Hash)
                signals_order = %w[auth_ratio chatter_ccv_ratio ccv_step_function ccv_tier_clustering
                                    chat_behavior channel_protection_score cross_channel_presence
                                    known_bot_match raid_attribution ccv_chat_correlation account_profile_scoring]
                signals_order.each_with_index do |sig, i|
                  data = sb[sig]
                  puts "  Signal ##{i+1}: #{sig}"
                  if data.is_a?(Hash)
                    data.each { |k, v| puts "      #{k}: #{v.inspect}" }
                  elsif data.nil?
                    puts "      <nil>"
                  else
                    puts "      #{data.inspect}"
                  end
                  puts
                end
                # Print any extra keys not in signal_order
                extra = sb.keys - signals_order
                if extra.any?
                  puts "  Additional breakdown keys: #{extra.inspect}"
                  extra.each { |k| puts "      #{k}: #{sb[k].inspect[0..200]}" }
                end
              else
                puts "  signal_breakdown not Hash: #{sb.class} = #{sb.inspect[0..200]}"
              end
            end
          end

          # === Bot detection — find correct FK ===
          section("PerUserBotScore — bot detection per stream") do
            cols = ActiveRecord::Base.connection.columns("per_user_bot_scores").map(&:name)
            puts "  available columns: #{cols.inspect}"
            scope = if cols.include?("stream_id")
              PerUserBotScore.where(stream_id: s.id)
            elsif cols.include?("channel_id")
              PerUserBotScore.where(channel_id: c.id)
            else
              nil
            end
            if scope
              total = scope.count
              puts "  total scored for this stream: #{total}"
              if total.positive?
                by_class = scope.group(:classification).count
                %w[human low_suspicion suspicious probable_bot confirmed_bot].each do |cls|
                  cnt = by_class[cls] || 0
                  pct = (cnt * 100.0 / total).round(1)
                  puts "    #{cls.ljust(20)} #{cnt.to_s.rjust(6)}  (#{pct}%)"
                end
                # Sample one
                sample = scope.first
                if sample
                  puts "  Sample bot score (#{sample.respond_to?(:username) ? sample.username : 'n/a'}):"
                  sample.attributes.each do |k, v|
                    next if k.end_with?("_id") && k != "twitch_user_id"
                    puts "    #{k}: #{v.to_s[0..100]}"
                  end
                end
              end
            end
          end

          # === Post-stream ===
          section("PostStreamReport") do
            psr = PostStreamReport.where(stream_id: s.id).first
            if psr
              puts "  generated @ #{psr.created_at rescue (psr.calculated_at rescue 'n/a')}"
              psr.attributes.each { |k, v| puts "    #{k}: #{v.inspect[0..120]}" unless k.end_with?("_id") }
            else
              puts "  not yet (live or pending)"
            end
          end

          # === ML features ===
          section("StreamFeatureVector — 25 ML features") do
            sfv = StreamFeatureVector.where(stream_id: s.id).first
            if sfv
              puts "  generated"
              features = %w[chatter_to_ccv_ratio peak_to_average_ccv_ratio ccv_coefficient_of_variation ccv_tier_stickiness
                            message_entropy unique_message_ratio single_message_chatter_ratio emote_only_ratio
                            avg_inter_message_interval_sec timing_regularity_score nlp_contextual_relevance_score
                            avg_account_age_days account_creation_date_clustering_gini profile_completeness_ratio engagement_participation_ratio
                            follower_growth_cv_90d growth_engagement_correlation follow_unfollow_churn_rate attributed_spike_ratio
                            trust_index_30d_std chat_rate_30d_cv viewer_retention_avg_sec
                            account_age_days_capped total_streams_capped total_hours_capped]
              features.each_with_index do |f, i|
                val = sfv.respond_to?(f) ? sfv.public_send(f) : nil
                marker = val.nil? ? "NIL" : "OK"
                puts "    ##{(i+1).to_s.rjust(2)} #{f.ljust(40)} #{marker} #{val.is_a?(Float) ? val.round(4) : val}"
              end
            else
              puts "  not yet (stream still live)"
            end
          end

          # === StreamerReputation — known broken (BUG #1) ===
          section("StreamerReputation (3 components)") do
            cols = ActiveRecord::Base.connection.columns("streamer_reputations").map(&:name)
            puts "  available columns: #{cols.inspect}"
            scope = StreamerReputation.where(channel_id: c.id)
            puts "  rows for this channel: #{scope.count}"
            row = scope.order(calculated_at: :desc).first
            if row
              puts "  Latest row:"
              row.attributes.each { |k, v| puts "    #{k}: #{v.inspect[0..100]}" }
            else
              puts "  no row (RefreshWorker needs >= 7 completed streams)"
            end
          end

          # === Anomaly distribution + Reputation Band (BUG-band-unstable diagnostics) ===
          section("Anomaly distribution + Reputation Band") do
            window_ids = c.streams.where.not(ended_at: nil).order(ended_at: :desc).limit(30).pluck(:id)
            n = window_ids.size
            puts "  window completed streams: #{n}"
            by_type = Anomaly.where(stream_id: window_ids).group(:anomaly_type).count
            puts "  anomaly rows by type (window):"
            by_type.sort_by { |_, cnt| -cnt }.each { |t, cnt| puts "    #{t}: #{cnt}" }
            severe_types = (Reputation::BandService::SEVERE_ANOMALY_TYPES rescue
              %w[viewbot_spike anomaly_wave follow_bot raid_bot chat_bot known_bot_match account_profile_scoring])
            total_rows = by_type.values.sum
            severe_streams = Anomaly.where(stream_id: window_ids, anomaly_type: severe_types).distinct.count(:stream_id)
            rate = n.zero? ? 0.0 : (severe_streams.to_f / n).round(3)
            puts "  whitelist (bot-identity severe types): #{severe_types.inspect}"
            puts "  total anomaly rows (all types): #{total_rows}"
            puts "  severe STREAMS (distinct, bot-identity): #{severe_streams}/#{n} -> rate #{rate} (>0.34 = unstable)"
            puts "  band (deployed code): #{Reputation::BandService.new(c).call.inspect}"
          end

          # === FollowerSnapshot — adapt to real columns ===
          section("FollowerSnapshot") do
            cols = ActiveRecord::Base.connection.columns("follower_snapshots").map(&:name)
            puts "  available columns: #{cols.inspect}"
            ts_col = %w[created_at synced_at calculated_at snapshotted_at recorded_at observed_at].find { |c| cols.include?(c) }
            scope = FollowerSnapshot.where(channel_id: c.id)
            puts "  rows: #{scope.count}"
            row = ts_col ? scope.order(ts_col => :desc).first : scope.first
            if row
              row.attributes.each { |k, v| puts "    #{k}: #{v.inspect[0..100]}" }
            else
              puts "  no snapshot"
            end
          end

          # === Stream peak/avg derive (PR-A1) ===
          section("Stream derive methods (PR-A1)") do
            puts "  current_peak_ccv: #{s.current_peak_ccv rescue 'method missing'}"
            puts "  current_avg_ccv: #{s.current_avg_ccv rescue 'method missing'}"
            puts "  current_duration_ms: #{s.current_duration_ms rescue 'method missing'}"
          end

          # T1-057 calibration probes (Probe-1 single-event + Probe-2 R-distribution) removed —
          # results durably captured in SRS §2 (runs 28141174374 + 28142215588); git history 5e9b804.
          # Kept: DSV probes below (the pre-Dev gate). Trimmed to stay under GH Actions 21000 expr limit.

          # === T1-057 DSV — Data Source Verification (live probes, no mocks) ===
          # Gate BEFORE Dev: confirm the real sources the SRS/ADR depend on actually work.
          section("T1-057 DSV — FR-D0 data-map quality (last 1h privmsg)") do
            q = <<~SQL
              SELECT count() AS total,
                     countIf(stream_id IS NULL) AS null_stream,
                     round(countIf(stream_id IS NULL) / count(), 4) AS null_stream_ratio,
                     countIf(username = '') AS empty_user,
                     countIf(channel_login = '') AS empty_channel,
                     round(countIf(toUnixTimestamp64Milli(timestamp) % 1000 != 0) / count(), 4) AS ms_precision_ratio
              FROM chat_messages
              WHERE msg_type = 'privmsg' AND timestamp > now() - INTERVAL 1 HOUR
            SQL
            r = Clickhouse.client.select(q).first || {}
            total = r['total'].to_i
            null_ratio = r['null_stream_ratio'].to_f
            puts "  total privmsg (1h): #{total}"
            puts "  stream_id NULL: #{r['null_stream']} (ratio #{null_ratio}) — expect LOW on live"
            puts "  empty username: #{r['empty_user']} | empty channel_login: #{r['empty_channel']} — expect 0"
            puts "  ms-precision ratio (ts with non-zero ms): #{r['ms_precision_ratio']} — note: data is second-truncated (W=5s unaffected)"
            # T1-057 S3 / SRS §14: recurring FR-D0 gate — fail the run on silent ingestion drift.
            # Threshold Architect-tunable; observed 0.0 on live, 0.10 leaves wide headroom. Min sample
            # 100 so a quiet hour (total~0 → nan ratio) cannot false-trigger. The "FR-D0 GATE FAILED"
            # marker is grep-gated by the run step → non-zero workflow exit.
            null_ratio_max = 0.10
            if total >= 100 && null_ratio > null_ratio_max
              puts "  ❌ FR-D0 GATE FAILED: stream_id null-ratio #{null_ratio} > #{null_ratio_max} on live (ingestion drift — edge stream context + downstream at risk)"
            else
              puts "  ✅ FR-D0 OK: stream_id null-ratio #{null_ratio} <= #{null_ratio_max} (or sample <100)"
            end
          end

          # === T1-057 TI-INTEGRATION confirm (flags ON, PO prod-rollout "both ON, weight 0.05") ===
          # Tables already populated by the */5 cron worker (flags now ON). Confirm the temporal signal
          # actually FLOWS into a real channel's TI on the live env: ContextBuilder fetch -> signal calc.
          section("T1-057 TI-INTEGRATION — temporal signal flows into TI") do
            puts "  flags: edges=#{Flipper.enabled?(:cross_channel_edges)} temporal=#{Flipper.enabled?(:temporal_cross_channel)}"
            puts "  cross_channel_presences (source=live): #{CrossChannelPresence.where(source: 'live').count} edges"
            puts "  cross_channel_temporal_flags: total=#{CrossChannelTemporalFlag.count} spam=#{CrossChannelTemporalFlag.where(bot_type: 'spam').count} utility=#{CrossChannelTemporalFlag.where(bot_type: 'utility').count}"
            if defined?(s) && s
              ctx = TrustIndex::ContextBuilder.build(s)
              tcc = ctx[:temporal_cross_channel_flags]
              puts "  context[:temporal_cross_channel_flags]: #{tcc.is_a?(Hash) ? "total_chatters=#{tcc[:total_chatters]} flagged=#{(tcc[:flagged] || {}).size}" : tcc.inspect}"
              sig = TrustIndex::Signals::TemporalCrossChannel.new.calculate(ctx)
              puts "  TemporalCrossChannel signal: value=#{sig.value.inspect} confidence=#{sig.confidence} meta=#{sig.metadata.inspect[0..160]}"
              puts "  => #{sig.value.nil? ? 'INSUFFICIENT (no flagged chatters in this channel — correct for an honest/clean channel)' : 'CONTRIBUTES to TI (weight 0.05)'}"
            else
              puts "  (no stream for probe channel — integration plumbing still confirmed by flags+tables above)"
            end
            puts "  weight_in_ti(temporal_cross_channel): #{SignalConfiguration.value_for('temporal_cross_channel', 'default', 'weight_in_ti') rescue 'MISSING'}"
          end

          puts "\n===== DEEP DIVE COMPLETE for #{login} ====="
          RUBY_EOF
          echo "Script built ($(wc -l < /tmp/deep-dive.rb) lines)"

      - name: Run deep-dive on ${{ inputs.target }}
        run: |
          TARGET="${{ inputs.target }}"
          echo "Deep dive: ${{ inputs.login }} on TARGET=${TARGET}"
          echo "============================================================"
          scp /tmp/deep-dive.rb ${TARGET}:/tmp/deep-dive.rb
          CONTAINER=$(ssh ${TARGET} "docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1")
          echo "Container: ${CONTAINER}"
          ssh ${TARGET} "docker cp /tmp/deep-dive.rb ${CONTAINER}:/tmp/deep-dive.rb && docker exec ${CONTAINER} sh -c 'bin/rails runner /tmp/deep-dive.rb > /tmp/output.txt 2>&1; cat /tmp/output.txt' 2>&1" | grep -vE 'Flipper audit|Sidekiq 7|connecting to Redis|stackprof|Please add the' | tee /tmp/dd-filtered.txt
          # T1-057 S3 / SRS §14: recurring FR-D0 data-map gate. The deep-dive emits "FR-D0 GATE FAILED"
          # only when the live stream_id null-ratio exceeds the threshold (silent ingestion drift). Fail
          # the run on that marker — section() swallows every other error, so this is the sole gate.
          if grep -q "FR-D0 GATE FAILED" /tmp/dd-filtered.txt; then
            echo "::error::T1-057 FR-D0 data-map gate breached — stream_id null-ratio over threshold on live"
            exit 1
          fi
