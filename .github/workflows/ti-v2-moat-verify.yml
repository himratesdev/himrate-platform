name: ti-v2-moat-verify
# T1-074 GATE-0 STEP 0' — moat discrimination test, READ-ONLY, $0, TIME-INDEPENDENT (persisted basis).
# ρ_obs = min(unique_chatters,500)/avg_ccv per stream (0 chatters → 0 = the silent-view-bot signal, NOT
# skipped). Calibrated ρ_lo (P10 of honest-anchor ρ_obs) gates the label: flag if ρ_obs < ρ_lo.
#   PART A: honest anchors (partner+full+TI≥88) → per-cell ρ_lo/ρ* + honest false-positive rate (~P10).
#   PART C: viewbot_spike/ccv_step anomaly channels (free silent-injection proxy, organic-excluded) →
#           flagged rate. If C-flag >> A-flag, the calibrated engine catches silent view-bots F_soft.
on:
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options: [hostkey]
        default: hostkey

jobs:
  moat:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Build moat-verify script
        run: |
          cat > /tmp/moat.rb <<'RUBY_EOF'
          $stdout.sync = true
          CAP = 500
          def vbucket(v)
            return "0" if v.nil? || v <= 0
            return "0-1k" if v < 1000
            return "1k-5k" if v < 5000
            return "5k-20k" if v < 20000
            "20k+"
          end
          def chat_mode(cfg)
            return "open" unless cfg
            return "sub-only" if cfg.subs_only_enabled
            fol = cfg.followers_only_duration_min
            return "followers-only" if fol && fol >= 0
            return "slow" if cfg.slow_mode_seconds.to_i.positive?
            return "emote-only" if cfg.emote_only_enabled
            "open"
          end
          def pct(a, p)
            return nil if a.empty?
            s = a.sort
            s[[ (p * (s.size - 1)).round, s.size - 1 ].min]
          end
          # persisted-basis ρ_obs — 0 chatters kept (silent-view-bot signal), NOT skipped
          def measure(s)
            v = CcvSnapshot.where(stream_id: s.id).average(:ccv_count)&.to_f
            return nil if v.nil? || v < 10
            uc = ChattersSnapshot.where(stream_id: s.id).maximum(:unique_chatters_count).to_i
            eihc = [ uc, CAP ].min
            rho = eihc / v
            cat = (TrustIndex::Signals::CategoryResolver.resolve(s.game_name) rescue "default")
            { v: v, rho_obs: rho, uc: uc,
              cell: [ cat, vbucket(v), chat_mode(s.channel.channel_protection_config), (s.language.presence || "default") ].join("|"),
              cat: cat }
          rescue => e
            nil
          end

          # ===== PART A: honest-anchor ρ_lo/ρ* per cell + category =====
          cell_rho = Hash.new { |h, k| h[k] = [] }
          cat_rho  = Hash.new { |h, k| h[k] = [] }
          anchor_ms = []
          partner_ids = Channel.where(broadcaster_type: "partner")
                               .where(id: Stream.where("ended_at > ?", 21.days.ago).select(:channel_id))
                               .limit(600).pluck(:id)
          partner_ids.each do |cid|
            break if anchor_ms.size >= 220
            completed = Stream.where(channel_id: cid).where.not(ended_at: nil).count
            next if completed < 10
            ti = TrustIndexHistory.where(channel_id: cid).order(calculated_at: :desc).limit(1).pick(:trust_index_score)
            next if ti.nil? || ti.to_f < 88
            Stream.where(channel_id: cid).where.not(ended_at: nil).order(started_at: :desc).limit(2).each do |s|
              m = measure(s)
              next unless m
              next if m[:rho_obs] > 3.0
              cell_rho[m[:cell]] << m[:rho_obs]; cat_rho[m[:cat]] << m[:rho_obs]; anchor_ms << m
            end
          end
          rlo_cell = cell_rho.transform_values { |a| pct(a, 0.10) }
          rlo_cat  = cat_rho.transform_values  { |a| pct(a, 0.10) }
          global_lo = pct(cat_rho.values.flatten, 0.10) || 0.03
          puts "PART A: #{anchor_ms.size} honest-anchor stream-measures, #{cell_rho.size} cells"

          def rlo_for(m, rlo_cell, rlo_cat, global_lo)
            rlo_cell[m[:cell]] || rlo_cat[m[:cat]] || global_lo
          end

          fp = anchor_ms.count { |m| m[:rho_obs] < rlo_for(m, rlo_cell, rlo_cat, global_lo) }
          hp = anchor_ms.empty? ? 0.0 : (100.0 * fp / anchor_ms.size).round(1)
          puts "PART A honest false-positive: #{fp}/#{anchor_ms.size} = #{hp}% (want ~10% = the P10 gate)"

          # ===== PART C: silent-injection proxy — viewbot/ccv-step anomaly channels =====
          an_sids = Anomaly.where(anomaly_type: %w[viewbot_spike ccv_step_function])
                           .where("timestamp > ?", 5.days.ago).order(timestamp: :desc).limit(120).pluck(:stream_id).uniq.first(40)
          puts "\nPART C: #{an_sids.size} viewbot/ccv-step anomaly streams (organic-excluded below)"
          fc = 0; nc = 0
          an_sids.each do |sid|
            s = Stream.find_by(id: sid)
            next unless s
            next if RaidAttribution.where(stream_id: sid).exists? # organic exclusion (raid/host)
            m = measure(s)
            next unless m
            nc += 1
            rlo = rlo_for(m, rlo_cell, rlo_cat, global_lo)
            flagged = m[:rho_obs] < rlo
            fc += 1 if flagged
            v1 = TrustIndexHistory.where(stream_id: sid).order(:calculated_at).last&.trust_index_score
            puts format("  %-22s V=%-6d uc=%-4d ρ_obs=%.4f ρ_lo=%.4f v1_TI=%-5s → %s",
                        s.channel.login.to_s[0, 22], m[:v].to_i, m[:uc], m[:rho_obs], rlo, v1, flagged ? "FLAG" : "green") if nc <= 25
          end
          cp = nc.zero? ? 0.0 : (100.0 * fc / nc).round(1)

          puts "\n===== MOAT VERDICT (persisted-basis discrimination) ====="
          puts "  honest anchors flagged:      #{hp}%  (baseline false-positive, want ~10%)"
          puts "  injection-proxy flagged:     #{cp}%  of #{nc}  (want >> honest)"
          puts "  separation: #{(cp - hp).round(1)} pts"
          puts "  → MOAT DISCRIMINATES if injection-proxy flag-rate >> honest baseline"
          puts "  (ρ_lo GLOBAL=#{global_lo&.round(4)} — vs illustrative 0.03)"
          RUBY_EOF
          echo "Built ($(wc -l < /tmp/moat.rb) lines)"

      - name: Run moat-verify on ${{ inputs.target }}
        run: |
          TARGET="${{ inputs.target }}"
          scp /tmp/moat.rb ${TARGET}:/tmp/moat.rb
          CONTAINER=$(ssh ${TARGET} "docker ps --filter 'name=himrate-web-staging' --format '{{.Names}}' | head -1")
          echo "container: ${CONTAINER}"
          ssh ${TARGET} "docker cp /tmp/moat.rb ${CONTAINER}:/tmp/moat.rb && docker exec ${CONTAINER} sh -c 'bin/rails runner /tmp/moat.rb > /tmp/mout.txt 2>&1; cat /tmp/mout.txt' 2>&1" | grep -vE 'KnownBotService|Flipper audit|connecting to Redis|stackprof|Please add'
