name: Build DB Image

on:
  push:
    branches: [main]
    paths:
      - 'db/Dockerfile'
      - 'db/init-pg-partman.sql'
      - 'db/.dockerignore'
      - 'config/deploy.yml' # tag bump triggers rebuild (single source)
      - '.github/workflows/build-db-image.yml'
  workflow_dispatch: # manual trigger для rebuilds

permissions:
  contents: read
  packages: write
  security-events: write # trivy SARIF upload в GitHub Security tab

jobs:
  build-db-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.2

      # Extract image tag из config/deploy.yml — SINGLE SOURCE OF TRUTH.
      # deploy.yml accessories.db.image — authoritative version reference.
      # Dockerfile LABEL получает tag через --build-arg IMAGE_VERSION (below).
      # Image pushed с тем же tag. Result: zero drift possible.
      #
      # PG W-2 revised: pinned mikefarah/yq@v4.44.3 action (not runner default).
      # Rationale: ubuntu-latest pre-installs yq, но GHA может удалить binary
      # в будущих images → silent breakage. Pinned action = supply-chain locked,
      # reproducible builds, immune to runner image changes.
      - name: Read image reference from deploy.yml via pinned yq
        id: read_image
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: yq '.accessories.db.image' config/deploy.yml

      - name: Extract tag portion and validate
        id: image_tag
        run: |
          set -euo pipefail

          IMAGE="${{ steps.read_image.outputs.result }}"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ]; then
            echo "::error::accessories.db.image не найден в config/deploy.yml"
            exit 1
          fi

          # Bash parameter expansion — extract substring после last ':'
          # (handles ghcr.io/org/repo:tag correctly even if registry имеет ':').
          TAG="${IMAGE##*:}"
          if [ -z "$TAG" ] || [ "$TAG" = "$IMAGE" ]; then
            echo "::error::Image reference без tag: $IMAGE"
            echo "::error::Expected format: ghcr.io/himratesdev/himrate-postgres:<TAG>"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✓ Image: $IMAGE"
          echo "✓ Tag:   $TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Build and push Postgres + pg_partman image
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./db
          file: ./db/Dockerfile
          push: true
          tags: ghcr.io/himratesdev/himrate-postgres:${{ steps.image_tag.outputs.tag }}
          # build-arg feeds Dockerfile LABEL version → no drift possible.
          build-args: |
            IMAGE_VERSION=${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # CR N-5 + W-5 PG: CVE scan through trivy. Non-blocking (exit-code 0) —
      # upstream postgres base может содержать CVEs вне нашего контроля.
      # SARIF upload в GitHub Security tab → weekly digest emails + новые
      # finding notifications via GitHub built-in.
      # Pin @v0.35.0 (verified via gh api trivy-action/tags).
      - name: Scan image for CVEs (report-only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/himratesdev/himrate-postgres:${{ steps.image_tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0 # non-blocking — upstream CVEs не блокируют deploy

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3.27.0
        with:
          sarif_file: trivy-results.sarif
          category: postgres-db-image
