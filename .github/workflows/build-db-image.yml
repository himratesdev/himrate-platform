name: Build DB Image

on:
  push:
    branches: [main]
    paths:
      - 'db/Dockerfile'
      - 'db/init-pg-partman.sql'
      - 'db/.dockerignore'
      - '.github/workflows/build-db-image.yml'
  workflow_dispatch: # manual trigger для rebuilds

permissions:
  contents: read
  packages: write

env:
  # Versioned tag — bump при любом intentional изменении db/Dockerfile (CR SF-1).
  # Matches LABEL version в Dockerfile + image reference в config/deploy.yml.
  IMAGE_TAG: 16-partman-v1

jobs:
  build-db-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pinned by tag (semver) — CR N-3. Safer than @v4 floating. Dependabot
      # auto-bumps при новых releases.
      - uses: actions/checkout@v4.2.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Build and push Postgres + pg_partman image
        id: build
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./db
          file: ./db/Dockerfile
          push: true
          # Single versioned tag — no :latest (CR N-1, antipattern для prod).
          # Bump IMAGE_TAG env when Dockerfile changes intentionally.
          tags: ghcr.io/himratesdev/himrate-postgres:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # CR N-5 (CVE scan) — deferred to separate follow-up PR.
      # Initial attempt использовал aquasecurity/trivy-action@0.28.0 (non-existent tag).
      # Требует корректного version pinning + настройки non-blocking exit + SARIF upload.
      # Создать follow-up task: "TASK-XXX: CVE scanning в build workflows (trivy)".
