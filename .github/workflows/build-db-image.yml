name: Build DB Image

on:
  push:
    branches: [main]
    paths:
      - 'db/Dockerfile'
      - 'db/init-pg-partman.sql'
      - 'db/.dockerignore'
      - 'config/deploy.yml' # tag bump triggers rebuild (single source)
      - '.github/workflows/build-db-image.yml'
  workflow_dispatch: # manual trigger для rebuilds

permissions:
  contents: read
  packages: write
  security-events: write # trivy SARIF upload в GitHub Security tab

jobs:
  build-db-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.2

      # Extract image tag из config/deploy.yml — SINGLE SOURCE OF TRUTH.
      # deploy.yml accessories.db.image — authoritative version reference.
      # Dockerfile LABEL получает tag через --build-arg IMAGE_VERSION (below).
      # Image pushed с тем же tag. Result: zero drift possible, no grep-based
      # assertion нужна (3-way sync → 1-way read from deploy.yml).
      - name: Read image tag from deploy.yml (single source of truth)
        id: image_tag
        run: |
          set -euo pipefail
          # | head -1 — defensive: если deploy.yml когда-нибудь получит
          # accessory override с second matching line, не формируем multiline output
          # (GITHUB_OUTPUT требует heredoc для multiline — фикс для future-proof) (CR N-2).
          TAG=$(grep -E '^\s*image:\s*ghcr.io/himratesdev/himrate-postgres:' config/deploy.yml \
                | head -1 \
                | sed -E 's/.*himrate-postgres:([^ ]+).*/\1/')
          if [ -z "$TAG" ]; then
            echo "::error::Failed to extract image tag from config/deploy.yml"
            echo "::error::Expected line: accessories.db.image: ghcr.io/himratesdev/himrate-postgres:<TAG>"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✓ Image tag (from deploy.yml): $TAG"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Build and push Postgres + pg_partman image
        id: build
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./db
          file: ./db/Dockerfile
          push: true
          tags: ghcr.io/himratesdev/himrate-postgres:${{ steps.image_tag.outputs.tag }}
          # build-arg feeds Dockerfile LABEL version → no drift possible.
          build-args: |
            IMAGE_VERSION=${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # CR N-5 + W-5 PG: CVE scan through trivy. Non-blocking (exit-code 0) —
      # upstream postgres base может содержать CVEs вне нашего контроля.
      # SARIF upload в GitHub Security tab → weekly digest emails + новые
      # finding notifications via GitHub built-in.
      # Pin @v0.35.0 (verified via gh api trivy-action/tags).
      - name: Scan image for CVEs (report-only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/himratesdev/himrate-postgres:${{ steps.image_tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0 # non-blocking — upstream CVEs не блокируют deploy

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3.27.0
        with:
          sarif_file: trivy-results.sarif
          category: postgres-db-image
