name: Build DB Image

on:
  push:
    branches: [main]
    paths:
      - 'db/Dockerfile'
      - '.github/workflows/build-db-image.yml'
  workflow_dispatch: # manual trigger для rebuilds

permissions:
  contents: read
  packages: write

jobs:
  build-db-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Postgres + pg_partman image
        uses: docker/build-push-action@v5
        with:
          context: ./db
          file: ./db/Dockerfile
          push: true
          tags: |
            ghcr.io/himratesdev/himrate-postgres:16-partman
            ghcr.io/himratesdev/himrate-postgres:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
