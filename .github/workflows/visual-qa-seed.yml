# TASK-039: Visual QA synthetic data seeding workflow.
# Invokes trends:visual_qa:{seed,clear,status} rake task на staging app container
# через `kamal app exec -d staging`. Zero PAT exchange с локалкой — CI uses
# существующий KAMAL_REGISTRY_PASSWORD из repo secrets.
#
# Staging-only: destination hardcoded, production path невозможен. Additional belt:
# Rails.env.production? guard в DataSeeder raises если кто-то попытается override
# через manual exec'.
#
# Usage: Actions tab → "Visual QA Seed" → Run workflow → fill inputs → Run.

name: Visual QA Seed

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Rake action (seed / clear / status)"
        required: true
        default: "seed"
        type: choice
        options:
          - seed
          - clear
          - status
      login:
        description: "Channel login (must start with 'vqa_test_')"
        required: true
        type: string
        default: "vqa_test_premium_01"
      profile:
        description: "Seed profile (used for 'seed' action only)"
        required: false
        default: "premium_tracked"
        type: choice
        options:
          - premium_tracked
          - streamer_with_rehab
          - cold_start

jobs:
  visual-qa-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: gem install kamal

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host 194.135.85.159
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      # Validate login prefix fail-fast. App-level guard exists (ChannelSeeder.validate_login!)
      # but catching early в CI saves ~30s round-trip against VPS.
      - name: Validate input login prefix
        run: |
          set -euo pipefail
          LOGIN="${{ github.event.inputs.login }}"
          if [[ ! "$LOGIN" =~ ^vqa_test_ ]]; then
            echo "::error::Login must start with 'vqa_test_'. Got: '$LOGIN'"
            exit 1
          fi
          echo "::notice::Login validated: $LOGIN"

      # Audit header — attribution в Actions log для operator tracking.
      - name: Audit invocation
        run: |
          cat <<AUDIT
          === Visual QA Seed invocation ===
          Actor:       ${{ github.actor }}
          Destination: staging
          Action:      ${{ github.event.inputs.action }}
          Login:       ${{ github.event.inputs.login }}
          Profile:     ${{ github.event.inputs.profile }}
          Commit:      ${{ github.sha }}
          === End audit header ===
          AUDIT

      # Write Kamal secrets file — required для kamal app exec (docker login
      # к ghcr.io). Zero overhead: write, use, cleanup via trap EXIT.
      - name: Write Kamal secrets
        run: |
          cat > .kamal/secrets.staging <<SECRETS
          KAMAL_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL=redis://himrate-redis:6379/1
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI=https://staging.himrate.com/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://staging.himrate.com/api/v1/auth/google/callback
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD=${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER=${{ secrets.FLIPPER_UI_USER }}
          ALLOWED_EXTENSION_ID=${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET=${{ secrets.TWITCH_WEBHOOK_SECRET }}
          EVENTSUB_WEBHOOK_URL=https://staging.himrate.com
          SECRETS

      # Build rake task argument на основе action. `seed` takes login+profile,
      # `clear`/`status` take login только.
      - name: Run rake task
        run: |
          trap 'rm -f .kamal/secrets.staging' EXIT
          set -euo pipefail

          ACTION="${{ github.event.inputs.action }}"
          LOGIN="${{ github.event.inputs.login }}"
          PROFILE="${{ github.event.inputs.profile }}"

          case "$ACTION" in
            seed)
              RAKE_ARG="trends:visual_qa:seed[${LOGIN},${PROFILE}]"
              ;;
            clear|status)
              RAKE_ARG="trends:visual_qa:${ACTION}[${LOGIN}]"
              ;;
            *)
              echo "::error::Unsupported action: $ACTION"
              exit 1
              ;;
          esac

          echo "::notice::Executing: bin/rails '$RAKE_ARG' on staging"
          kamal app exec -d staging --reuse "bin/rails '$RAKE_ARG'"
