name: first-time-setup-hostkey

# One-shot workflow для initial provisioning HOSTKEY VPS (82.21.7.48).
# Runs ONCE per fresh-VPS migration. Subsequent updates go through normal ci.yml deploy-staging.
#
# Sequence:
#   1. Boot 4 accessories serially: db → redis → clickhouse → whisper
#   2. kamal setup -d staging (15-25 min, 6 app roles)
#
# Trigger: workflow_dispatch (manual via gh CLI or GitHub UI)
#
# Pre-flight requirements:
#   - HOSTKEY VPS provisioned with Ubuntu 24.04, Docker installed (post-install script)
#   - SSH key `himrate-deploy` (matches SSH_PRIVATE_KEY secret) installed in /root/.ssh/authorized_keys
#   - All 24 GitHub Actions secrets present (validated below)
#   - config/deploy.yml + config/accessory_hosts.yml pointed to 82.21.7.48
#
# To trigger:
#   gh workflow run first-time-setup-hostkey.yml --ref feature/hostkey-migration

on:
  workflow_dispatch:
    inputs:
      destination:
        description: 'Deployment destination'
        required: true
        type: choice
        options:
          - staging
        default: staging
      confirm_fresh_vps:
        description: 'Confirm target VPS is FRESH (no existing accessory containers)'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'no'

concurrency:
  group: first-time-setup-${{ inputs.destination }}
  cancel-in-progress: false

jobs:
  first-time-setup:
    if: inputs.confirm_fresh_vps == 'yes'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1

      - run: gem install kamal

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ServerAliveInterval 15
            ServerAliveCountMax 10
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Validate required secrets
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD: ${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER: ${{ secrets.FLIPPER_UI_USER }}
          PO_DEBUG_PASSWORD: ${{ secrets.PO_DEBUG_PASSWORD }}
          ALLOWED_EXTENSION_ID: ${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          MISSING=()
          for var in RAILS_MASTER_KEY POSTGRES_PASSWORD CLICKHOUSE_PASSWORD STAGING_DATABASE_URL \
                     JWT_SECRET SECRET_KEY_BASE \
                     TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET \
                     GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET \
                     ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY \
                     ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY \
                     ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT \
                     FLIPPER_UI_PASSWORD FLIPPER_UI_USER \
                     ALLOWED_EXTENSION_ID TWITCH_WEBHOOK_SECRET; do
            val="${!var:-}"
            if [ -z "$val" ]; then
              MISSING+=("$var")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "✅ All required secrets validated"

      - name: Write Kamal secrets file
        run: |
          cat > .kamal/secrets.staging <<SECRETS
          KAMAL_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL=redis://himrate-redis:6379/1
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REDIRECT_URI=https://staging.himrate.com/api/v1/auth/twitch/callback
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://staging.himrate.com/api/v1/auth/google/callback
          OAUTH_ALLOWED_REDIRECT_URIS=https://gnnhhopjghkjdbjafhefmbckakbjkabp.chromiumapp.org/
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          FLIPPER_UI_PASSWORD=${{ secrets.FLIPPER_UI_PASSWORD }}
          FLIPPER_UI_USER=${{ secrets.FLIPPER_UI_USER }}
          PO_DEBUG_PASSWORD=${{ secrets.PO_DEBUG_PASSWORD }}
          ALLOWED_EXTENSION_ID=${{ secrets.ALLOWED_EXTENSION_ID }}
          TWITCH_WEBHOOK_SECRET=${{ secrets.TWITCH_WEBHOOK_SECRET }}
          EVENTSUB_WEBHOOK_URL=https://staging.himrate.com
          AUTO_TRIGGER_GH_PAT=${{ secrets.AUTO_TRIGGER_GH_PAT }}
          SECRETS

      - name: Boot accessory db
        run: kamal accessory boot db -d staging

      - name: Boot accessory redis
        run: kamal accessory boot redis -d staging

      - name: Boot accessory clickhouse
        run: kamal accessory boot clickhouse -d staging

      - name: Boot accessory whisper
        run: kamal accessory boot whisper -d staging

      - name: Verify accessories healthy
        run: |
          ssh root@82.21.7.48 'docker ps --filter "name=himrate-db|himrate-redis|himrate-clickhouse|himrate-whisper" --format "table {{.Names}}\t{{.Status}}"'

      - name: kamal setup -d staging (initial app deploy, 15-25 min)
        run: |
          trap 'rm -f .kamal/secrets.staging' EXIT
          kamal setup -d staging

      - name: Post-setup verification
        run: |
          set -e
          echo "=== Container roster on HOSTKEY ==="
          ssh root@82.21.7.48 'docker ps --format "table {{.Names}}\t{{.Status}}" | head -20'

          echo ""
          echo "=== Internal health (web container) ==="
          ssh root@82.21.7.48 'docker exec $(docker ps --filter "name=himrate-web-staging" --format "{{.Names}}" | head -1) curl -sf http://localhost:3000/up | head -100'

          echo ""
          echo "=== Schema migrations applied ==="
          ssh root@82.21.7.48 'docker exec $(docker ps --filter "name=himrate-db" --format "{{.Names}}" | head -1) psql -U himrate -d himrate_staging -tAc "SELECT count(*) FROM schema_migrations"' || echo "PG probe failed"

      - name: Cleanup
        if: always()
        run: rm -f .kamal/secrets.staging
