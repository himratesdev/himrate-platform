name: ch-probe

# Ad-hoc ClickHouse + cross-DB probes of the live HOSTKEY VPS via CI runner (SSH allowlisted).
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Bot-channel ERV validation (temporal bots in chat vs current TI/ERV of their channels)
        run: |
          echo "=== channels ranked by temporal-bot share of chatters (bots = 2+ channels within 120s, recurred >=3x, 24h) ==="
          echo "=== + how the CURRENT engine scores each channel's audience (TI / ERV% / label). Audit predicts: bots present but label ~real ==="
          ssh hostkey "docker exec -i \$(docker ps --filter name=himrate-web-staging --format '{{.Names}}' | head -1) bin/rails runner -" <<'RUBY' 2>&1 | grep -vE 'Flipper audit|Sidekiq 7|connecting to Redis|stackprof|DEPRECATION'
          sql = <<~SQL
            SELECT channel_login, bot_chatters, total_chatters, round(100.0*bot_chatters/total_chatters,1) AS bot_pct
            FROM (
              SELECT channel_login,
                uniqExactIf(username, username IN (
                  SELECT username FROM (
                    SELECT username, max(r) AS R FROM (
                      SELECT username, phase, countIf(ch>=2) AS r FROM (
                        SELECT username, phase,
                               toStartOfInterval(subtractSeconds(timestamp,phase), INTERVAL 120 SECOND) AS b,
                               uniqExact(channel_login) AS ch
                        FROM chat_messages ARRAY JOIN [0,60] AS phase
                        WHERE msg_type='privmsg' AND username!='' AND timestamp > now()-INTERVAL 24 HOUR
                        GROUP BY username, phase, b
                      ) GROUP BY username, phase
                    ) GROUP BY username HAVING R>=3
                  )
                )) AS bot_chatters,
                uniqExact(username) AS total_chatters
              FROM chat_messages
              WHERE msg_type='privmsg' AND username!='' AND timestamp > now()-INTERVAL 24 HOUR
              GROUP BY channel_login
              HAVING bot_chatters >= 5
              ORDER BY bot_pct DESC
              LIMIT 30
            )
            SETTINGS max_bytes_before_external_group_by=4000000000, max_memory_usage=12000000000
          SQL
          rows = Clickhouse.client.select(sql)
          puts "found #{rows.size} channels with >=5 temporal-bot chatters (24h)"
          puts "-" * 96
          rows.each do |r|
            login = r['channel_login'].to_s
            ch = Channel.find_by(login: login)
            tih = ch ? TrustIndexHistory.where(channel_id: ch.id).order(calculated_at: :desc).first : nil
            if tih
              puts format("%-22s bots %4s/%-6s (%5s%%)  TI=%-4s ERV%%=%-6s %-14s CCV=%s",
                login, r['bot_chatters'], r['total_chatters'], r['bot_pct'],
                tih.trust_index_score, tih.erv_percent, tih.classification, tih.ccv)
            else
              puts format("%-22s bots %4s/%-6s (%5s%%)  [not monitored / no TrustIndexHistory]",
                login, r['bot_chatters'], r['total_chatters'], r['bot_pct'])
            end
          end
          RUBY
