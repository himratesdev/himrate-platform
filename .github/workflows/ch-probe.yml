name: ch-probe

# Probe ClickHouse chat_messages for stray228 (verify chat → CH pipeline)

on:
  workflow_dispatch:
    inputs:
      login:
        description: 'Twitch login'
        required: true
        default: 'stray228'
        type: string

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<SSH_CONFIG
          Host hostkey
            HostName 82.21.7.48
            User root
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 30
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Persisted temporal flags (PG)
        run: |
          echo "=== cross_channel_temporal_flags (production signal 5s / >=3ch) ==="
          ssh hostkey 'docker exec himrate-db psql -U himrate -d himrate_staging -c "SELECT count(*) AS flagged, max(refreshed_at) AS last_refresh, round(extract(epoch FROM (now()-max(refreshed_at)))/60.0,1) AS staleness_min FROM cross_channel_temporal_flags;"'

      - name: Temporal recurrence + per-message breakdown (single SSH, memory-capped multiquery)
        run: |
          echo "=== R = # of separate cross-channel events per user (24h, two-phase). once vs 2+ vs 3+ TIMES. + per-msg split ==="
          ssh hostkey "docker exec himrate-clickhouse clickhouse-client --format PrettyCompact --max_memory_usage=12000000000 --max_bytes_before_external_group_by=4000000000 --multiquery --query \"
          SELECT '30s' AS win, countIf(R2>=1) AS two_once, countIf(R2>=2) AS two_2x, countIf(R3>=1) AS three_once, countIf(R3>=2) AS three_2x, countIf(R3>=3) AS three_3x FROM (SELECT username, max(r2) AS R2, max(r3) AS R3 FROM (SELECT username, phase, countIf(ch>=2) AS r2, countIf(ch>=3) AS r3 FROM (SELECT username, phase, toStartOfInterval(subtractSeconds(timestamp,phase), INTERVAL 30 SECOND) AS b, uniqExact(channel_login) AS ch FROM himrate_staging.chat_messages ARRAY JOIN [0,15] AS phase WHERE msg_type='privmsg' AND username!='' AND timestamp>now()-INTERVAL 24 HOUR GROUP BY username,phase,b) GROUP BY username,phase) GROUP BY username);
          SELECT '60s' AS win, countIf(R2>=1) AS two_once, countIf(R2>=2) AS two_2x, countIf(R3>=1) AS three_once, countIf(R3>=2) AS three_2x, countIf(R3>=3) AS three_3x FROM (SELECT username, max(r2) AS R2, max(r3) AS R3 FROM (SELECT username, phase, countIf(ch>=2) AS r2, countIf(ch>=3) AS r3 FROM (SELECT username, phase, toStartOfInterval(subtractSeconds(timestamp,phase), INTERVAL 60 SECOND) AS b, uniqExact(channel_login) AS ch FROM himrate_staging.chat_messages ARRAY JOIN [0,30] AS phase WHERE msg_type='privmsg' AND username!='' AND timestamp>now()-INTERVAL 24 HOUR GROUP BY username,phase,b) GROUP BY username,phase) GROUP BY username);
          SELECT '300s' AS win, countIf(R2>=1) AS two_once, countIf(R2>=2) AS two_2x, countIf(R3>=1) AS three_once, countIf(R3>=2) AS three_2x, countIf(R3>=3) AS three_3x FROM (SELECT username, max(r2) AS R2, max(r3) AS R3 FROM (SELECT username, phase, countIf(ch>=2) AS r2, countIf(ch>=3) AS r3 FROM (SELECT username, phase, toStartOfInterval(subtractSeconds(timestamp,phase), INTERVAL 300 SECOND) AS b, uniqExact(channel_login) AS ch FROM himrate_staging.chat_messages ARRAY JOIN [0,150] AS phase WHERE msg_type='privmsg' AND username!='' AND timestamp>now()-INTERVAL 24 HOUR GROUP BY username,phase,b) GROUP BY username,phase) GROUP BY username);
          SELECT '900s' AS win, countIf(R2>=1) AS two_once, countIf(R2>=2) AS two_2x, countIf(R3>=1) AS three_once, countIf(R3>=2) AS three_2x, countIf(R3>=3) AS three_3x FROM (SELECT username, max(r2) AS R2, max(r3) AS R3 FROM (SELECT username, phase, countIf(ch>=2) AS r2, countIf(ch>=3) AS r3 FROM (SELECT username, phase, toStartOfInterval(subtractSeconds(timestamp,phase), INTERVAL 900 SECOND) AS b, uniqExact(channel_login) AS ch FROM himrate_staging.chat_messages ARRAY JOIN [0,450] AS phase WHERE msg_type='privmsg' AND username!='' AND timestamp>now()-INTERVAL 24 HOUR GROUP BY username,phase,b) GROUP BY username,phase) GROUP BY username);
          SELECT 'MSG_60s_recurrent_bots' AS k, count() AS bots, sum(total) AS total_msgs, sum(c2) AS msgs_in_2plus, sum(c3) AS msgs_in_3plus, round(100.0*sum(c3)/sum(total),1) AS pct_in_3plus, round(100.0*sum(c2)/sum(total),1) AS pct_in_2plus FROM (SELECT username, sum(msgs) AS total, sumIf(msgs,ch>=2) AS c2, sumIf(msgs,ch>=3) AS c3, countIf(ch>=3) AS R3 FROM (SELECT username, toStartOfInterval(timestamp, INTERVAL 60 SECOND) AS b, uniqExact(channel_login) AS ch, count() AS msgs FROM himrate_staging.chat_messages WHERE msg_type='privmsg' AND username!='' AND timestamp>now()-INTERVAL 24 HOUR GROUP BY username,b) GROUP BY username HAVING R3>=2)
          \""
