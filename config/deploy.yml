# HimRate ‚Äî Kamal Deployment Configuration
# Staging + Production on single VPS (194.135.85.159)
# Destinations: config/deploy.staging.yml, config/deploy.production.yml

service: himrate
image: himratesdev/himrate-platform

# BUG-251.17 (30‚Üí120) + deploy-fix (120‚Üí240): kamal's default deploy_timeout (30s) is too tight for
# this app's boot on the single 3-core/8GB VPS. Under live combat load (load avg ~9-11) + ClickHouse
# accessory (#194/#196), a new web container's eager-load can't bind Puma:3000 even within 120s ‚Üí
# kamal-proxy health check fails ‚Üí deploy aborts (observed: PR #195 deploy + re-run BOTH failed at 120s,
# "target failed to become healthy within 2m0s"). 240s gives boot headroom under sustained contention.
# Paired with CI kamal setup‚Üídeploy (lighter deploy window ‚Äî see ci.yml). Deploy-time wait only (no
# runtime effect); underlying VPS capacity = separate hardware track (ClickHouse EPIC TASK-251.14).
deploy_timeout: 240

servers:
  web:
    hosts:
      - 194.135.85.159
  job:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -C config/sidekiq.yml
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  # TASK-110 v1.2 (CR S-7): dedicated Sidekiq role –¥–ª—è whisper_transcripts queue concurrency=1.
  # CPU isolation ‚Äî –æ–¥–∏–Ω transcript job –≤ –º–æ–º–µ–Ω—Ç, prevents starvation web/job –Ω–∞ Time4VPS 3 cores.
  # whisper_transcripts queue –ù–ï –≤ config/sidekiq.yml :queues (default `job` role –µ–≥–æ –Ω–µ –ø–æ–¥—Ö–≤–∞—Ç—ã–≤–∞–µ—Ç);
  # –æ–±—Ä–∞–±–∞—Ç—ã–≤–∞–µ—Ç—Å—è –¢–û–õ–¨–ö–û —ç—Ç–∏–º role —á–µ—Ä–µ–∑ explicit -q flag.
  whisper_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q whisper_transcripts -c 1
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  # BUG-251.40-F: dedicated Sidekiq role –¥–ª—è :stream_lifecycle queue.
  # PR #240 dedicated queue + weight=6 –≤ default `job` role –æ–∫–∞–∑–∞–ª–æ—Å—å insufficient:
  # 5 threads √ó ~12.5% weighted slot = ~0.625 effective thread (~6 j/s peak) vs
  # ~21 j/s enqueue rate (MLD –∫–∞–∂–¥—ã–µ 60s √ó ~333 live channels). Net +3 j/s ‚Üí 165k
  # backlog –∑–∞ 16h, head-of-line blocking ‚Üí 0 Stream creations last 6h on staging.
  # Strict precedence (separate process, -q stream_lifecycle only) —Å c=3 –¥–∞—ë—Ç ~12 j/s
  # sustained drain. Mirror whisper_worker pattern. stream_lifecycle queue –û–°–¢–ê–Å–¢–°–Ø –≤
  # config/sidekiq.yml :queues –¥–ª—è backward-compat –∏ fallback (default job role –ø–æ–¥—Ö–≤–∞—Ç–∏—Ç
  # –µ—Å–ª–∏ stream_worker role —É–ø–∞–¥—ë—Ç ‚Äî —Å–æ–æ—Ç–≤–µ—Ç—Å—Ç–≤—É–µ—Ç existing pattern –¥–ª—è bot_scoring/signal_compute).
  stream_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q stream_lifecycle -c 3
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  # 2026-06-02: dedicated Sidekiq role –¥–ª—è :signal_compute queue.
  # Same bottleneck pattern as stream_worker (BUG-251.40-F) ‚Äî PR #229 created dedicated
  # :signal_compute queue + weight=6 in default `job` role, –Ω–æ c=5 total threads √ó
  # ~12.5% weighted slot (6/48 sum of all queue weights –≤ sidekiq.yml :queues) =
  # ~0.625 effective thread (~2.5k jobs/hr drain at typical SCW latency). Observed enqueue rate ~25-90k jobs/hr (428 live streams √ó StreamMonitor
  # –∫–∞–∂–¥—É—é –º–∏–Ω—É—Ç—É = 25.7k/hr floor; plus BotScoringWorker force-enqueue post-stream =
  # spikes to 90k/hr). Net growth +5.5k..+92k jobs/hr ‚Üí :signal_compute backlog grew
  # 619k ‚Üí 804k in 2h (2026-06-02 audit). Two-day trend: 670k (2026-05-31) ‚Üí 992k
  # :signals + 804k :signal_compute = 1.13M growth.
  # Strict precedence (separate process, -q signal_compute only) —Å c=5 –¥–∞—ë—Ç ~12-25 j/s
  # sustained drain (latency-dependent). Mirror stream_worker / whisper_worker pattern.
  # signal_compute queue –û–°–¢–ê–Å–¢–°–Ø –≤ config/sidekiq.yml :queues –¥–ª—è backward-compat –∏
  # fallback (default job role –ø–æ–¥—Ö–≤–∞—Ç–∏—Ç –µ—Å–ª–∏ signal_compute_worker role —É–ø–∞–¥—ë—Ç).
  #
  # 2026-06-04 Phase 7 S (BUG-A2-BSW-CH-EMPTY-NIX, PR #282): –¥–æ–±–∞–≤–ª–µ–Ω `:bot_scoring`
  # queue –∫ —ç—Ç–æ–π —Ä–æ–ª–∏ —Å strict precedence (`-q signal_compute -q bot_scoring`).
  # Post-deploy measurement: drain rate ONLY 660 j/hr vs theoretical 18-36k j/hr.
  # Root cause = SignalComputeWorker constantly busy —Å c=5 threads (each SCW ~3sec,
  # enqueue rate keeps signal_compute queue at 10-50 = threads never idle ‚Üí bot_scoring
  # never gets a slot per strict precedence). Backlog 23k‚Üí15k –∑–∞ 12h, BSW signals
  # (chat_behavior/known_bot_match/account_profile_scoring) coverage in TIH last 30min
  # = 4.5% (target 100% of live streams).
  #
  # 2026-06-05 Phase 7 T (this PR): split bot_scoring to ITS OWN dedicated role
  # (bot_scoring_worker, see below) for ACTUAL strict-precedence drain. Removed
  # `-q bot_scoring` here ‚Üí signal_compute_worker back to processing ONLY :signal_compute
  # (its original responsibility per PR #257). New 9th Kamal role accepted ‚Äî VPS reboot
  # capacity refreshed, +250 MiB container cost worth the BSW unblocking. Mirror existing
  # signals_worker (PR #270) / monitoring_worker (PR #274) split pattern.
  signal_compute_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q signal_compute -c 5
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  # 2026-06-05 Phase 7 T: dedicated Sidekiq role –¥–ª—è :bot_scoring queue.
  # Promotion –∏–∑ piggyback –Ω–∞ signal_compute_worker (PR #282) ‚Üí own process.
  # Same pattern as signals_worker (PR #270) / monitoring_worker (PR #274) /
  # signal_compute_worker (PR #257) / stream_worker (BUG-251.40-F).
  #
  # Why split: PR #282 attempted to share signal_compute_worker via strict
  # precedence `-q signal_compute -q bot_scoring`. Post-deploy measurement on
  # 2026-06-05 confirmed signal_compute_worker threads (c=5) constantly fed by
  # SignalComputeWorker jobs (~3sec each, queue size stays 10-50) ‚Üí bot_scoring
  # never gets thread time per strict precedence rules. Net drain ~660 j/hr ‚Äî
  # 27√ó slower than designed 18k j/hr. 4.5% BSW coverage in TIH = unacceptable.
  #
  # Workers on :bot_scoring queue = BotScoringWorker (sole) + LiveBotScoringWorker
  # (cron-scheduled enqueuer, also runs from this role on :bot_scoring). Job profile: ~1-3 sec each
  # (CH chat read + per-user feature extraction + classification). c=3 dedicated
  # threads √ó 1 j/2sec = 1.5 j/s = 5400 j/hr drain capacity. Enqueue rate per
  # PR #282 comment = LiveBotScoringWorker */30min √ó 300 streams = 600 j/hr.
  # 5400 capacity √∑ 600 enqueue = 9√ó headroom, plus quick drain of 15k backlog
  # in ~3h. Strict-precedence dedicated process never starved by SCW.
  #
  # c=3 sizing rationale: BSW jobs read CH chat_messages (1-3MB per query, ~200ms),
  # then per-user PG inserts (up to 100 users/stream batch). 3 concurrent = max ~9MB
  # CH read + ~300 PG inserts/sec peak ‚Äî within accessory capacity. Higher c=5/7
  # risks PG connection pool exhaustion.
  bot_scoring_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q bot_scoring -c 3
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  # 2026-06-03 Phase 7 O: dedicated Sidekiq role –¥–ª—è :signals queue.
  # Same starvation pattern as signal_compute_worker (PR #257) / stream_worker (BUG-251.40-F):
  # `:signals` weight=5 in default `job` role with 5 threads √ó shared weighted fetch
  # ‚Üí effective fetch slice ~5/48 ‚âà 0.5 thread ‚Üí 8 jobs/hour processed
  # (measured 2026-06-03: 4 Trends::AnomalyAttributionWorker completions over 30min
  # vs 1,023,832-job backlog actively fed at ~1k/hr by SignalComputeWorker anomaly_ids).
  # Backlog ETA at current drain rate: 300+ days. Same fix shape as PR #257: strict
  # precedence role processes ONLY :signals queue with c=5 dedicated threads.
  # :signals queue –û–°–¢–ê–Å–¢–°–Ø –≤ config/sidekiq.yml :queues –¥–ª—è backward-compat –∏ fallback
  # (default job role –ø–æ–¥—Ö–≤–∞—Ç–∏—Ç –µ—Å–ª–∏ signals_worker role —É–ø–∞–¥—ë—Ç). Workers on :signals
  # are Trends::AnomalyAttributionWorker (88.8% of 1k sampled 2026-06-03) +
  # Trends::AggregationWorker (11.2%) + zero-volume RaidWorker + ChannelUpdateWorker
  # ‚Äî strict-precedence consumer of the SAME queue is the entire migration; no
  # per-worker code changes required.
  #
  # Role naming: matches queue (`signals_worker` ‚Üî `-q signals`) rather than dominant
  # worker class, mirroring `stream_worker` ‚Üî `-q stream_lifecycle`. CR-iter1 N-1
  # 2026-06-03 ‚Äî "trends_attribution_worker" would have implied single-worker focus
  # while in reality the dedicated process consumes the entire :signals queue (4
  # worker classes).
  signals_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q signals -c 5
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  # 2026-06-03 Phase 7 O follow-up: dedicated Sidekiq role –¥–ª—è :monitoring queue.
  # Same starvation pattern as signals_worker (PR #270) / signal_compute_worker (PR #257) /
  # stream_worker (BUG-251.40-F):
  # `:monitoring` weight=1 in default `job` role (lowest tier in sidekiq.yml :queues ‚Äî
  # `bot_scoring`/`signal_compute`/`stream_lifecycle` w=6, `signals` w=5, `chat` w=4,
  # `pva_*`/`post_stream`/`default` w=3, `notifications`/`accessory_ops` w=2,
  # `monitoring`/`long_running` w=1; weight sum = 6+6+6+5+4+3+3+3+3+3+2+2+1+1 = 48).
  # Weighted-fetch share = 1 / 48 ‚âà 2.08% of fetch slots √ó 5 threads ‚âà ~0.10 effective
  # thread per :monitoring job.
  # Live-trigger workload after PR #269 (Twitch::BigChannelChatterSweepWorker, ~14s/job
  # for 20-parallel CommunityTab probe + Set-dedupe + persistence chain): drain ‚âà 0.11
  # thread √ó 1 job / 14s = ~0.008 jobs/sec = ~700 jobs/day on `job` role.
  # Enqueue rate measured 2026-06-03: ‚âà 4 jobs/min (95 jobs auto-enqueued within ~3 min
  # of `:big_channel_chatter_sweep` flag flip; sustained ~4/min steady-state by
  # StreamMonitorWorker tier1 gate + SETNX 5-min throttle per channel) = ~5760/day.
  # Result: queue grew from 43k (pre-compact 2026-06-03 14:47Z) ‚Üí 58k (16:53Z) in ~2h on
  # `job` role, latency ~55k seconds (15h-old jobs ‚â° stream they targeted has long ended).
  # Same fix shape as PR #270: strict-precedence role processes ONLY :monitoring queue
  # with c=2 dedicated threads (lower than signals_worker c=5 ‚Äî each BigChannelChatterSweep
  # job is heavy 14s wall clock with 20-thread GQL fan-out, so c=2 = max 40 concurrent
  # outbound HTTP @ peak; stays under the ~800 req/min Twitch GQL Helix soft cap observed
  # elsewhere). Expected drain: ~2 threads √ó 1 job / 14s = ~0.14 j/s = ~12k/hr ‚Üí 58k backlog
  # drains in ~5h. :monitoring queue –û–°–¢–ê–Å–¢–°–Ø –≤ config/sidekiq.yml :queues –¥–ª—è backward-compat
  # –∏ fallback (default job role –ø–æ–¥—Ö–≤–∞—Ç–∏—Ç –µ—Å–ª–∏ monitoring_worker role —É–ø–∞–¥—ë—Ç). 20 worker
  # classes enqueue onto :monitoring (full list: app/workers grep for `queue: :monitoring` /
  # `sidekiq_options queue: :monitoring`); high-volume dominant = Twitch::BigChannelChatterSweepWorker
  # (~4/min steady-state post-PR #269 flag flip); low-volume periodic scheduler tail =
  # StreamMonitorWorker, MonitoredLiveDetectorWorker, CleanupWorker, RaidDetectionWorker,
  # ChannelMetadataRefreshWorker, ChatterProfileRefreshWorker, FollowerSnapshotWorker,
  # BotListRefreshWorker, StaleStreamSweepWorker, SidekiqHealthMonitorWorker, ChannelDiscoveryWorker,
  # ChannelPruneWorker, CrossChannelDigestRefreshWorker, Trends::NightlyAggregationWorker, +
  # 5 PersonalAnalytics::* scheduler workers. Strict-precedence consumer of the SAME queue is
  # the entire migration; no per-worker code changes required. c=2 sizing dominated by
  # BigChannelChatterSweep cost profile ‚Äî other 19 classes are scheduler/periodic and trivial.
  #
  # Role naming: matches queue (`monitoring_worker` ‚Üî `-q monitoring`) per the symmetry
  # established by `stream_worker` ‚Üî `-q stream_lifecycle`, `signals_worker` ‚Üî `-q signals`.
  #
  # 2026-06-05 Phase 7 T (this PR): bump c=2 ‚Üí c=4. Post-2026-06-04 reboot measurement:
  # :monitoring queue grew 43k ‚Üí 89k in ~14h (net +3.3k/hr). c=2 drain (theoretical
  # 12k/hr per design comment above) insufficient at observed enqueue 4-5/min √ó ~14sec
  # avg job = ~5760 j/day saturated by c=2 capacity (~17k/day) only when BCCSweep
  # jobs run ‚â§8s each. Real measurement shows mix of BCCSweep + 19 other workers
  # (StreamMonitor, MonitoredLiveDetector, CleanupWorker, etc.) bring average up.
  # c=4 doubles capacity (~34k/day) ‚Üí covers steady-state + drains backlog ~2.5 days.
  # Twitch GQL HTTP fan-out (20 threads √ó c=4 = 80 max concurrent outbound) still
  # under observed ~800 req/min soft cap.
  monitoring_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q monitoring -c 4
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  irc:
    hosts:
      - 194.135.85.159
    cmd: bin/irc_monitor
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

proxy:
  ssl: true
  host: himrate.com
  # CR M-3 + PG W-1: kamal-proxy –Ω–µ routes per-host –∫ —Ä–∞–∑–Ω—ã–º backends.
  # Grafana subdomain access initially via SSH tunnel only (127.0.0.1:3000 binding
  # –Ω–∞ accessory). Public access (grafana.himrate.com) ‚Äî separate setup —á–µ—Ä–µ–∑
  # Cloudflare Tunnel (cloudflared accessory) post-PR1. –°–º. accessory_ops.md.

registry:
  server: ghcr.io
  username: himratesdev
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - JWT_SECRET
    - SECRET_KEY_BASE
    - TWITCH_CLIENT_ID
    - TWITCH_CLIENT_SECRET
    - TWITCH_REDIRECT_URI
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GOOGLE_REDIRECT_URI
    # BUG-027: comma-separated allowlist of extra OAuth redirect_uris (extension
    # chromiumapp.org + future clients). Web-callback defaults are always trusted.
    - OAUTH_ALLOWED_REDIRECT_URIS
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - FLIPPER_UI_PASSWORD
    - FLIPPER_UI_USER
    - ALLOWED_EXTENSION_ID
    - TWITCH_WEBHOOK_SECRET
    - EVENTSUB_WEBHOOK_URL
    # BUG-010 PR2 (ADR DEC-3): fine-grained PAT –¥–ª—è AutoRemediation::TriggerService ‚Üí GitHub workflow_dispatch.
    # –ò–º—è –±–µ–∑ `GITHUB_` prefix ‚Äî –∑–∞—Ä–µ–∑–µ—Ä–≤–∏—Ä–æ–≤–∞–Ω GitHub Actions –¥–ª—è secrets (HTTP 422). ADR ¬ß7 corrigendum.
    - AUTO_TRIGGER_GH_PAT
    # TASK-251.14: ClickHouse default-user password ‚Äî app side. (The same secret also passwords the
    # `clickhouse` accessory's default user; here it lets the app authenticate to it.)
    - CLICKHOUSE_PASSWORD
  clear:
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 2
    # TASK-251.14: ClickHouse connection (app side). Reached over the Kamal Docker network by the
    # accessory's full container name. Port defaults to 8123 in Clickhouse::Client; database is
    # per-destination (config/deploy.{staging,production}.yml CLICKHOUSE_DATABASE).
    CLICKHOUSE_HOST: himrate-clickhouse

# Accessories: PostgreSQL + Redis + observability stack on the same VPS
# BUG-010 PR1: +grafana, prometheus, loki, promtail, alertmanager, prometheus-pushgateway
accessories:
  db:
    # TASK-039 ADR ¬ß4.2: custom image —Å pg_partman extension (built in CI).
    # Dockerfile: db/Dockerfile. Build workflow: .github/workflows/build-db-image.yml.
    # Tag versioned (v1/v2/...) –¥–ª—è deterministic rollback ‚Äî bump triggered manual
    # –ø—Ä–∏ Dockerfile changes (—Å–º. Dockerfile –∫–æ–º–º–µ–Ω—Ç–∞—Ä–∏–π + workflow IMAGE_TAG).
    # –ü–æ—Å–ª–µ build –≤ ghcr ‚Üí manual `kamal accessory reboot db -d <dest>` (volume —Å–æ—Ö—Ä–∞–Ω—è–µ—Ç—Å—è).
    image: ghcr.io/himratesdev/himrate-postgres:16-partman-v2
    host: 194.135.85.159
    port: "127.0.0.1:5432:5432"
    # Phase 7 R Step 4 ‚Äî PostgreSQL memory tune for shared 3 vCPU / 8 GiB VPS.
    # Default postgres `shared_buffers` = 25% of host RAM ‚âà 2 GiB on 8 GiB box.
    # OLTP-only workload after CH cutover (PR 1e-A/1e-B, 2026-06-01): chat archive
    # moved to ClickHouse; PG actively touches ~50-100 MiB of pages (Users, Channels,
    # Streams, TrustIndexHistory, Sidekiq state, ChattersSnapshot). Other ~1.9 GiB
    # shared_buffers = wasted on this hardware. Tune to 512 MiB ‚Üí frees ~900 MiB
    # for Sidekiq web/job pool + reduces swap pressure (current 100% used).
    #
    # Parameters chosen per REVISED-PRE-MIGRATION-OPTIMIZATION-PLAN.md Step 3.
    # - shared_buffers=512MB: 6.4% RAM ‚Äî within official 15-25% guidance for cache;
    #   adequate for current working-set; allows OS page cache (effective_cache_size)
    #   to handle bulk reads.
    # - effective_cache_size=1GB: planner hint ‚âà available OS cache (we observe
    #   2.7 GiB buff/cache steady-state post-Step-1-and-2 cleanup; conservative
    #   1 GiB leaves headroom for container/sidekiq cache + future growth).
    # - work_mem=16MB: per-query operation budget. Current realistic peak ‚âà
    #   26 Sidekiq threads (job=5 + whisper=1 + stream=3 + signal_compute=5 +
    #   signals=5 + monitoring=4 + bot_scoring=3) + ~10 web (Puma WEB_CONCURRENCY=2
    #   √ó ~5 threads) + headroom = ~55 active connections √ó 16 MB ‚âà 880 MiB peak.
    #   NOTE: PG `max_connections` stays at default 100 ‚Äî theoretical max if fully
    #   saturated = 1.6 GiB (e.g. ad-hoc rails console + full Sidekiq + irc).
    #   Acceptable.
    # - maintenance_work_mem=64MB: VACUUM/CREATE INDEX budget; small DB so 64 MiB
    #   sufficient (avoids reserve for autovacuum spikes).
    #
    # ‚öÝÔ∏è accessory-config-change ‚Üí requires post-merge `kamal accessory reboot db -d staging`
    # (Kamal deploy does NOT recreate accessories). Brief ~30s PG unavailability during
    # reboot ‚Äî Sidekiq/web auto-reconnect on next query. When this rolls forward to
    # production, the matching reboot is `kamal accessory reboot db -d production`
    # (separate scheduled change window ‚Äî runbook in MEASUREMENTS.md).
    cmd: postgres -c shared_buffers=512MB -c effective_cache_size=1GB -c work_mem=16MB -c maintenance_work_mem=64MB
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: himrate
        POSTGRES_DB: himrate_production
    directories:
      - himrate_pgdata:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack-server:7.4.0-v2
    host: 194.135.85.159
    port: "127.0.0.1:6379:6379"
    env:
      clear:
        REDIS_ARGS: "--appendonly yes"
    directories:
      - himrate_redis:/data
  # === TASK-251.14: ClickHouse ‚Äî columnar analytics store (chat + telemetry time-series, dual-DB) ===
  # Constrained memory ‚Äî coexists with Postgres on the shared VPS until the measured hardware
  # migration (ADR DEC-3). config.d/constrained.xml caps CH RAM + sets listen_host; CH is reachable
  # on the Kamal network as `himrate-clickhouse` (HTTP :8123 / native :9000), host port bound to
  # 127.0.0.1 only + default user password-protected ‚Üí internal-only (same model as db/redis).
  # ‚öÝÔ∏è Accessories are NOT updated by `kamal deploy` ‚Äî first boot needs
  #    `kamal accessory boot clickhouse -d staging` (post-merge; PG accessory-config flag).
  clickhouse:
    image: clickhouse/clickhouse-server:24.8.14.39 # patch-pinned (LTS 24.8) ‚Äî deterministic boot/rollback, repo convention
    host: 194.135.85.159
    port: "127.0.0.1:8123:8123"
    env:
      clear:
        # Per-destination override in deploy.{staging,production}.yml (himrate_staging /
        # himrate_production) ‚Äî staging & prod share this one himrate-clickhouse container on
        # the VPS, isolated by DB name, exactly like the db accessory. Base = production default.
        CLICKHOUSE_DB: himrate_production
      secret:
        - CLICKHOUSE_PASSWORD
    files:
      - clickhouse/config.d/constrained.xml:/etc/clickhouse-server/config.d/constrained.xml
    directories:
      - himrate_clickhouse:/var/lib/clickhouse
    options:
      memory: 2g
      ulimit: nofile=262144:262144
  # === Observability Stack DISABLED ‚Äî PR-B2 (EPIC SCALE ARCHITECTURE Step 6) ===
  #
  # Disabled 2026-06-06 to reduce VPS compute box pressure (load avg 20-30 on 3 vCPU,
  # CPU 0% idle baseline). 6 observability containers were eating ~480 MiB RAM + 6
  # parallel disk writers competing with Sidekiq + ClickHouse + PG for I/O bandwidth.
  #
  # End-state per `_tasks/EPIC-SCALE-ARCHITECTURE/CONTEXT.md` ¬ß2: observability MUST
  # NEVER live on the compute box. Migration target (PO decision deferred to PR-B2.1
  # follow-up):
  #   Option A (Recommended): Grafana Cloud hosted (free tier <10k samples + paid beyond)
  #   Option B: Dedicated obs-VPS (small Hetzner CX21 ~‚Ç¨5/mo, Prometheus/Grafana/Loki self-host)
  #
  # Sentry already covers error tracking (hosted). Logs are temporarily reachable via
  # `docker logs <container>` on staging until observability tier provisioned.
  #
  # Previous accessories (full config history in `git log -p config/deploy.yml`):
  #   - prometheus (v3.0.1, 1 GiB cap, tsdb 90d retention)
  #   - prometheus-pushgateway (v1.10.0, 128 MiB cap)
  #   - loki (v3.4.1, 512 MiB cap, boltdb-shipper backend)
