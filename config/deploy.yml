  #
  # Post-deploy of PR-B2: containers must be manually stopped+removed on staging VPS
  # (Kamal does not auto-clean accessory containers when accessory block removed).
  # DV step runs: `kamal accessory remove <name> -d staging` for each, OR manual
  # `docker rm -f himrate-{prometheus,prometheus-pushgateway,loki,promtail,alertmanager,grafana}`.
  #

  # TASK-110 v1.2 (CR M-2/M-3 fix 2026-05-20): whisper.cpp HTTP server –¥–ª—è clip transcripts.
  # Replaces OpenAI Whisper API per PO cost=$0 Day-0 directive (ADR-110 v1.1 SA-2 swap A‚ÜíB).
  # Image baked —Å small model (~466MB) + whisper-server HTTP daemon per Dockerfile –≤ whisper/.
  #
  # v1.1 –±—ã–ª broken (kamal accessory exec –∏–∑–Ω—É—Ç—Ä–∏ Rails container ‚Äî CR M-2). v1.2 = HTTP server:
  # ClipTranscriptWorker ‚Üí Multimodal::WhisperHttpClient ‚Üí POST multipart –∫
  # http://himrate-whisper:8080/inference (Docker network, full container name DNS).
  # No shared volume (M-3 ‚Äî audio –ø–µ—Ä–µ–¥–∞—ë—Ç—Å—è multipart upload, –Ω–µ —á–µ—Ä–µ–∑ filesystem).
  #
  # IMPORTANT: post-merge `kamal accessory reboot whisper -d <dest>` –û–ë–Ø–ó–ê–¢–ï–õ–ï–ù
  # (per CLAUDE.md rule ‚Äî accessories –Ω–µ –ø–µ—Ä–µ—Å–æ–∑–¥–∞—é—Ç—Å—è –ø—Ä–∏ `kamal deploy`).
  #
  # CPU isolation: --cpus="1.5" cap (50% of Time4VPS 3 cores) + Sidekiq dedicated
  # whisper_worker role concurrency=1 (deploy.yml servers) ‚Äî –æ–¥–∏–Ω inference –≤ –º–æ–º–µ–Ω—Ç.
  # Port 8080 bound internal-only 127.0.0.1 (Rails reaches via Kamal Docker network DNS).
  whisper:
    image: ghcr.io/himratesdev/himrate-whisper:small-v3
    host: 194.135.85.159
    port: "127.0.0.1:9000:8080"
    options:
      cpus: "1.5"
