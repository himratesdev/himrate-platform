# HimRate — Kamal Deployment Configuration
# Staging + Production on single VPS (194.135.85.159)
# Destinations: config/deploy.staging.yml, config/deploy.production.yml

service: himrate
image: himratesdev/himrate-platform

# BUG-251.17 (30→120) + deploy-fix (120→240): kamal's default deploy_timeout (30s) is too tight for
# this app's boot on the single 3-core/8GB VPS. Under live combat load (load avg ~9-11) + ClickHouse
# accessory (#194/#196), a new web container's eager-load can't bind Puma:3000 even within 120s →
# kamal-proxy health check fails → deploy aborts (observed: PR #195 deploy + re-run BOTH failed at 120s,
# "target failed to become healthy within 2m0s"). 240s gives boot headroom under sustained contention.
# Paired with CI kamal setup→deploy (lighter deploy window — see ci.yml). Deploy-time wait only (no
# runtime effect); underlying VPS capacity = separate hardware track (ClickHouse EPIC TASK-251.14).
deploy_timeout: 240

servers:
  web:
    hosts:
      - 194.135.85.159
    # CR M1 fix 2026-06-06: explicit RAILS_MAX_THREADS=3 pins web AR pool to Puma's
    # threads_count default (config/puma.rb line 30 reads same env). Without this
    # override, web would fall back to `database.yml` default `{ 5 }` → 2 idle AR
    # connections per Puma worker. Setting 3 keeps AR pool == Puma threads (no waste,
    # no starvation). Iter-2 CR Nit-A wording fix.
    env:
      clear:
        RAILS_MAX_THREADS: 3

  # 2026-06-06 PR-B1a — Sidekiq Tier-Based Consolidation (ADR DEC-014).
  # Replaces 6 dedicated Sidekiq Kamal roles (job, stream_worker, signal_compute_worker,
  # bot_scoring_worker, signals_worker, monitoring_worker) with 3 tier-weighted roles
  # matching EPIC SCALE ARCHITECTURE §2 Topology Target (compute_tier1/2/3).
  #
  # Why 3-tier (not single, not 2-split):
  # - Single general_worker c=8 = band-aid. Tier 3 batch (cleanup/trends_agg/billing)
  #   would block Tier 1 realtime under Phase 1 scale (1k channels).
  # - 2-tier split (general+compute) = compromise. Tier 3 batch should be isolated from
  #   Tier 2 async-important; on Phase 2 (5k channels) would require ещё split = доработка-
  #   доработки per [[feedback-build-for-scale-no-iterative-band-aids]].
  # - 3-tier = scale-correct. Multi-host ready через Kamal multi-host (replicas scale via
  #   `hosts: [host1, host2, ...]`). One Sidekiq weighted-fetch master per tier, horizontal
  #   scale-out без code change per EPIC §2 §5.
  #
  # Pre-consolidation baseline (2026-06-06 03:13Z, docker stats on a886193):
  #   job 526 MiB + signal_compute_worker 259 MiB + bot_scoring_worker 380 MiB +
  #   monitoring_worker 257 MiB + signals_worker 144 MiB + stream_worker 71 MiB
  #   = 1637 MiB / 1.6 GiB on 6 Rails boot duplicates.
  # Expected post-consolidation: 3 tier roles × ~350-450 MiB = ~1050-1350 MiB.
  # Freed: ~300-600 MiB (3 boot duplicates removed). Honest measurement-based estimate;
  # T1-SPAWN-PROMPT cited "-2.5 GiB" was based on pre-Phase-7-R-Step-1/2/3 baseline before
  # legacy queue purges already freed 1.9 GiB.
  #
  # Whisper_worker stays separate role — GPU-bound by nature (--cpus 1.5 isolation),
  # dedicated CPU budget protected from tier consolidation. IRC stays separate — stateful
  # connection-pinned process. Web stays separate — Puma not Sidekiq.
  #
  # Workers on whisper_transcripts queue: ClipTranscriptWorker (sole). whisper_transcripts
  # is NOT in config/sidekiq.yml :queues — only whisper_worker picks it up via explicit
  # `-q whisper_transcripts` flag.

  # === TIER 1: REALTIME-CRITICAL (live TI / bot scoring / stream lifecycle / anomaly) ===
  # Weighted-fetch within tier (equal weight 10 = round-robin fairness across 4 queues).
  # c=10 threads handle realtime bursts (signal_compute ~3sec/job × 10 threads = 200 j/min).
  #
  # CR M1 fix: AR per-process pool sized via RAILS_MAX_THREADS=12 (Sidekiq c=10 + 2
  # headroom for internal threads — heartbeat, scheduler, Rails async executor — per CR
  # iter-2 Nit-B). Read by config/database.yml `pool: <%= ENV.fetch("RAILS_MAX_THREADS")
  # { 5 } %>`. Without this override the default 5 would block Sidekiq threads 6-10 on
  # connection checkout (ActiveRecord::ConnectionTimeoutError after 5s).
  # Verified vs PG server max_connections=100 default: tier1(12) + tier2(5) + tier3(5) +
  # web(3) + whisper(1) = 26 client slots max — well under server cap with ample headroom
  # for live console / ad-hoc psql / accessory health probes.
  compute_tier1:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q signal_compute,10 -q bot_scoring,10 -q stream_lifecycle,10 -q signals,10 -c 10
    proxy: false
    env:
      clear:
        RAILS_MAX_THREADS: 12
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

  # === TIER 2: ASYNC-IMPORTANT (post-stream report / chat ingest / PVA / monitoring sweep) ===
  # Includes `default` queue (catch-all for jobs without explicit queue:) — safer to land
  # in async-important tier vs batch tier (unknown criticality defaults to faster).
  # `monitoring` (BSW BigChannelChatterSweep) is async-important per EPIC §2 (not batch).
  #
  # CR S2 fix: `monitoring` given weight=10 (2× vs other tier2 queues at 5) reflecting
  # its high-volume profile (BSW ~4 j/min × 14s = ~5760/day vs other tier2 queues which
  # are cron-bursty low-volume). Effective monitoring share = 10/(10+5×6) = 25% fetch
  # slots × c=5 = ~1.25 thread × 14s/job ≈ 0.09 j/s = ~7700/day capacity. **Honest:** this
  # is LESS than the prior dedicated monitoring_worker c=4 (which achieved ~34k/day
  # theoretical), but covers steady-state enqueue 5760/day with ~33% headroom. Backlog
  # will accumulate if BSW jobs spike past 8s avg or PVA queues drain faster than
  # expected. Tradeoff for consolidation — accept + monitor post-deploy + tune c=5→c=7
  # if monitoring backlog grows >24h.
  #
  # CR M1 fix: RAILS_MAX_THREADS=5 (matches c=5) for AR pool sizing.
  compute_tier2:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q post_stream,5 -q chat,5 -q pva_critical,5 -q pva_helix,5 -q pva_gql_anon,5 -q monitoring,10 -q default,5 -c 5
    proxy: false
    env:
      clear:
        RAILS_MAX_THREADS: 5
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

  # === TIER 3: BATCH / DEFERRED (notifications / accessory ops / ML training / cleanup) ===
  # Lowest priority. Sustained backlog acceptable here (job latency ~minutes-hours OK for
  # email digests / cleanup sweeps / ML retraining). c=5 threads — adequate for low-volume
  # periodic schedulers + the occasional MlOps training run (long_running queue caps via
  # job-level timeout, not concurrency).
  #
  # CR M1 fix: RAILS_MAX_THREADS=5 (matches c=5) for AR pool sizing.
  compute_tier3:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q notifications,2 -q accessory_ops,2 -q long_running,2 -c 5
    proxy: false
    env:
      clear:
        RAILS_MAX_THREADS: 5
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

  # TASK-110 v1.2 (CR S-7): dedicated Sidekiq role для whisper_transcripts queue concurrency=1.
  # CPU isolation — один transcript job в момент, prevents starvation web/job на Time4VPS 3 cores.
  # whisper_transcripts queue НЕ в config/sidekiq.yml :queues (default `job` role его не подхватывает);
  # обрабатывается ТОЛЬКО этим role через explicit -q flag.
  # 2026-06-06 PR-B1a: NOT consolidated into compute_tiers — GPU-bound by nature, --cpus 1.5
  # isolation preserved.
  whisper_worker:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -q whisper_transcripts -c 1
    proxy: false
    env:
      clear:
        # CR M1 fix: RAILS_MAX_THREADS=1 matches Sidekiq c=1 — minimal AR pool footprint.
        RAILS_MAX_THREADS: 1
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

  # ⚠️ HISTORICAL: 6 dedicated Sidekiq Kamal roles removed 2026-06-06 PR-B1a (ADR DEC-014):
  #   - job (default catch-all, c=5)
  #   - stream_worker (-q stream_lifecycle -c 3, added BUG-251.40-F 2026-06-01)
  #   - signal_compute_worker (-q signal_compute -c 5, added PR #257 2026-06-02)
  #   - bot_scoring_worker (-q bot_scoring -c 3, added PR #283 2026-06-05 Phase 7 T)
  #   - signals_worker (-q signals -c 5, added PR #270 2026-06-03 Phase 7 O)
  #   - monitoring_worker (-q monitoring -c 4, added PR #274 2026-06-03 Phase 7 O follow-up)
  # Replaced by compute_tier1/2/3 roles defined above (EPIC SCALE ARCHITECTURE §2 Topology Target).
  # All 14 queues from config/sidekiq.yml :queues remain consumed (now via tier-weighted-fetch
  # instead of strict-precedence per-role). Whisper_worker preserved as separate GPU-isolated role.
  # Rationale + full historical context: docs/adrs/DEC-014-sidekiq-tier-consolidation.md.
  # === END HISTORICAL block; original Phase 7 O/S/T per-role comments removed (preserved in
  #     git history for blame archaeology). Definitions consolidated above. ===
  irc:
    hosts:
      - 194.135.85.159
    cmd: bin/irc_monitor
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

proxy:
  ssl: true
  host: himrate.com
  # CR M-3 + PG W-1: kamal-proxy не routes per-host к разным backends.
  # Grafana subdomain access initially via SSH tunnel only (127.0.0.1:3000 binding
  # на accessory). Public access (grafana.himrate.com) — separate setup через
  # Cloudflare Tunnel (cloudflared accessory) post-PR1. См. accessory_ops.md.

registry:
  server: ghcr.io
  username: himratesdev
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - JWT_SECRET
    - SECRET_KEY_BASE
    - TWITCH_CLIENT_ID
    - TWITCH_CLIENT_SECRET
    - TWITCH_REDIRECT_URI
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GOOGLE_REDIRECT_URI
    # BUG-027: comma-separated allowlist of extra OAuth redirect_uris (extension
    # chromiumapp.org + future clients). Web-callback defaults are always trusted.
    - OAUTH_ALLOWED_REDIRECT_URIS
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - FLIPPER_UI_PASSWORD
    - FLIPPER_UI_USER
    - ALLOWED_EXTENSION_ID
    - TWITCH_WEBHOOK_SECRET
    - EVENTSUB_WEBHOOK_URL
    # BUG-010 PR2 (ADR DEC-3): fine-grained PAT для AutoRemediation::TriggerService → GitHub workflow_dispatch.
    # Имя без `GITHUB_` prefix — зарезервирован GitHub Actions для secrets (HTTP 422). ADR §7 corrigendum.
    - AUTO_TRIGGER_GH_PAT
    # TASK-251.14: ClickHouse default-user password — app side. (The same secret also passwords the
    # `clickhouse` accessory's default user; here it lets the app authenticate to it.)
    - CLICKHOUSE_PASSWORD
  clear:
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 2
    # TASK-251.14: ClickHouse connection (app side). Reached over the Kamal Docker network by the
    # accessory's full container name. Port defaults to 8123 in Clickhouse::Client; database is
    # per-destination (config/deploy.{staging,production}.yml CLICKHOUSE_DATABASE).
    CLICKHOUSE_HOST: himrate-clickhouse

# Accessories: PostgreSQL + Redis + observability stack on the same VPS
# BUG-010 PR1: +grafana, prometheus, loki, promtail, alertmanager, prometheus-pushgateway
accessories:
  db:
    # TASK-039 ADR §4.2: custom image с pg_partman extension (built in CI).
    # Dockerfile: db/Dockerfile. Build workflow: .github/workflows/build-db-image.yml.
    # Tag versioned (v1/v2/...) для deterministic rollback — bump triggered manual
    # при Dockerfile changes (см. Dockerfile комментарий + workflow IMAGE_TAG).
    # После build в ghcr → manual `kamal accessory reboot db -d <dest>` (volume сохраняется).
    image: ghcr.io/himratesdev/himrate-postgres:16-partman-v2
    host: 194.135.85.159
    port: "127.0.0.1:5432:5432"
    # Phase 7 R Step 4 — PostgreSQL memory tune for shared 3 vCPU / 8 GiB VPS.
    # Default postgres `shared_buffers` = 25% of host RAM ≈ 2 GiB on 8 GiB box.
    # OLTP-only workload after CH cutover (PR 1e-A/1e-B, 2026-06-01): chat archive
    # moved to ClickHouse; PG actively touches ~50-100 MiB of pages (Users, Channels,
    # Streams, TrustIndexHistory, Sidekiq state, ChattersSnapshot). Other ~1.9 GiB
    # shared_buffers = wasted on this hardware. Tune to 512 MiB → frees ~900 MiB
    # for Sidekiq web/job pool + reduces swap pressure (current 100% used).
    #
    # Parameters chosen per REVISED-PRE-MIGRATION-OPTIMIZATION-PLAN.md Step 3.
    # - shared_buffers=512MB: 6.4% RAM — within official 15-25% guidance for cache;
    #   adequate for current working-set; allows OS page cache (effective_cache_size)
    #   to handle bulk reads.
    # - effective_cache_size=1GB: planner hint ≈ available OS cache (we observe
    #   2.7 GiB buff/cache steady-state post-Step-1-and-2 cleanup; conservative
    #   1 GiB leaves headroom for container/sidekiq cache + future growth).
    # - work_mem=16MB: per-query operation budget. Current realistic peak ≈
    #   26 Sidekiq threads (job=5 + whisper=1 + stream=3 + signal_compute=5 +
    #   signals=5 + monitoring=4 + bot_scoring=3) + ~10 web (Puma WEB_CONCURRENCY=2
    #   × ~5 threads) + headroom = ~55 active connections × 16 MB ≈ 880 MiB peak.
    #   NOTE: PG `max_connections` stays at default 100 — theoretical max if fully
    #   saturated = 1.6 GiB (e.g. ad-hoc rails console + full Sidekiq + irc).
    #   Acceptable.
    # - maintenance_work_mem=64MB: VACUUM/CREATE INDEX budget; small DB so 64 MiB
    #   sufficient (avoids reserve for autovacuum spikes).
    #
    # ⚠️ accessory-config-change → requires post-merge `kamal accessory reboot db -d staging`
    # (Kamal deploy does NOT recreate accessories). Brief ~30s PG unavailability during
    # reboot — Sidekiq/web auto-reconnect on next query. When this rolls forward to
    # production, the matching reboot is `kamal accessory reboot db -d production`
    # (separate scheduled change window — runbook in MEASUREMENTS.md).
    cmd: postgres -c shared_buffers=512MB -c effective_cache_size=1GB -c work_mem=16MB -c maintenance_work_mem=64MB
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: himrate
        POSTGRES_DB: himrate_production
    directories:
      - himrate_pgdata:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack-server:7.4.0-v2
    host: 194.135.85.159
    port: "127.0.0.1:6379:6379"
    env:
      clear:
        REDIS_ARGS: "--appendonly yes"
    directories:
      - himrate_redis:/data
  # === TASK-251.14: ClickHouse — columnar analytics store (chat + telemetry time-series, dual-DB) ===
  # Constrained memory — coexists with Postgres on the shared VPS until the measured hardware
  # migration (ADR DEC-3). config.d/constrained.xml caps CH RAM + sets listen_host; CH is reachable
  # on the Kamal network as `himrate-clickhouse` (HTTP :8123 / native :9000), host port bound to
  # 127.0.0.1 only + default user password-protected → internal-only (same model as db/redis).
  # ⚠️ Accessories are NOT updated by `kamal deploy` — first boot needs
  #    `kamal accessory boot clickhouse -d staging` (post-merge; PG accessory-config flag).
  clickhouse:
    image: clickhouse/clickhouse-server:24.8.14.39 # patch-pinned (LTS 24.8) — deterministic boot/rollback, repo convention
    host: 194.135.85.159
    port: "127.0.0.1:8123:8123"
    env:
      clear:
        # Per-destination override in deploy.{staging,production}.yml (himrate_staging /
        # himrate_production) — staging & prod share this one himrate-clickhouse container on
        # the VPS, isolated by DB name, exactly like the db accessory. Base = production default.
        CLICKHOUSE_DB: himrate_production
      secret:
        - CLICKHOUSE_PASSWORD
    files:
      - clickhouse/config.d/constrained.xml:/etc/clickhouse-server/config.d/constrained.xml
    directories:
      - himrate_clickhouse:/var/lib/clickhouse
    options:
      memory: 2g
      ulimit: nofile=262144:262144
  # === BUG-010 Observability Stack ===
  prometheus:
    image: prom/prometheus:v3.0.1
    host: 194.135.85.159
    port: "127.0.0.1:9090:9090"
    cmd: --storage.tsdb.retention.time=90d --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles
    # Deploy iter2 fix: Kamal `directories:` accepts только volumes/directory mounts.
    # Single config files должны быть в `files:` block (a dir bind mounts EMPTY).
    files:
      - prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # TASK-086 FR-030: cleanup-worker safety-net alerting rules (rule_files glob
      # /etc/prometheus/rules/*.yml in prometheus.yml). Mount each rule file
      # individually — Kamal `files:` does not glob, `directories:` would mount empty.
      - prometheus/rules/cleanup_health.yml:/etc/prometheus/rules/cleanup_health.yml
    directories:
      - himrate_prometheus:/prometheus
    options:
      memory: 1g  # CR S-3: ADR DEC-24 estimate
      # Container UID 0 — namespace-isolated, internal-only 127.0.0.1 binding
      # mitigates exposure. Init-container pre-chown pattern для UID matching
      # tracked в TASK-081.
      user: "0:0"
  prometheus-pushgateway:
    # Push gateway для workflow batch metrics (ephemeral GitHub Actions runners).
    # ADR DEC-12: workflow steps push здесь, Prometheus scrapes для storage.
    image: prom/pushgateway:v1.10.0
    host: 194.135.85.159
    port: "127.0.0.1:9091:9091"
    options:
      memory: 128m  # CR S-3
  loki:
    # ADR DEC-15: filesystem boltdb-shipper backend pre-launch (S3 deferred к TASK-080).
    image: grafana/loki:3.4.1
    host: 194.135.85.159
    port: "127.0.0.1:3100:3100"
    cmd: -config.file=/etc/loki/loki-config.yml
    files:
      - loki/loki-config.yml:/etc/loki/loki-config.yml
    directories:
      - himrate_loki:/loki
    options:
      memory: 512m  # CR S-3
      # Container UID 0 — namespace-isolated, internal-only binding. Loki
      # default UID 10001 can't mkdir в named volume. UID matching tracked
      # в TASK-081 (init-container pre-chown pattern).
      user: "0:0"
  promtail:
    # Ships Docker container logs к Loki via file-based discovery (no Docker socket).
    # Reads /var/lib/docker/containers/*/*-json.log глоб pattern, extracts container_id
    # from path. Eliminates need для /var/run/docker.sock mount (Kamal's mkdir -p
    # fails on existing socket file).
    # ADR DEC-19: log redaction patterns в config (Bearer/password/PAT/Telegram tokens).
    image: grafana/promtail:3.4.1
    host: 194.135.85.159
    cmd: -config.file=/etc/promtail/promtail-config.yml
    files:
      - promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    directories:
      # Read-only access к Docker container log files. Directory mount works
      # с Kamal mkdir -p (idempotent on existing dir).
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    options:
      memory: 256m  # CR S-3
  alertmanager:
    # ADR FR-066/067: routing tree config — workflow + worker push к /api/v2/alerts here.
    # Replaces direct Telegram POST. Falls back к direct Telegram если Alertmanager down (FR-073).
    #
    # CR M-1/M-2 fix: Alertmanager YAML config doesn't expand env vars natively.
    # cmd uses sh+sed (busybox в alertmanager image base) to substitute __PLACEHOLDER__
    # markers с runtime env values, then exec alertmanager. Generated config to /tmp.
    # Pattern: build-for-years, no Docker secrets dependency, no init container.
    image: prom/alertmanager:v0.27.0
    host: 194.135.85.159
    port: "127.0.0.1:9093:9093"
    # Deploy iter1 fix: Kamal accessory cmd accepts string only (not array).
    # Script file mounted к /usr/local/bin/entrypoint.sh handles substitution +
    # alertmanager exec. Alpine sh runs script, env vars from `env: secret:` block.
    # cmd removed — using options.entrypoint override instead. Reason: Kamal cmd
    # translates к Docker CMD, which gets passed как arguments к Docker ENTRYPOINT
    # (/bin/alertmanager). Result: alertmanager treats script path как flag, errors.
    # Override ENTRYPOINT itself через options.entrypoint, then container runs script.
    env:
      secret:
        - TELEGRAM_OPS_BOT_TOKEN
        - TELEGRAM_CRITICAL_CHAT_ID
        - TELEGRAM_OPS_CHAT_ID
        - TELEGRAM_INFO_CHAT_ID
    files:
      - alertmanager/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl
      - alertmanager/entrypoint.sh:/usr/local/bin/entrypoint.sh
    directories:
      - himrate_alertmanager:/alertmanager
    options:
      memory: 256m  # CR S-3
      entrypoint: /usr/local/bin/entrypoint.sh
      # Container UID 0 — namespace-isolated, internal-only binding. UID matching
      # tracked в TASK-081 (init-container pre-chown pattern).
      user: "0:0"
  grafana:
    # ADR FR-034..037, FR-075..082: SSO Google OIDC + basic auth fallback + provisioning.
    # Web UI на grafana.himrate.com через kamal proxy SSL.
    # 7 dashboards provisioned from grafana/dashboards/*.json (Drift Trend, Operations
    # Frequency, MTTR, Accessory Health Overview, Logs Explorer, Cost Attribution, Cleanup Health).
    image: grafana/grafana-oss:11.4.0
    host: 194.135.85.159
    # PG W-1 fix: bind 127.0.0.1:3000 (internal-only). Eliminates risk window
    # between deploy и CF proxy setup. Pre-public-access via SSH tunnel.
    port: "127.0.0.1:3000:3000"
    env:
      secret:
        # Hotfix #7 (DV finding #5): Kamal `clear:` env block НЕ expand `$VAR`.
        # Pass secrets как-is через `secret:` block, entrypoint.sh maps к GF_* names.
        - GRAFANA_ADMIN_USER
        - GRAFANA_ADMIN_PASSWORD
        - GRAFANA_OIDC_CLIENT_ID
        - GRAFANA_OIDC_CLIENT_SECRET
      clear:
        GF_SERVER_ROOT_URL: https://grafana.himrate.com
        GF_SERVER_DOMAIN: grafana.himrate.com
        # Google OIDC SSO settings (non-secret values)
        GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
        GF_AUTH_GENERIC_OAUTH_NAME: Google
        GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
        GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://accounts.google.com/o/oauth2/v2/auth
        GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://oauth2.googleapis.com/token
        GF_AUTH_GENERIC_OAUTH_API_URL: https://openidconnect.googleapis.com/v1/userinfo
        GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
        GF_AUTH_GENERIC_OAUTH_ALLOWED_DOMAINS: himrate.com
        GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "'Admin'"
        # CR N-3: Auto-create users as Admin acceptable pre-launch.
        GF_USERS_AUTO_ASSIGN_ORG_ROLE: Admin
        # CR S-2: Auth brute force protection (ADR DEC-8).
        GF_AUTH_BASIC_ENABLED: "true"
        GF_AUTH_BRUTE_FORCE_LOGIN_PROTECTION_ENABLED: "true"
        GF_AUTH_BRUTE_FORCE_LOGIN_PROTECTION_MAX_ATTEMPTS: "5"
    files:
      # Hotfix #7 (DV finding #7): Kamal `directories: ./grafana/provisioning` mount
      # creates EMPTY dir (does NOT copy local content). Mount each provisioning file
      # individually via `files:` block. Same для dashboard JSONs.
      - grafana/entrypoint.sh:/usr/local/bin/grafana-entrypoint.sh
      - grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - grafana/dashboards/drift_trend.json:/var/lib/grafana/dashboards/drift_trend.json
      - grafana/dashboards/operations_frequency.json:/var/lib/grafana/dashboards/operations_frequency.json
      - grafana/dashboards/mttr.json:/var/lib/grafana/dashboards/mttr.json
      - grafana/dashboards/accessory_health_overview.json:/var/lib/grafana/dashboards/accessory_health_overview.json
      - grafana/dashboards/logs_explorer.json:/var/lib/grafana/dashboards/logs_explorer.json
      - grafana/dashboards/cost_attribution.json:/var/lib/grafana/dashboards/cost_attribution.json
      # TASK-086 FR-040: cleanup-worker health dashboard (deleted-per-table, run
      # duration, table row counts, consecutive errors, last-run age, audit-insert failures).
      - grafana/dashboards/cleanup_health.json:/var/lib/grafana/dashboards/cleanup_health.json
    directories:
      - himrate_grafana:/var/lib/grafana
    options:
      memory: 512m  # CR S-3: ADR DEC-24 estimate
      # Container UID 0 — namespace-isolated, internal-only 127.0.0.1 binding.
      # UID matching tracked в TASK-081 (init-container pre-chown pattern).
      user: "0:0"
      # Hotfix #7 (DV finding #5): entrypoint script maps GRAFANA_* secrets к GF_* env names.
      entrypoint: /usr/local/bin/grafana-entrypoint.sh

  # TASK-110 v1.2 (CR M-2/M-3 fix 2026-05-20): whisper.cpp HTTP server для clip transcripts.
  # Replaces OpenAI Whisper API per PO cost=$0 Day-0 directive (ADR-110 v1.1 SA-2 swap A→B).
  # Image baked с small model (~466MB) + whisper-server HTTP daemon per Dockerfile в whisper/.
  #
  # v1.1 был broken (kamal accessory exec изнутри Rails container — CR M-2). v1.2 = HTTP server:
  # ClipTranscriptWorker → Multimodal::WhisperHttpClient → POST multipart к
  # http://himrate-whisper:8080/inference (Docker network, full container name DNS).
  # No shared volume (M-3 — audio передаётся multipart upload, не через filesystem).
  #
  # IMPORTANT: post-merge `kamal accessory reboot whisper -d <dest>` ОБЯЗАТЕЛЕН
  # (per CLAUDE.md rule — accessories не пересоздаются при `kamal deploy`).
  #
  # CPU isolation: --cpus="1.5" cap (50% of Time4VPS 3 cores) + Sidekiq dedicated
  # whisper_worker role concurrency=1 (deploy.yml servers) — один inference в момент.
  # Port 8080 bound internal-only 127.0.0.1 (Rails reaches via Kamal Docker network DNS).
  whisper:
    image: ghcr.io/himratesdev/himrate-whisper:small-v3
    host: 194.135.85.159
    port: "127.0.0.1:9000:8080"
    options:
      cpus: "1.5"
      memory: 2g  # ~500MB resident model + ~500MB per-job peak + headroom
      # N-5 (CR): non-root user 1000 baked в Dockerfile (USER whisper) — не override к 0:0.

volumes:
  - "himrate_storage:/rails/storage"

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f

