# HimRate — Kamal Deployment Configuration
# Staging + Production on single VPS (194.135.85.159)
# Destinations: config/deploy.staging.yml, config/deploy.production.yml

service: himrate
image: himratesdev/himrate-platform

servers:
  web:
    hosts:
      - 194.135.85.159
  job:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

proxy:
  ssl: true
  host: himrate.com

registry:
  server: ghcr.io
  username: himratesdev
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - JWT_SECRET
    - SECRET_KEY_BASE
    - TWITCH_CLIENT_ID
    - TWITCH_CLIENT_SECRET
    - TWITCH_REDIRECT_URI
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
  clear:
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 2

# Accessories: PostgreSQL + Redis on the same VPS
accessories:
  db:
    image: postgres:16
    host: 194.135.85.159
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: himrate
        POSTGRES_DB: himrate_production
    directories:
      - himrate_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: 194.135.85.159
    port: "127.0.0.1:6379:6379"
    directories:
      - himrate_redis:/data

volumes:
  - "himrate_storage:/rails/storage"

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f

# === DESTINATIONS ===
# Staging: config/deploy.staging.yml
# Production: config/deploy.production.yml
