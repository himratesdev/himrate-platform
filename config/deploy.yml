# HimRate — Kamal Deployment Configuration
# Staging + Production on single VPS (194.135.85.159)
# Destinations: config/deploy.staging.yml, config/deploy.production.yml

service: himrate
image: himratesdev/himrate-platform

servers:
  web:
    hosts:
      - 194.135.85.159
  job:
    hosts:
      - 194.135.85.159
    cmd: bundle exec sidekiq -C config/sidekiq.yml
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s
  irc:
    hosts:
      - 194.135.85.159
    cmd: bin/irc_monitor
    proxy: false
    options:
      health-cmd: "ruby -e 'puts :ok'"
      health-interval: 10s

proxy:
  ssl: true
  host: himrate.com
  # CR M-3 fix: kamal-proxy не routes per-host к разным backends, only single app
  # backend (web role). Grafana subdomain handled separately:
  # 1. Cloudflare proxy mode (orange cloud) на grafana.himrate.com DNS record
  # 2. Cloudflare resolves grafana.himrate.com → CF anycast → origin 194.135.85.159:3000
  # 3. Cloudflare Universal SSL terminates HTTPS automatically
  # Origin port 3000 binding (0.0.0.0:3000 в grafana accessory below) accepts traffic
  # from CF edge IPs. Auth (SSO/basic) protects endpoint.
  # PO action item: enable proxy mode (orange cloud) для grafana DNS record в Cloudflare.

registry:
  server: ghcr.io
  username: himratesdev
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - JWT_SECRET
    - SECRET_KEY_BASE
    - TWITCH_CLIENT_ID
    - TWITCH_CLIENT_SECRET
    - TWITCH_REDIRECT_URI
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GOOGLE_REDIRECT_URI
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - FLIPPER_UI_PASSWORD
    - FLIPPER_UI_USER
    - ALLOWED_EXTENSION_ID
    - TWITCH_WEBHOOK_SECRET
    - EVENTSUB_WEBHOOK_URL
  clear:
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: true
    WEB_CONCURRENCY: 2

# Accessories: PostgreSQL + Redis + observability stack on the same VPS
# BUG-010 PR1: +grafana, prometheus, loki, promtail, alertmanager, prometheus-pushgateway
accessories:
  db:
    # TASK-039 ADR §4.2: custom image с pg_partman extension (built in CI).
    # Dockerfile: db/Dockerfile. Build workflow: .github/workflows/build-db-image.yml.
    # Tag versioned (v1/v2/...) для deterministic rollback — bump triggered manual
    # при Dockerfile changes (см. Dockerfile комментарий + workflow IMAGE_TAG).
    # После build в ghcr → manual `kamal accessory reboot db -d <dest>` (volume сохраняется).
    image: ghcr.io/himratesdev/himrate-postgres:16-partman-v2
    host: 194.135.85.159
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: himrate
        POSTGRES_DB: himrate_production
    directories:
      - himrate_pgdata:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack-server:7.4.0-v2
    host: 194.135.85.159
    port: "127.0.0.1:6379:6379"
    env:
      clear:
        REDIS_ARGS: "--appendonly yes"
    directories:
      - himrate_redis:/data
  # === BUG-010 Observability Stack ===
  prometheus:
    image: prom/prometheus:v3.0.1
    host: 194.135.85.159
    port: "127.0.0.1:9090:9090"
    cmd: --storage.tsdb.retention.time=90d --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles
    directories:
      - himrate_prometheus:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    options:
      memory: 1g  # CR S-3: ADR DEC-24 estimate
  prometheus-pushgateway:
    # Push gateway для workflow batch metrics (ephemeral GitHub Actions runners).
    # ADR DEC-12: workflow steps push здесь, Prometheus scrapes для storage.
    image: prom/pushgateway:v1.10.0
    host: 194.135.85.159
    port: "127.0.0.1:9091:9091"
    options:
      memory: 128m  # CR S-3
  loki:
    # ADR DEC-15: filesystem boltdb-shipper backend pre-launch (S3 deferred к TASK-080).
    image: grafana/loki:3.4.1
    host: 194.135.85.159
    port: "127.0.0.1:3100:3100"
    cmd: -config.file=/etc/loki/loki-config.yml
    directories:
      - himrate_loki:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
    options:
      memory: 512m  # CR S-3
  promtail:
    # Ships Docker container logs к Loki. Privileged docker access required.
    # ADR DEC-19: log redaction patterns в config (Bearer/password/PAT/Telegram tokens).
    image: grafana/promtail:3.4.1
    host: 194.135.85.159
    cmd: -config.file=/etc/promtail/promtail-config.yml
    directories:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    options:
      privileged: true
      memory: 256m  # CR S-3
  alertmanager:
    # ADR FR-066/067: routing tree config — workflow + worker push к /api/v2/alerts here.
    # Replaces direct Telegram POST. Falls back к direct Telegram если Alertmanager down (FR-073).
    #
    # CR M-1/M-2 fix: Alertmanager YAML config doesn't expand env vars natively.
    # cmd uses sh+sed (busybox в alertmanager image base) to substitute __PLACEHOLDER__
    # markers с runtime env values, then exec alertmanager. Generated config to /tmp.
    # Pattern: build-for-years, no Docker secrets dependency, no init container.
    image: prom/alertmanager:v0.27.0
    host: 194.135.85.159
    port: "127.0.0.1:9093:9093"
    cmd:
      - sh
      - -c
      - |
        set -e
        sed \
          -e "s|__TG_BOT_TOKEN__|${TELEGRAM_OPS_BOT_TOKEN}|g" \
          -e "s|__TG_CRITICAL_CHAT_ID__|${TELEGRAM_CRITICAL_CHAT_ID}|g" \
          -e "s|__TG_OPS_CHAT_ID__|${TELEGRAM_OPS_CHAT_ID}|g" \
          -e "s|__TG_INFO_CHAT_ID__|${TELEGRAM_INFO_CHAT_ID}|g" \
          /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    env:
      secret:
        - TELEGRAM_OPS_BOT_TOKEN
        - TELEGRAM_CRITICAL_CHAT_ID
        - TELEGRAM_OPS_CHAT_ID
        - TELEGRAM_INFO_CHAT_ID
    directories:
      - himrate_alertmanager:/alertmanager
      - ./alertmanager/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl
    options:
      memory: 256m  # CR S-3
  grafana:
    # ADR FR-034..037, FR-075..082: SSO Google OIDC + basic auth fallback + provisioning.
    # Web UI на grafana.himrate.com через kamal proxy SSL.
    # 6 dashboards provisioned from grafana/dashboards/*.json (Drift Trend, Operations
    # Frequency, MTTR, Accessory Health Overview, Logs Explorer, Cost Attribution).
    image: grafana/grafana-oss:11.4.0
    host: 194.135.85.159
    # CR M-3 fix: bind 0.0.0.0:3000 (was 127.0.0.1) — accessible через
    # Cloudflare proxy mode (orange cloud) на grafana.himrate.com DNS.
    # CF terminates SSL, routes к origin:3000. Auth (SSO/basic) protects endpoint.
    port: "3000:3000"
    env:
      secret:
        - GRAFANA_ADMIN_USER
        - GRAFANA_ADMIN_PASSWORD
        - GRAFANA_OIDC_CLIENT_ID
        - GRAFANA_OIDC_CLIENT_SECRET
      clear:
        GF_SERVER_ROOT_URL: https://grafana.himrate.com
        GF_SERVER_DOMAIN: grafana.himrate.com
        GF_SECURITY_ADMIN_USER: $GRAFANA_ADMIN_USER
        GF_SECURITY_ADMIN_PASSWORD: $GRAFANA_ADMIN_PASSWORD
        # Google OIDC SSO (primary auth)
        GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
        GF_AUTH_GENERIC_OAUTH_NAME: Google
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: $GRAFANA_OIDC_CLIENT_ID
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: $GRAFANA_OIDC_CLIENT_SECRET
        GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
        GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://accounts.google.com/o/oauth2/v2/auth
        GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://oauth2.googleapis.com/token
        GF_AUTH_GENERIC_OAUTH_API_URL: https://openidconnect.googleapis.com/v1/userinfo
        GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
        GF_AUTH_GENERIC_OAUTH_ALLOWED_DOMAINS: himrate.com
        GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "'Admin'"
        # CR N-3: Auto-create users as Admin acceptable pre-launch (small team, single PO).
        # Post-launch consider role granularity: Editor для regular team, Viewer для observers.
        # Switch via GF_USERS_AUTO_ASSIGN_ORG_ROLE + per-user override через role mapping.
        GF_USERS_AUTO_ASSIGN_ORG_ROLE: Admin
        # CR S-2: Auth rate limiting per ADR DEC-8 (Grafana built-in + Kamal proxy layer).
        # 60 req/min на login endpoint defends against brute-force.
        GF_AUTH_BASIC_ENABLED: "true"
        GF_AUTH_BRUTE_FORCE_LOGIN_PROTECTION_ENABLED: "true"
        GF_AUTH_BRUTE_FORCE_LOGIN_PROTECTION_MAX_ATTEMPTS: "5"
    directories:
      - himrate_grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    options:
      memory: 512m  # CR S-3: ADR DEC-24 estimate

volumes:
  - "himrate_storage:/rails/storage"

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f

# === DESTINATIONS ===
# Staging: config/deploy.staging.yml
# Production: config/deploy.production.yml
