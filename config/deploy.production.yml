# HimRate — Kamal Production Destination
# Overrides config/deploy.yml for production environment

proxy:
  ssl: true
  host: api.himrate.com

env:
  clear:
    RAILS_ENV: production
    WEB_CONCURRENCY: 2
    # TASK-251.14: app connects to the production CH database (matches the accessory CLICKHOUSE_DB below).
    CLICKHOUSE_DATABASE: himrate_production

accessories:
  db:
    env:
      clear:
        POSTGRES_DB: himrate_production
  clickhouse:
    env:
      clear:
        CLICKHOUSE_DB: himrate_production
