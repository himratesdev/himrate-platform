# TASK-015: Sidekiq queue configuration
# Queues ordered by priority (higher weight = higher priority)
# bot_scoring: per-stream bot-scoring (BotScoringWorker, LiveBotScoringWorker) — must bypass
#              :signals backlog so PerUserBotScore stays fresh on live streams. Without a
#              dedicated queue, bot-scoring jobs sit behind 700k+ SignalComputeWorker rebuilds
#              and the chat_behavior / known_bot_match / account_profile_scoring signals
#              abstain on 97% of channels (Phase 5 root cause, 2026-05-31).
# signals: Trust Index computations (real-time critical)
# default: general tasks
# notifications: email, Telegram, push
# monitoring: periodic checks, cleanup
# accessory_ops: BUG-010 PR2 — AccessoryDriftDetectorWorker, AutoRemediation triggers,
#                CostAttribution aggregation (priority 2)
# long_running: BUG-010 PR2 — MlOps trainer (>=10min runs), isolated to prevent worker
#               starvation в default/signals queues (priority 1, low concurrency budget)

:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 5) %>

:queues:
  - [bot_scoring, 6]
  - [signals, 5]
  - [chat, 4]
  - [pva_critical, 3]
  - [pva_helix, 3]
  - [pva_gql_anon, 3]
  - [post_stream, 3]
  - [default, 3]
  - [notifications, 2]
  - [accessory_ops, 2]
  - [monitoring, 1]
  - [long_running, 1]
# TASK-110 v1.2 (CR S-7): `whisper_transcripts` queue НАМЕРЕННО НЕ в этом :queues списке.
# Default `job` Sidekiq role не должен подхватывать whisper jobs (иначе concurrency=5-10
# spawns multiple whisper invocations → defeats CPU isolation). Обрабатывается ТОЛЬКО
# dedicated whisper_worker role (deploy.yml) через explicit `sidekiq -q whisper_transcripts -c 1`.
