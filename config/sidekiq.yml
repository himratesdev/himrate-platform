# TASK-015: Sidekiq queue configuration
#
# 2026-06-06 PR-B1a (ADR DEC-014): queue → role mapping consolidated from 6 dedicated
# Sidekiq Kamal roles to 3 tier-weighted roles in deploy.yml. The :queues definitions
# below are PRESERVED for any code paths that introspect queue weight (e.g. monitoring
# dashboards) but the per-queue runtime behavior is now determined by which tier role
# in config/deploy.yml consumes it (via explicit `-q queue,weight` CLI flag), NOT by
# this file's ordering.
#
# Tier mapping (see config/deploy.yml servers.compute_tier1/2/3):
#   Tier 1 c=10 (realtime-critical, all weight 10): signal_compute, bot_scoring, stream_lifecycle, signals
#   Tier 2 c=5  (async-important, all weight 5 except monitoring=10):
#     post_stream, chat, pva_critical, pva_helix, pva_gql_anon, monitoring, default
#   Tier 3 c=5  (batch/deferred, all weight 2): notifications, accessory_ops, long_running
#   whisper_transcripts: separate whisper_worker role (NOT in this :queues list).
#
# CR S1 acknowledgment: the prior architecture's N+1 safety net (`job` catch-all consuming
# every queue at low weight as fallback when a dedicated role crashed) is REMOVED by this
# consolidation. Each queue now has a single role consumer. Mitigation: multi-host scale-out
# (Kamal `hosts: [box1, box2]` per EPIC §3) restores N+1 once Phase 1 launch hits a 2nd box.
# Until then: manual `kamal app restart -r compute_tierN -d staging` if a tier crashes.
# This is an accepted tradeoff for consolidation under VPS load-saturation reality.
#
# Per-queue historical notes (each was added during a separate starvation incident):
# bot_scoring: per-stream bot-scoring (BotScoringWorker, LiveBotScoringWorker) — added
#              PR #229 (2026-05-31) to bypass :signals backlog so PerUserBotScore stays
#              fresh on live streams (chat_behavior / known_bot_match / account_profile_scoring
#              signals were abstaining on 97% of channels).
# signal_compute: SignalComputeWorker — added Phase 5 follow-up (2026-05-31, PR #257) for
#                 same reason as bot_scoring split. Highest-volume :signals enqueuer.
# stream_lifecycle: StreamOnlineWorker + StreamOfflineWorker — added BUG-251.40-E (2026-06-01,
#                   PR #233/#240) when 0 Stream creates last 6h on staging because legacy
#                   :signals backlog blocked new lifecycle jobs.
# signals: legacy queue with historical backlog (SignalComputeWorker pre-PR #233 stale,
#          Trends::AnomalyAttributionWorker low-volume, BotScoringWorker stragglers).
#          Drains naturally as backlog burns down without new inflow.
# default: catch-all for workers that don't specify `queue:`. Tier 2 placement = safer
#          default for unknown criticality.
# notifications: email, Telegram, push (low-volume periodic).
# monitoring: BSW BigChannelChatterSweep + 19 other periodic schedulers. High-volume in
#             tier 2; weight bumped to 10 in compute_tier2 cmd for proportional fetch share.
# accessory_ops: BUG-010 PR2 — AccessoryDriftDetectorWorker, AutoRemediation triggers,
#                CostAttribution aggregation.
# long_running: BUG-010 PR2 — MlOps trainer (>=10min runs), tier 3 isolation prevents
#               worker starvation of realtime/async-important tiers.

:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 5) %>

:queues:
  - [bot_scoring, 6]
  - [signal_compute, 6]
  - [stream_lifecycle, 6]
  - [signals, 5]
  - [chat, 4]
  - [pva_critical, 3]
  - [pva_helix, 3]
  - [pva_gql_anon, 3]
  - [post_stream, 3]
  - [default, 3]
  - [notifications, 2]
  - [accessory_ops, 2]
  - [monitoring, 1]
  - [long_running, 1]
# TASK-110 v1.2 (CR S-7): `whisper_transcripts` queue НАМЕРЕННО НЕ в этом :queues списке.
# Default `job` Sidekiq role не должен подхватывать whisper jobs (иначе concurrency=5-10
# spawns multiple whisper invocations → defeats CPU isolation). Обрабатывается ТОЛЬКО
# dedicated whisper_worker role (deploy.yml) через explicit `sidekiq -q whisper_transcripts -c 1`.
