# band derivation = Reputation::BandService. Consumed by extension (T2-020) / SaaS LK.
ru:
  reputation:
    band:
      impeccable: Безупречная
      stable: Стабильная
      variable: Изменчивая
      unstable: Нестабильная
    # FD-4 cold-start: 3 тира (Glossary «Cold-start»). insufficient <3 (band скрыт) /
    # basic 3-9 (tooltip «Provisional — N streams») / full ≥10.
    tier:
      insufficient: Недостаточно данных
      basic: Базовая аналитика
      full: Полная аналитика
    tier_tooltip:
      basic: "Предварительно — %{count} стримов"
