ru:
  trends:
    direction:
      rising: Растёт
      declining: Снижается
      flat: Стабильно
    confidence:
      high: Высокая
      medium: Средняя
      low: Низкая
    reliability:
      high: Высокая
      medium: Средняя
      low: Низкая
      disclaimer_low: Точность прогноза низкая — интерпретируйте с осторожностью.
    explanation:
      rising_with_improvements: "%{metric} вырос на %{delta} за счёт %{top_signals}."
      declining_with_degradations: "%{metric} снизился на %{delta} из-за %{top_signals}."
      rising_generic: "%{metric} растёт (%{delta} за период)."
      declining_generic: "%{metric} снижается (%{delta} за период)."
      flat: "%{metric} стабильный за период."
    # CR #425 N-2: key was missing → hardcoded "Trust Index" fallback leaked user-facing.
    # «Уровень подлинности» (masculine «уровень») agrees with the generic insight verbs
    # («вырос»/«снижается»/«стабильный») — bare «Подлинность» (feminine) would not.
    metric:
      trust_index: "Уровень подлинности"
    # (trends.patterns.* block removed — CR #425 N-3: zero readers in app/; the live weekday
    # insight is trends.weekday.insight, category verdicts are trends.categories.verdict.*)
    forecast:
      title: Прогноз
      range: "%{value} (%{lower}..%{upper})"
      horizon_7d: На 7 дней
      horizon_30d: На 30 дней
    categories:
      verdict:
        best_with_delta: "Лучшая подлинность в %{name} (+%{delta})"
        top_with_delta: "Топ-категория %{name} (%{delta} к baseline)"
        top_no_delta: "Топ-категория: %{name}"
    weekday:
      accusative:
        mon: понедельник
        tue: вторник
        wed: среду
        thu: четверг
        fri: пятницу
        sat: субботу
        sun: воскресенье
      insight: "Лучшие стримы в %{day} (подлинность %{ti})"
