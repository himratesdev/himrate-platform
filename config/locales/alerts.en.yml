# TASK-085 FR-026 + SRS v1.2 §10A.2: Anomaly alert i18n catalog (backend contract reference).
# See alerts.ru.yml для context. Per CLAUDE.md ERV labels v3 — legal-safe wording strict.

en:
  alert:
    ccv_spike:
      title: "Viewer surge"
      # T1-074 surface-audit: the old template interpolated %{N}/%{From}/%{To} that no producer
      # supplies (presenter emits z-score only) — unfulfillable contract; simplified to real data.
      detail: "Anomalous viewer spike in %{M} min"
    confirmed_raid:
      title: "Confirmed raid"
      detail: "Raid from @%{raider}: %{viewers} viewers"
      detail_no_raider: "Raid: %{viewers} viewers"
    anomaly_wave:
      title: "Anomalous account wave"
      detail: "%{N} new accounts with suspicious pattern in %{M} min"
    ti_drop:
      # T1-074: "TI/Trust Index" retired user-facing — the tracked scalar is Authenticity
      title: "Authenticity sharp drop"
      detail: "Authenticity dropped %{From} → %{To} (−%{N}) in %{M} min"
    chatter_to_ccv_anomaly:
      title: "Chat activity anomaly"
      detail: "Chatter ratio %{N}%% (normal for %{Category}: %{Min}-%{Max}%%)"
    chat_entropy_drop:
      title: "Chat entropy drop"
      detail: "Entropy %{N} (normal >2.0) — chat is templated"
    erv_divergence:
      # T1-074 (surface-audit): "ERV/CCV ratio" = retired v1 semantics; the v2 detector measures
      # the authenticity axis — relabeled after the ti_drop pattern above.
      title: "Authenticity sharp change"
      detail: "Authenticity changed %{N}%% in %{M} min"
    severity:
      info:
        aria: "Info"
      yellow:
        aria: "Caution"
      red:
        aria: "Critical anomaly"
    dismiss: "Dismiss"
