      title: "Chat activity anomaly"
      detail: "Chatter ratio %{N}%% (normal for %{Category}: %{Min}-%{Max}%%)"
    chat_entropy_drop:
      title: "Chat entropy drop"
      detail: "Entropy %{N} (normal >2.0) — chat is templated"
    erv_divergence:
      title: "ERV/CCV divergence"
      detail: "ERV/CCV ratio changed %{N}%% in %{M} min"
