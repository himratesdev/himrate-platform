en:
  trends:
    direction:
      rising: Rising
      declining: Declining
      flat: Flat
    confidence:
      high: High
      medium: Medium
      low: Low
    reliability:
      high: High
      medium: Medium
      low: Low
      disclaimer_low: Forecast reliability is low — view with caution.
    explanation:
      rising_with_improvements: "%{metric} up %{delta} driven by %{top_signals}."
      declining_with_degradations: "%{metric} down %{delta} due to %{top_signals}."
