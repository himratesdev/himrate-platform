    metric:
      trust_index: "Authenticity"
    patterns:
      weekday:
        title: Weekday pattern
        # T1-074: "TI" retired user-facing (Glossary v6.0 — internal/legacy only); scalar = Authenticity
        best: "Best day %{day} (authenticity %{ti})"
