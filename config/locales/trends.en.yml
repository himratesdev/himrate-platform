        title: Category pattern
        top: "Best category %{name} (+%{delta} vs baseline)"
        single: Channel operates mostly in %{name}
    forecast:
      title: Forecast
      range: "%{value} (%{lower}..%{upper})"
      horizon_7d: 7-day forecast
      horizon_30d: 30-day forecast
    categories:
      verdict:
        best_with_delta: "Best authenticity in %{name} (+%{delta})"
        top_with_delta: "Top category %{name} (%{delta} vs baseline)"
        top_no_delta: "Top category: %{name}"
    weekday:
      accusative:
        mon: Monday
        tue: Tuesday
        wed: Wednesday
        thu: Thursday
        fri: Friday
        sat: Saturday
