  # defaults (keys did not exist in any locale). EN values duplicate the former defaults
  # verbatim — no EN behavior change; RU users stop seeing English errors.
  channels:
    errors:
      billing_not_configured: "Оплата подписки ещё не подключена. Напишите в поддержку."
      already_tracked: "Канал уже отслеживается"
