# HimRate — Kamal Staging Destination
# Overrides config/deploy.yml for staging environment

proxy:
  ssl: true
  host: staging.himrate.com

env:
  clear:
    RAILS_ENV: staging
    WEB_CONCURRENCY: 1
    # TASK-251.14: app connects to the staging CH database (matches the accessory CLICKHOUSE_DB below).
    CLICKHOUSE_DATABASE: himrate_staging

accessories:
  db:
    env:
      clear:
        POSTGRES_DB: himrate_staging
  clickhouse:
    env:
      clear:
        CLICKHOUSE_DB: himrate_staging
