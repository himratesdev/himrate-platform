# HimRate — Kamal Staging Destination
# Overrides config/deploy.yml for staging environment

proxy:
  ssl: true
  # Pre-launch (no separate production deploy yet): the HOSTKEY staging app is the
  # single live environment, so the public apex + api route here too.
  # Comma-separated `host:` (NOT a `hosts:` array) is deliberate — it cleanly OVERRIDES
  # the base config/deploy.yml `host:` scalar on deep-merge; kamal then splits it into
  # multiple proxy hosts (Kamal::Configuration::Proxy#hosts). A `hosts:` array would
  # deep-merge ALONGSIDE the inherited base `host:` and trip kamal's mutually-exclusive
  # "Specify one of 'host' or 'hosts', not both" validator → deploy aborts.
  # kamal-proxy issues a Let's Encrypt cert per host — each MUST be Cloudflare DNS-only
  # (grey cloud) → 82.21.7.48 so the ACME HTTP-01 challenge reaches port 80.
  # www.himrate.com deferred until its DNS is DNS-only (still Cloudflare-proxied as of cutover).
  host: staging.himrate.com,himrate.com,api.himrate.com

env:
  clear:
    RAILS_ENV: staging
    WEB_CONCURRENCY: 1
    # TASK-251.14: app connects to the staging CH database (matches the accessory CLICKHOUSE_DB below).
    CLICKHOUSE_DATABASE: himrate_staging

accessories:
  db:
    env:
      clear:
        POSTGRES_DB: himrate_staging
  clickhouse:
    env:
      clear:
        CLICKHOUSE_DB: himrate_staging
